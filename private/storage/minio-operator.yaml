apiVersion: v1
kind: Namespace
metadata:
  name: minio-operator
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: minio-operator
  namespace: kube-system
spec:
  repo: https://operator.min.io/
  chart: minio-operator
  targetNamespace: minio-operator
  version: "5.0.15"
  valuesContent: |-
    operator:
      replicaCount: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
---
apiVersion: v1
kind: Namespace
metadata:
  name: minio-tenant
---
apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: hybrid-ai
  namespace: minio-tenant
spec:
  image: minio/minio:RELEASE.2024-05-10T01-41-38Z
  imagePullPolicy: IfNotPresent
  pools:
    - servers: 1
      volumesPerServer: 4
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 100Gi
  credsSecret:
    name: minio-creds-secret
  configuration:
    name: minio-configuration
  requestAutoCert: true
  features:
    bucketDNS: false
  buckets:
    - name: models
      objectLock: false
      region: us-east-1
    - name: datasets
      objectLock: false
      region: us-east-1
    - name: artifacts
      objectLock: false
      region: us-east-1
  users:
    - name: model-admin
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds-secret
  namespace: minio-tenant
type: Opaque
stringData:
  accessKey: "minioadmin"
  secretKey: "minioadmin123"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-configuration
  namespace: minio-tenant
type: Opaque
stringData:
  config.env: |
    export MINIO_ROOT_USER="minioadmin"
    export MINIO_ROOT_PASSWORD="minioadmin123"
    export MINIO_BROWSER="on"
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: minio-tenant
spec:
  type: LoadBalancer
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: console
  selector:
    v1.min.io/tenant: hybrid-ai
---
apiVersion: v1
kind: Service
metadata:
  name: minio-api
  namespace: minio-tenant
spec:
  type: LoadBalancer
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: s3
  selector:
    v1.min.io/tenant: hybrid-ai
