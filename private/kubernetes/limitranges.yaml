apiVersion: v1
kind: LimitRange
metadata:
  name: private-infra-defaults
  namespace: private-infra
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
---
apiVersion: v1
kind: LimitRange
metadata:
