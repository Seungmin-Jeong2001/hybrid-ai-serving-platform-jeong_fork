# Kolla custom config — /etc/kolla/config/nova.conf 배치 시 모든 nova 컨테이너에 머지
# DevStack configure_gpu_passthrough() 와 동일한 PCI passthrough 설정
# 값 출처: private/ci/private-cloud-apply.sh (vendor 10de, alias nvidia-gpu, type-PF, numa preferred)
# product_id 는 autodetect.sh 가 서버 GPU sysfs 스캔으로 자동 채움

[pci]
device_spec = {"vendor_id":"10de","product_id":"<FILL>","dev_type":"type-PF"}
alias = {"name":"nvidia-gpu","vendor_id":"10de","product_id":"<FILL>","device_type":"type-PF","numa_policy":"preferred"}

[filter_scheduler]
available_filters = nova.scheduler.filters.all_filters
enabled_filters = ComputeFilter,ComputeCapabilitiesFilter,ImagePropertiesFilter,ServerGroupAntiAffinityFilter,ServerGroupAffinityFilter,SameHostFilter,DifferentHostFilter,PciPassthroughFilter

[DEFAULT]
force_raw_images = False
