apiVersion: batch/v1
kind: Job
metadata:
  name: model-training
  namespace: default
spec:
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        hybrid-ai.io/node-role: gpu-worker
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      runtimeClassName: nvidia
      initContainers:
        # 데이터셋 다운로드
        - name: download-dataset
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Downloading dataset from MinIO..."
              mc alias set local http://minio-api.minio-tenant.svc.cluster.local:9000 minioadmin minioadmin123
              mc cp -r local/datasets/my-dataset/ /data/dataset/ || echo "Using dummy data"
          volumeMounts:
            - name: data-volume
              mountPath: /data
      containers:
        - name: training
          image: pytorch/pytorch:2.7.0-cuda12.8-cudnn9-runtime
          command:
            - python3
            - -c
            - |
              import torch
              import torch.nn as nn
              import torch.optim as optim
              from torch.utils.data import DataLoader, TensorDataset
              import time
              import os
              
              print("=" * 60)
              print("Model Training Job")
              print("=" * 60)
              
              # GPU 확인
              device = torch.device("cuda:0" if torch.cuda.is_available() else "cpu")
              print(f"\nUsing device: {device}")
              if torch.cuda.is_available():
                  print(f"GPU: {torch.cuda.get_device_name(0)}")
              
              # 간단한 모델
              class Net(nn.Module):
                  def __init__(self):
                      super(Net, self).__init__()
                      self.fc1 = nn.Linear(784, 256)
                      self.fc2 = nn.Linear(256, 128)
                      self.fc3 = nn.Linear(128, 10)
                  
                  def forward(self, x):
                      x = x.view(-1, 784)
                      x = torch.relu(self.fc1(x))
                      x = torch.relu(self.fc2(x))
                      x = self.fc3(x)
                      return x
              
              model = Net().to(device)
              criterion = nn.CrossEntropyLoss()
              optimizer = optim.Adam(model.parameters(), lr=0.001)
              
              # 더미 데이터 (실제로는 /data/dataset에서 로드)
              print("\nPreparing dataset...")
              train_data = torch.randn(5000, 1, 28, 28)
              train_labels = torch.randint(0, 10, (5000,))
              train_dataset = TensorDataset(train_data, train_labels)
              train_loader = DataLoader(train_dataset, batch_size=64, shuffle=True)
              
              # 학습
              print("\nStarting training...")
              epochs = 10
              start_time = time.time()
              
              for epoch in range(epochs):
                  epoch_loss = 0
                  for batch_idx, (data, target) in enumerate(train_loader):
                      data, target = data.to(device), target.to(device)
                      
                      optimizer.zero_grad()
                      output = model(data)
                      loss = criterion(output, target)
                      loss.backward()
                      optimizer.step()
                      
                      epoch_loss += loss.item()
                  
                  avg_loss = epoch_loss / len(train_loader)
                  print(f"Epoch [{epoch+1}/{epochs}] Loss: {avg_loss:.4f}")
              
              elapsed = time.time() - start_time
              print(f"\nTraining completed in {elapsed:.2f} seconds")
              
              # 모델 저장
              model_path = "/model/model.pth"
              os.makedirs("/model", exist_ok=True)
              torch.save(model.state_dict(), model_path)
              print(f"Model saved to: {model_path}")
              
              # 모델을 MinIO에 업로드
              print("\nUploading model to MinIO...")
              os.system("mc alias set local http://minio-api.minio-tenant.svc.cluster.local:9000 minioadmin minioadmin123")
              os.system("mc cp /model/model.pth local/models/trained-model.pth")
              print("Model uploaded to MinIO")
              
              print("\n" + "=" * 60)
              print("Training Job Completed Successfully!")
              print("=" * 60)
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: model-volume
              mountPath: /model
      volumes:
        - name: data-volume
          emptyDir: {}
        - name: model-volume
          emptyDir: {}
  backoffLimit: 2
