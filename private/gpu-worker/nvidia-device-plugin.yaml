apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/part-of: hybrid-ai-serving-platform
    app.kubernetes.io/component: gpu-resource-advertiser
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-device-plugin
        app.kubernetes.io/part-of: hybrid-ai-serving-platform
        app.kubernetes.io/component: gpu-resource-advertiser
    spec:
      priorityClassName: system-node-critical
      runtimeClassName: nvidia
      automountServiceAccountToken: false
      nodeSelector:
        hybrid-ai.io/node-role: gpu-worker
        hybrid-ai.io/accelerator: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.19.2
          imagePullPolicy: IfNotPresent
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "true"
            - name: MIG_STRATEGY
              value: none
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: utility
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: kubelet-device-plugins-dir
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: kubelet-device-plugins-dir
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
