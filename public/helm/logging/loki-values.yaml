deploymentMode: SingleBinary

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

chunksCache:
  enabled: false

resultsCache:
  enabled: false

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h

singleBinary:
  replicas: 1
  nodeSelector:
    workload: monitoring
  persistence:
    enabled: true
    storageClass: gp2
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

lokiCanary:
  enabled: true

gateway:
  nodeSelector:
    workload: monitoring

test:
  enabled: false
