---
- name: Check kubectl is available
  ansible.builtin.command: kubectl version --client
  changed_when: false

- name: Check helm is available
  ansible.builtin.command: helm version
  changed_when: false

- name: Check kubeconfig current context
  ansible.builtin.command: kubectl config current-context
  register: monitoring_kube_context
  changed_when: false

- name: Require Grafana admin password to be provided
  ansible.builtin.assert:
    that:
      - grafana_admin_password is defined
      - grafana_admin_password | trim | length > 0
      - grafana_admin_password != 'change-me-before-deploy'
    fail_msg: >-
      Set grafana_admin_password from a private variable source before deploying
      the monitoring stack.

- name: Show target Kubernetes context
  ansible.builtin.debug:
    msg: "Deploying monitoring stack to Kubernetes context {{ monitoring_kube_context.stdout }}"

- name: Ensure monitoring namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ monitoring_namespace | default('monitoring') }}"

- name: Add prometheus-community Helm repository
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts

- name: Render values and deploy monitoring stack
  block:
    - name: Create temporary values file path
      ansible.builtin.tempfile:
        state: file
        suffix: -kube-prometheus-stack-values.yaml
      register: monitoring_values_file

    - name: Render Helm values file
      ansible.builtin.template:
        src: values.yaml.j2
        dest: "{{ monitoring_values_file.path }}"
        mode: "0600"
      no_log: true

    - name: Install or upgrade kube-prometheus-stack
      kubernetes.core.helm:
        name: "{{ monitoring_release_name }}"
        chart_ref: "{{ monitoring_chart_ref }}"
        release_namespace: "{{ monitoring_namespace }}"
        create_namespace: true
        update_repo_cache: true
        wait: true
        chart_version: "{{ monitoring_chart_version if monitoring_chart_version else omit }}"
        timeout: "{{ monitoring_helm_timeout }}"
        values_files:
          - "{{ monitoring_values_file.path }}"
  always:
    - name: Remove temporary values file
      ansible.builtin.file:
        path: "{{ monitoring_values_file.path }}"
        state: absent
      when: monitoring_values_file is defined and monitoring_values_file.path is defined

- name: Create Grafana dashboard ConfigMap
  ansible.builtin.command: >
    kubectl create configmap grafana-sre-dashboards
    --from-file=../../../../sre-monitoring/grafana/dashboards/sre-platform.json
    -n {{ monitoring_namespace }}
    --dry-run=client -o yaml
  register: grafana_cm_yaml
  changed_when: false

- name: Apply Grafana dashboard ConfigMap
  kubernetes.core.k8s:
    state: present
    definition: "{{ grafana_cm_yaml.stdout | from_yaml }}"

- name: Apply SLO Recording Rules
  kubernetes.core.k8s:
    state: present
    src: "../../../../sre-monitoring/prometheus/rules/slo-rules.yaml"

- name: Apply Alert Rules
  kubernetes.core.k8s:
    state: present
    src: "../../../../sre-monitoring/prometheus/rules/alert-rules.yaml"
