---
- name: Ensure Chaos Mesh namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ chaos_mesh_namespace }}"

- name: Add Chaos Mesh Helm repository
  kubernetes.core.helm_repository:
    name: chaos-mesh
    repo_url: https://charts.chaos-mesh.org

- name: Install or upgrade Chaos Mesh
  kubernetes.core.helm:
    name: "{{ chaos_mesh_release_name }}"
    chart_ref: "{{ chaos_mesh_chart_ref }}"
    chart_version: "{{ chaos_mesh_chart_version if chaos_mesh_chart_version else omit }}"
    release_namespace: "{{ chaos_mesh_namespace }}"
    create_namespace: true
    update_repo_cache: true
    wait: true
    timeout: "{{ chaos_mesh_helm_timeout }}"
    values:
      dashboard:
        create: true
      chaosDaemon:
        runtime: containerd
