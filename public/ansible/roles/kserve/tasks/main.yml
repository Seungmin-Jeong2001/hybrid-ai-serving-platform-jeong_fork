---
- name: Ensure cert-manager namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ cert_manager_namespace }}"

- name: Install or upgrade cert-manager
  kubernetes.core.helm:
    name: "{{ cert_manager_release_name }}"
    chart_ref: "{{ cert_manager_chart_ref }}"
    chart_version: "{{ cert_manager_chart_version }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    wait: true
    timeout: "{{ cert_manager_helm_timeout }}"
    values:
      crds:
        enabled: true

- name: Ensure KServe namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ kserve_namespace }}"

- name: Install or upgrade KServe CRDs
  kubernetes.core.helm:
    name: "{{ kserve_crd_release_name }}"
    chart_ref: "{{ kserve_crd_chart_ref }}"
    chart_version: "{{ kserve_chart_version }}"
    release_namespace: "{{ kserve_namespace }}"
    create_namespace: true
    wait: true
    timeout: "{{ kserve_helm_timeout }}"

- name: Install or upgrade KServe resources
  kubernetes.core.helm:
    name: "{{ kserve_release_name }}"
    chart_ref: "{{ kserve_chart_ref }}"
    chart_version: "{{ kserve_chart_version }}"
    release_namespace: "{{ kserve_namespace }}"
    create_namespace: true
    wait: true
    timeout: "{{ kserve_helm_timeout }}"
    values:
      kserve:
        controller:
          deploymentMode: Standard
          gateway:
            ingressGateway:
              className: "{{ kserve_ingress_class_name }}"
