---
- name: Deploy platform services on EKS
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Read Grafana admin password from SSM
      ansible.builtin.set_fact:
        grafana_admin_password: >-
          {{ lookup(
            'amazon.aws.aws_ssm',
            grafana_admin_password_ssm_name,
            region=monitoring_aws_region,
            decrypt=true
          ) }}
      no_log: true

  roles:
    - role: keda
      tags:
        - keda
    - role: kserve
      tags:
        - kserve
    - role: monitoring
      tags:
        - monitoring
    - role: logging
      tags:
        - logging
    - role: chaos_mesh
      tags:
        - chaos-mesh
