apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pdm-predictor
  namespace: inference
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      serving.kserve.io/inferenceservice: pdm
  podMetricsEndpoints:
    - targetPort: 8080
      path: /metrics
      interval: 30s
