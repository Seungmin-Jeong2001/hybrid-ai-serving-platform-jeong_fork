apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-policy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/SGS-Strategy/hybrid-ai-serving-platform.git
    targetRevision: main
    path: public/k8s/policy
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring  # 클러스터 범위 리소스 배포 기준 네임스페이스 (각 리소스의 metadata.namespace가 실제 적용 위치)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
