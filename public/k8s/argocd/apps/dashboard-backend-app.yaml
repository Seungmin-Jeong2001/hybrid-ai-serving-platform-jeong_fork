apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard-backend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd-image-updater.argoproj.io/image-list: dashboard-backend=808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/dashboard-backend
    argocd-image-updater.argoproj.io/dashboard-backend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/dashboard-backend.allow-tags: regexp:^[a-f0-9]{40}$
    argocd-image-updater.argoproj.io/dashboard-backend.force-update: "true"
    argocd-image-updater.argoproj.io/dashboard-backend.kustomize.image-name: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/dashboard-backend
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  ignoreDifferences:
    - group: ""
      kind: ServiceAccount
      name: dashboard-backend
      namespace: app
      jsonPointers:
        - /metadata/annotations/eks.amazonaws.com~1role-arn
  source:
    repoURL: https://github.com/SGS-Strategy/hybrid-ai-serving-platform.git
    targetRevision: main
    path: public/k8s/apps/dashboard-backend
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
