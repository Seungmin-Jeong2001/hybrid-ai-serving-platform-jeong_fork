apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd-image-updater.argoproj.io/image-list: dashboard-frontend=808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/dashboard-frontend
    argocd-image-updater.argoproj.io/dashboard-frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/dashboard-frontend.allow-tags: regexp:^[a-f0-9]{40}$
    argocd-image-updater.argoproj.io/dashboard-frontend.force-update: "true"
    argocd-image-updater.argoproj.io/dashboard-frontend.kustomize.image-name: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/dashboard-frontend
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  ignoreDifferences:
    - group: networking.k8s.io
      kind: Ingress
      name: dashboard-frontend
      namespace: app
      jsonPointers:
        - /metadata/annotations/alb.ingress.kubernetes.io~1certificate-arn
  source:
    repoURL: https://github.com/SGS-Strategy/hybrid-ai-serving-platform.git
    targetRevision: main
    path: public/k8s/apps/dashboard-frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
