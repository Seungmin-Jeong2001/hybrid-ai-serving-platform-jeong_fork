apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      containers:
        - name: inference-api
          image: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/inference-api:latest
          env:
            # 실제 주소는 배포 워크플로우가 MSK에서 읽어 inference-config ConfigMap에 주입함
            - name: BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: inference-config
                  key: BOOTSTRAP_SERVERS
            - name: REQUEST_TOPIC
              value: inference-request
          ports:
            - containerPort: 8080
