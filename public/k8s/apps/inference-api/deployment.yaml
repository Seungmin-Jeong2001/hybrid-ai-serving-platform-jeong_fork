apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      serviceAccountName: inference-api-sa
      nodeSelector:
        workload: app
      containers:
        - name: inference-api
          image: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/inference-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: api-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
