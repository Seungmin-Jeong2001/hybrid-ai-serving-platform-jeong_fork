apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-worker
  template:
    metadata:
      labels:
        app: inference-worker
    spec:
      serviceAccountName: inference-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        workload: inference
      containers:
        - name: inference-worker
          image: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/inference-worker:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          env:
            - name: AWS_REGION
              value: ap-northeast-2
            # Terraform provisions the shared inference-config ConfigMap from MSK outputs.
            - name: BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: inference-config
                  key: BOOTSTRAP_SERVERS
            - name: REQUEST_TOPIC
              value: inference-request
            - name: RETRY_TOPIC
              value: inference-retry
            - name: DLQ_TOPIC
              value: inference-dlq
            - name: WORKER_CONSUMER_GROUP
              value: inference-worker-group
            - name: DYNAMODB_TABLE_NAME
              value: sgs-hasp-inference-jobs
            - name: MAX_RETRY_COUNT
              value: "3"
            - name: RETRY_JITTER_SECONDS
              value: "5"
            - name: RETRY_POLL_DELAY_SECONDS
              value: "1"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
