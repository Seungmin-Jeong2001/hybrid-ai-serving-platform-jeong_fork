apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-worker
  namespace: inference
spec:
  scaleTargetRef:
    name: inference-worker
  minReplicaCount: 2
  maxReplicaCount: 6  # Match the current inference-request topic partition count.
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: kafka
      metadata:
        consumerGroup: inference-worker-group
        topic: inference-request
        lagThreshold: "20"  # Scale up when lag reaches 20 per partition.
        offsetResetPolicy: latest
      authenticationRef:
        name: inference-kafka-auth
