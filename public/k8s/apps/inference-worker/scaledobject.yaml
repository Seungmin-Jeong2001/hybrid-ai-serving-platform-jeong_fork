apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-worker
  namespace: inference
spec:
  scaleTargetRef:
    name: inference-worker
  minReplicaCount: 2
  maxReplicaCount: 6  # Match the current inference-request topic partition count.
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "b-1.sgshaspmsk.cx9yns.c2.kafka.ap-northeast-2.amazonaws.com:9094,b-2.sgshaspmsk.cx9yns.c2.kafka.ap-northeast-2.amazonaws.com:9094,b-3.sgshaspmsk.cx9yns.c2.kafka.ap-northeast-2.amazonaws.com:9094"
        consumerGroup: inference-worker-group
        topic: inference-request
        lagThreshold: "20"  # Scale up when lag reaches 20 per partition.
        offsetResetPolicy: latest
        tls: enable
