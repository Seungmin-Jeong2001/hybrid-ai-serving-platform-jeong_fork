apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-worker
  namespace: inference
  annotations:
    # IRSA: terraform aws_iam_role.inference_worker (${project_name}-inference-worker)
    # role-arn / 네임스페이스(inference) / SA 이름(inference-worker)이
    # terraform 신뢰정책 조건과 정확히 일치해야 인증됨.
    # [예측값] account=808379768010, role=sgs-hasp-inference-worker 기준으로 미리 넣어둔 값.
    #   apply 후 `terraform output inference_worker_role_arn` 로 실제 ARN 확인하고 다르면 교체할 것.
    eks.amazonaws.com/role-arn: arn:aws:iam::808379768010:role/sgs-hasp-inference-worker
