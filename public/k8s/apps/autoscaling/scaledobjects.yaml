apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scale
  namespace: inference
spec:
  scaleTargetRef:
    name: inference-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: replace-me:9092
        consumerGroup: inference-workers
        topic: inference-requests
        lagThreshold: "100"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: consumer-scale
  namespace: inference
spec:
  scaleTargetRef:
    name: result-consumer
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: replace-me:9092
        consumerGroup: result-consumers
        topic: inference-results
        lagThreshold: "50"
