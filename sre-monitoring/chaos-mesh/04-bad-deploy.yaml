# ============================================================
# Chaos 시나리오 4: 잘못된 이미지 배포 → ArgoCD 롤백 검증
# 담당: 신민석 (⑥ Reliability & Chaos Engineering)
#
# 검증 목표:
#   - 존재하지 않는/깨진 이미지 배포 시 Pod CrashLoop 확인
#   - ArgoCD 자동 롤백 또는 수동 롤백 동작 검증
#   - 롤백 완료까지 소요 시간 측정 (MTTR)
#
# ─── 통합 시 교체 체크리스트 ────────────────────────────────
# 1. [③ 정승민 + ④ 최호성 완성]  Job env 값 교체
#     - TARGET_NAMESPACE: "default" → 실제 api-server namespace
#     - TARGET_DEPLOYMENT: "api-server" → 실제 Deployment 이름
# ─────────────────────────────────────────────────────────────
#
# 실행 방법 (③ 정승민 ArgoCD 배포 완료 후):
#
#   # 1. 현재 이미지 태그 저장
#   CURRENT_IMAGE=$(kubectl get deployment api-server -n default \
#     -o jsonpath='{.spec.template.spec.containers[0].image}')
#
#   # 2. 잘못된 이미지로 패치 (kustomization 우회 — 직접 배포 테스트)
#   kubectl patch deployment api-server -n default \
#     --patch '{"spec":{"template":{"spec":{"containers":[{"name":"api-server","image":"bad-image:nonexistent"}]}}}}'
#
#   # 3. Grafana에서 PodCrashLoop 알람 확인
#   # 4. ArgoCD UI에서 롤백 실행 (또는 자동 sync)
#   # 5. 복구 시간 측정
# ============================================================

# ──────────────────────────────────────────────────────────
# [자동화 버전] Kubernetes Job으로 배포 → 복구 시뮬레이션
# 실제 사용 전 반드시 검토 후 적용
# ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-bad-deploy-sa
  namespace: chaos-testing

---
# ClusterRole 대신 namespace-scoped Role 사용 (최소 권한 원칙)
# 대상 namespace (TARGET_NAMESPACE) 에만 권한 부여
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-bad-deploy-role
  namespace: default          # TODO(통합): TARGET_NAMESPACE 값과 일치시킬 것
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-bad-deploy-binding
  namespace: default          # TODO(통합): Role과 같은 namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-bad-deploy-role
subjects:
  - kind: ServiceAccount
    name: chaos-bad-deploy-sa
    namespace: chaos-testing

---
# 배포 실패 시뮬레이션 Job
apiVersion: batch/v1
kind: Job
metadata:
  name: chaos-bad-deploy-simulator
  namespace: chaos-testing
  annotations:
    description: "잘못된 이미지 배포 시뮬레이션 → ArgoCD 롤백 검증"
spec:
  template:
    spec:
      serviceAccountName: chaos-bad-deploy-sa
      restartPolicy: Never
      containers:
        - name: chaos-executor
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Chaos 시나리오 4: 잘못된 이미지 배포 시뮬레이션 ==="
              TARGET_NS="${TARGET_NAMESPACE:-default}"
              TARGET_DEPLOY="${TARGET_DEPLOYMENT:-api-server}"

              # 현재 이미지 백업
              echo "현재 이미지 저장..."
              CURRENT_IMAGE=$(kubectl get deployment ${TARGET_DEPLOY} -n ${TARGET_NS} \
                -o jsonpath='{.spec.template.spec.containers[0].image}')
              echo "현재 이미지: ${CURRENT_IMAGE}"

              # 잘못된 이미지로 교체
              echo "잘못된 이미지로 교체 중..."
              kubectl patch deployment ${TARGET_DEPLOY} -n ${TARGET_NS} \
                -p "{\"spec\":{\"template\":{\"spec\":{\"containers\":[{\"name\":\"${TARGET_DEPLOY}\",\"image\":\"bad-image:chaos-test-nonexistent\"}]}}}}"

              # CrashLoop 발생 대기 (60초)
              echo "CrashLoop 발생 대기 중 (60초)..."
              sleep 60

              echo ""
              echo "=== Pod 상태 확인 ==="
              kubectl get pods -n ${TARGET_NS} -l app=${TARGET_DEPLOY}

              echo ""
              echo "=== ArgoCD 롤백 안내 ==="
              echo "1. ArgoCD UI 접속 → 앱 선택 → SYNC / ROLLBACK"
              echo "2. 또는: argocd app sync ${TARGET_DEPLOY} --revision HEAD"
              echo ""
              echo "직접 복구 (ArgoCD 없을 경우):"
              echo "kubectl set image deployment/${TARGET_DEPLOY} ${TARGET_DEPLOY}=${CURRENT_IMAGE} -n ${TARGET_NS}"

          env:
            - name: TARGET_NAMESPACE
              value: "default"       # 교체: 실제 namespace
            - name: TARGET_DEPLOYMENT
              value: "api-server"    # 교체: 실제 deployment 이름
