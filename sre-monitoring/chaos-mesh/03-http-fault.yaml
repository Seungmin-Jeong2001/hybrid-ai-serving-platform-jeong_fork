# ============================================================
# Chaos 시나리오 3: HTTP 트래픽 폭주 + HTTP 오류 주입
# 담당: 신민석 (⑥ Reliability & Chaos Engineering)
#
# 검증 목표:
#   - k6 트래픽 폭주 시 HPA/KEDA 오토스케일링 동작 확인
#   - 5xx 에러율 변화 측정
#   - Error Budget 소진 속도 측정
#
# 실행 순서:
#   1. kubectl apply -f 03-http-fault.yaml   (HTTP 오류 주입)
#   2. k6 run ../k6/stress-test.js           (동시에 트래픽 폭주)
#   3. Grafana에서 HPA 스케일링 + 에러율 관찰
#   4. kubectl delete -f 03-http-fault.yaml  (복구)
#
# 사전 조건:
#   - Chaos Mesh HTTPChaos 기능 활성화 필요
#   - 대상 서비스(api-server)에 chaos-mesh webhook 주입 필요
# ============================================================
# ─── 통합 시 교체 체크리스트 ────────────────────────────────
# 1. [② 안예원 + ④ 최호성 완성]  두 HTTPChaos 모두 selector 교체
#     - namespaces: default → 실제 api-server namespace
#     - labelSelectors app: api-server → 실제 Pod 라벨
#     - port: 8080 → 실제 서비스 포트
#     - path: "/predict" → 실제 추론 엔드포인트 경로
# ─────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────
# [시나리오 3-A] HTTP 500 오류 5% 주입
# 5xx 에러율 SLO(5%) 경계 테스트
# ② 안예원 + ④ 최호성 서비스 배포 후 활성화
# ──────────────────────────────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: chaos-http-abort-5percent
  namespace: chaos-testing
  annotations:
    description: "HTTP 500 오류 5% 주입 — 5xx 에러율 SLO 경계 테스트"
spec:
  mode: all
  target: Response             # 응답에 오류 주입

  selector:
    namespaces:
      - default                # 교체: api-server namespace
    labelSelectors:
      app: api-server          # 교체: 실제 라벨

  code: 500                    # HTTP 500 Internal Server Error
  proportion: 5                # 5%의 요청에 오류 주입

  port: 8080                   # 교체: api-server 실제 포트
  path: "/predict"             # 교체: 실제 추론 엔드포인트
  method: POST

  duration: "5m"

---
# ──────────────────────────────────────────────────────────
# [시나리오 3-B] HTTP 응답 지연 주입 (레이턴시 SLO 테스트)
# ──────────────────────────────────────────────────────────
apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: chaos-http-delay-p99
  namespace: chaos-testing
  annotations:
    description: "HTTP 응답 4초 지연 — P99 5s SLO 경계 테스트"
spec:
  mode: all
  target: Request              # 요청 처리에 지연 추가

  selector:
    namespaces:
      - default
    labelSelectors:
      app: api-server

  delay: "4s"                  # 4초 지연 (P99 5s SLO 경계)
  proportion: 20               # 20%의 요청에 지연 주입

  port: 8080
  path: "/predict"
  method: POST

  duration: "3m"
