apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: inference
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          args:
            - run
            - /scripts/01-baseline-test.js
          env:
            - name: INFERENCE_API_URL
              value: "http://inference-api.inference.svc.cluster.local"
          volumeMounts:
            - name: k6-scripts
              mountPath: /scripts
      volumes:
        - name: k6-scripts
          configMap:
            name: k6-scripts
---
# 실행 전 ConfigMap 생성:
# kubectl create configmap k6-scripts \
#   --from-file=01-baseline-test.js=sre-monitoring/k6/01-baseline-test.js \
#   --from-file=02-spike-test.js=sre-monitoring/k6/02-spike-test.js \
#   --from-file=03-stress-test.js=sre-monitoring/k6/03-stress-test.js \
#   -n inference
