    #       labels:
    #         severity: critical
    #         plane: PUBLIC
    #       annotations:
    #         summary: "Kafka Consumer Lag 높음: {{ $labels.consumergroup }}/{{ $labels.topic }}"
    #         description: |
    #           Consumer Lag가 {{ $value }}에 달했습니다. KEDA 스케일링을 확인하세요.
    #
    #     - alert: KafkaDLQMessageDetected
    #       expr: |
    #         increase(kafka_topic_partition_current_offset{topic=~".*dlq.*"}[5m]) > 0
    #       labels:
    #         severity: critical
    #         plane: PUBLIC
    #       annotations:
    #         summary: "DLQ 메시지 감지: {{ $labels.topic }}"
    #         description: |
    #           5분간 {{ $value }}개의 메시지가 DLQ로 이동됐습니다.
    #
    #     - alert: KafkaDLQRateHigh
    #       expr: |
    #         slo:kafka_dlq_rate:ratio_rate5m > 0.01
    #       for: 5m
    #       labels:
    #         severity: warning
    #         plane: PUBLIC
    #       annotations:
    #         summary: "DLQ 발생률 SLO 위반 ({{ $value | humanizePercentage }})"
    #         description: "DLQ 발생률이 1% SLO를 초과했습니다."

    # ============================================================
    # HTTP / 추론 알림 — Istio Ambient Mode 메트릭 기반
    # ============================================================
    - name: inference.alerts
      rules:

        - alert: HighErrorRate5xx
          expr: |
            slo:http_error_rate:ratio_rate5m > 0.05
          for: 5m
          labels:
            severity: critical
            plane: PUBLIC
          annotations:
            summary: "5xx 에러율 높음 ({{ $value | humanizePercentage }})"
            description: "추론 서버 5xx 에러율이 5% SLO를 초과했습니다."

        - alert: InferenceLatencyHigh
          expr: |
            slo:http_latency_p99:5m > 5
          for: 5m
          labels:
            severity: warning
            plane: PUBLIC
          annotations:
            summary: "P99 레이턴시 높음 ({{ $value | printf \"%.2f\" }}s)"
            description: "추론 P99 레이턴시가 5s SLO를 초과했습니다."

