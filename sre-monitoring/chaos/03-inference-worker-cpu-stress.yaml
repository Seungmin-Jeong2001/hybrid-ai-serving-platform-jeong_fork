apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: inference-worker-cpu-stress
  namespace: chaos-testing
spec:
  mode: all
  selector:
    namespaces:
      - inference
    labelSelectors:
      app: inference-worker
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "5m"
