name: Private Cloud GPU Validate

on:
  workflow_call:
    inputs:
      use_local_devstack:
        description: Use ha-openstack LXC container for OpenStack CLI
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      use_local_devstack:
        description: Use ha-openstack LXC container for OpenStack CLI
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: private-cloud-gpu-validate
  cancel-in-progress: false

env:
  USE_LOCAL_DEVSTACK: ${{ inputs.use_local_devstack && 'true' || 'false' }}
  OS_AUTH_URL: ${{ vars.OPENSTACK_AUTH_URL }}
  OS_USERNAME: ${{ vars.OPENSTACK_USERNAME }}
  OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
  OS_PROJECT_NAME: ${{ vars.OPENSTACK_PROJECT_NAME }}
  OS_USER_DOMAIN_NAME: ${{ vars.OPENSTACK_USER_DOMAIN_NAME }}
  OS_PROJECT_DOMAIN_NAME: ${{ vars.OPENSTACK_PROJECT_DOMAIN_NAME }}
  OS_REGION_NAME: ${{ vars.OPENSTACK_REGION }}
  OS_IDENTITY_API_VERSION: "3"
  PRIVATE_CLOUD_TOOL_BIN_DIR: ${{ vars.PRIVATE_CLOUD_TOOL_BIN_DIR }}
  GPU_WORKER_IMAGE_NAME: ${{ vars.GPU_WORKER_IMAGE_NAME }}
  GPU_WORKER_FLAVOR_NAME: ${{ vars.GPU_WORKER_FLAVOR_NAME }}
  GPU_VALIDATION_RESOURCE_PREFIX: hybrid-ai-gpu-validate-${{ github.run_id }}-${{ github.run_attempt }}
  GPU_VALIDATION_RUN_ID: ${{ github.run_id }}
  GPU_VALIDATION_RUN_ATTEMPT: ${{ github.run_attempt }}

jobs:
  validate-gpu:
    name: Validate GPU Passthrough
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add local tool directory
        run: |
          if [[ -n "${PRIVATE_CLOUD_TOOL_BIN_DIR:-}" && -d "${PRIVATE_CLOUD_TOOL_BIN_DIR}" ]]; then
            echo "${PRIVATE_CLOUD_TOOL_BIN_DIR}" >> "$GITHUB_PATH"
          fi

      - name: Check validation tools
        run: |
          missing=0
          if [[ "${USE_LOCAL_DEVSTACK}" == "true" ]]; then
            if ! command -v lxc >/dev/null 2>&1; then
              echo "::error::Missing required runner tool for local DevStack OpenStack CLI: lxc"
              missing=1
            elif ! lxc info ha-openstack >/dev/null 2>&1; then
              echo "::error::ha-openstack container is not available"
              missing=1
            elif ! lxc exec ha-openstack -- bash -lc 'command -v openstack >/dev/null 2>&1'; then
              echo "::error::Missing openstack CLI in ha-openstack container"
              missing=1
            fi
          elif ! command -v openstack >/dev/null 2>&1; then
            echo "::error::Missing required runner tool: openstack"
            missing=1
          fi
          exit "${missing}"

      - name: Ensure configured local OpenStack tenant
        if: ${{ inputs.use_local_devstack }}
        run: |
          if [[ -z "${OS_USERNAME:-}" || -z "${OS_PASSWORD:-}" || -z "${OS_PROJECT_NAME:-}" ]]; then
            echo "::error::OPENSTACK_USERNAME, OPENSTACK_PASSWORD, and OPENSTACK_PROJECT_NAME are required"
            exit 1
          fi

          password_file="/tmp/${GPU_VALIDATION_RESOURCE_PREFIX}.tenant-password"
          printf '%s' "${OS_PASSWORD}" \
            | lxc exec ha-openstack -- sudo -u stack -H bash -lc "umask 077 && cat > '${password_file}'"

          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${OS_USERNAME}" \
            "${OS_PROJECT_NAME}" \
            "${OS_USER_DOMAIN_NAME:-Default}" \
            "${OS_PROJECT_DOMAIN_NAME:-Default}" \
            "$password_file" <<'ENSURE_OPENSTACK_TENANT'
          set -euo pipefail
          cd /opt/stack/devstack
          set +u
          source openrc admin admin >/dev/null
          set -u

          user_name="$1"
          project_name="$2"
          user_domain="$3"
          project_domain="$4"
          password_file="$5"
          trap 'rm -f "$password_file"' EXIT
          password="$(cat "$password_file")"

          openstack domain show "$user_domain" >/dev/null
          openstack domain show "$project_domain" >/dev/null
          openstack project create \
            --domain "$project_domain" \
            --description "Hybrid AI private cloud project managed by GitHub Actions" \
            --or-show \
            "$project_name" >/dev/null

          if openstack user show --domain "$user_domain" "$user_name" >/dev/null 2>&1; then
            openstack user set \
              --domain "$user_domain" \
              --project "$project_name" \
              --project-domain "$project_domain" \
              --password "$password" \
              --enable \
              "$user_name"
          else
            openstack user create \
              --domain "$user_domain" \
              --project "$project_name" \
              --project-domain "$project_domain" \
              --password "$password" \
              --enable \
              "$user_name" >/dev/null
          fi

          openstack role add member \
            --user "$user_name" \
            --user-domain "$user_domain" \
            --project "$project_name" \
            --project-domain "$project_domain"

          openstack quota set \
            --instances 10 \
            --cores 20 \
            --ram 51200 \
            --key-pairs 100 \
            --floating-ips -1 \
            --secgroups -1 \
            --secgroup-rules -1 \
            --networks 20 \
            --subnets 20 \
            --ports 200 \
            --routers 20 \
            "$project_name" || true

          if openstack network show public >/dev/null 2>&1; then
            openstack network set --share public || true
          fi
          ENSURE_OPENSTACK_TENANT

      - name: Run isolated GPU validation VM
        timeout-minutes: 45
        run: |
          set -euo pipefail

          image_name="${GPU_WORKER_IMAGE_NAME:-}"
          source_flavor_name="${GPU_WORKER_FLAVOR_NAME:-}"
          if [[ -z "$image_name" || -z "$source_flavor_name" ]]; then
            echo "::error::GPU_WORKER_IMAGE_NAME and GPU_WORKER_FLAVOR_NAME variables are required"
            exit 1
          fi

          resource_prefix="${GPU_VALIDATION_RESOURCE_PREFIX}"
          log_file="${RUNNER_TEMP}/gpu-validation-openstack.log"
          helper_script="${RUNNER_TEMP}/gpu-validation-openstack.sh"

          cat > "$helper_script" <<'VALIDATE_GPU_VM'
          #!/usr/bin/env bash
          set -euo pipefail

          auth_url="$1"
          user_name="$2"
          project_name="$3"
          user_domain="$4"
          project_domain="$5"
          region_name="$6"
          password_file="$7"
          image_name="$8"
          source_flavor_name="$9"
          resource_prefix="${10}"
          run_id="${11}"
          run_attempt="${12}"

          export OS_AUTH_URL="$auth_url"
          export OS_USERNAME="$user_name"
          export OS_PROJECT_NAME="$project_name"
          export OS_USER_DOMAIN_NAME="$user_domain"
          export OS_PROJECT_DOMAIN_NAME="$project_domain"
          export OS_REGION_NAME="$region_name"
          export OS_IDENTITY_API_VERSION=3
          export OS_PASSWORD
          OS_PASSWORD="$(cat "$password_file")"

          network_name="${resource_prefix}-net"
          subnet_name="${resource_prefix}-subnet"
          router_name="${resource_prefix}-router"
          security_group_name="${resource_prefix}-sg"
          flavor_name="${resource_prefix}-flavor"
          server_name="${resource_prefix}-vm"
          user_data="/tmp/${resource_prefix}.user-data.sh"
          console_log="/tmp/${resource_prefix}.console.log"
          source_flavor_json="/tmp/${resource_prefix}.source-flavor.json"
          source_image_json="/tmp/${resource_prefix}.source-image.json"

          subnet_second=$(( (run_id % 200) + 20 ))
          subnet_third=$(( ((run_id / 200) + run_attempt) % 250 ))
          validation_cidr="10.${subnet_second}.${subnet_third}.0/24"

          wait_for_server_delete() {
            local name="$1"
            for _ in $(seq 1 60); do
              if ! openstack server show "$name" >/dev/null 2>&1; then
                return 0
              fi
              sleep 5
            done
            return 1
          }

          cleanup_resources() {
            set +e
            if openstack server show "$server_name" >/dev/null 2>&1; then
              echo "Deleting temporary GPU validation server: $server_name"
              openstack server delete "$server_name" || true
              wait_for_server_delete "$server_name" || true
            fi
            openstack flavor delete "$flavor_name" >/dev/null 2>&1 || true
            if openstack router show "$router_name" >/dev/null 2>&1; then
              openstack router remove subnet "$router_name" "$subnet_name" >/dev/null 2>&1 || true
              openstack router unset --external-gateway "$router_name" >/dev/null 2>&1 || true
              openstack router delete "$router_name" >/dev/null 2>&1 || true
            fi
            openstack subnet delete "$subnet_name" >/dev/null 2>&1 || true
            openstack network delete "$network_name" >/dev/null 2>&1 || true
            openstack security group delete "$security_group_name" >/dev/null 2>&1 || true
            echo "Temporary GPU validation resources cleaned up"
          }

          # shellcheck disable=SC2317
          cleanup() {
            cleanup_resources
            rm -f "$password_file" "$user_data" "$console_log" "$source_flavor_json" "$source_image_json"
          }
          trap cleanup EXIT
          trap 'cleanup; exit 130' INT TERM

          cat > "$user_data" <<'GPU_USER_DATA'
          #!/usr/bin/env bash
          set +e
          exec > >(tee -a /var/log/hybrid-ai-gpu-vm-validation.log /dev/console) 2>&1

          echo "GPU_VALIDATION_BEGIN $(date -Is)"
          echo "hostname=$(hostname)"
          echo "kernel=$(uname -a)"
          export DEBIAN_FRONTEND=noninteractive

          wait_for_apt_locks() {
            local deadline=$((SECONDS + 600))
            local -a locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )
            while true; do
              local busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              fi
              [[ "$busy" -eq 0 ]] && return 0
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks"
                return 1
              fi
              echo "Waiting for apt/dpkg lock to be released..."
              sleep 5
            done
          }

          if ! command -v lspci >/dev/null 2>&1; then
            wait_for_apt_locks && apt-get update -qq && apt-get install -y -qq pciutils
          fi

          echo "GPU_VALIDATION_CHECK=pci"
          lspci -nn | grep -Ei 'nvidia|3d|vga' || true
          if lspci -nn | grep -qi nvidia; then
            echo "GPU_PCI_DETECTED=true"
          else
            echo "GPU_PCI_DETECTED=false"
            echo "GPU_VALIDATION_RESULT=fail"
            exit 1
          fi

          if ! command -v nvidia-smi >/dev/null 2>&1; then
            wait_for_apt_locks && apt-get update -qq && apt-get install -y -qq ubuntu-drivers-common pciutils
            if command -v ubuntu-drivers >/dev/null 2>&1; then
              ubuntu-drivers autoinstall || true
            fi
            modprobe nvidia || true
          fi

          echo "GPU_VALIDATION_CHECK=nvidia-smi"
          if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi; then
            nvidia-smi --query-gpu=index,name,pci.bus_id,pcie.link.gen.current,pcie.link.width.current --format=csv || true
            echo "NVIDIA_SMI_OK=true"
            echo "GPU_VALIDATION_RESULT=pass"
            exit 0
          fi

          echo "NVIDIA_SMI_OK=false"
          echo "GPU_VALIDATION_RESULT=fail"
          exit 1
          GPU_USER_DATA

          echo "GPU validation resource prefix: $resource_prefix"
          echo "GPU validation server: $server_name"
          echo "GPU validation image: $image_name"
          echo "GPU validation source flavor: $source_flavor_name"
          echo "GPU validation subnet CIDR: $validation_cidr"

          openstack token issue -f value -c id >/dev/null
          openstack image show "$image_name" -f json > "$source_image_json"
          openstack flavor show "$source_flavor_name" -f json > "$source_flavor_json"

          external_network_id="$(openstack network show public -f value -c id 2>/dev/null || true)"
          if [[ -z "$external_network_id" ]]; then
            external_network_id="$(openstack network list --external -f value -c ID | head -n 1 || true)"
          fi
          if [[ -z "$external_network_id" ]]; then
            echo "No external OpenStack network found for temporary GPU validation network"
            exit 1
          fi
          external_network_name="$(openstack network show "$external_network_id" -f value -c name 2>/dev/null || echo "$external_network_id")"
          echo "GPU validation external network: $external_network_name ($external_network_id)"

          cleanup_resources

          read -r temp_flavor_ram temp_flavor_vcpus temp_flavor_disk < <(
            python3 - "$source_flavor_json" "$source_image_json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              source_flavor = json.load(handle)
          with open(sys.argv[2], "r", encoding="utf-8") as handle:
              source_image = json.load(handle)

          source_disk = int(source_flavor.get("disk") or 20)
          image_min_disk = int(source_image.get("min_disk") or 0)
          disk = max(1, image_min_disk, min(source_disk, 20))
          ram = max(512, int(source_flavor.get("ram") or 2048), int(source_image.get("min_ram") or 0))
          vcpus = max(1, int(source_flavor.get("vcpus") or 1))
          print(ram, vcpus, disk)
          PY
          )
          if [[ -z "$temp_flavor_ram" || -z "$temp_flavor_vcpus" || -z "$temp_flavor_disk" ]]; then
            echo "Could not calculate temporary validation flavor resources"
            echo "Source flavor metadata:"
            cat "$source_flavor_json" || true
            echo "Source image metadata:"
            cat "$source_image_json" || true
            exit 1
          fi

          openstack flavor create \
            --ram "$temp_flavor_ram" \
            --vcpus "$temp_flavor_vcpus" \
            --disk "$temp_flavor_disk" \
            "$flavor_name" >/dev/null
          while IFS=$'\t' read -r key value; do
            [[ -z "${key:-}" ]] && continue
            openstack flavor set --property "${key}=${value}" "$flavor_name"
          done < <(
            python3 - "$source_flavor_json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              source_flavor = json.load(handle)

          for key, value in (source_flavor.get("properties") or {}).items():
              print(f"{key}\t{value}")
          PY
          )
          echo "GPU validation temporary flavor: $flavor_name (${temp_flavor_ram}MB RAM, ${temp_flavor_vcpus} vCPU, ${temp_flavor_disk}GB disk)"

          openstack network create "$network_name" >/dev/null
          openstack subnet create \
            --network "$network_name" \
            --subnet-range "$validation_cidr" \
            --dns-nameserver 1.1.1.1 \
            --dns-nameserver 8.8.8.8 \
            "$subnet_name" >/dev/null
          openstack router create "$router_name" >/dev/null
          openstack router set --external-gateway "$external_network_id" "$router_name"
          openstack router add subnet "$router_name" "$subnet_name"
          openstack security group create "$security_group_name" >/dev/null
          openstack security group rule create --egress --ethertype IPv4 "$security_group_name" >/dev/null 2>&1 || true
          openstack security group rule create --ingress --protocol icmp --remote-ip 0.0.0.0/0 "$security_group_name" >/dev/null 2>&1 || true
          openstack security group rule create --ingress --protocol tcp --dst-port 22:22 --remote-ip 0.0.0.0/0 "$security_group_name" >/dev/null 2>&1 || true

          network_id="$(openstack network show "$network_name" -f value -c id)"
          security_group_id="$(openstack security group show "$security_group_name" -f value -c id)"
          echo "GPU validation network: $network_name ($network_id)"
          echo "GPU validation security group: $security_group_name ($security_group_id)"

          server_id="$(openstack server create \
            --image "$image_name" \
            --flavor "$flavor_name" \
            --network "$network_id" \
            --security-group "$security_group_id" \
            --user-data "$user_data" \
            --property managed_by=github-actions \
            --property scope=private-cloud-gpu-validation \
            -f value \
            -c id \
            "$server_name")"
          if [[ -z "$server_id" ]]; then
            echo "GPU validation server create returned no server id"
            openstack server list --all-projects --name "$server_name" || true
            exit 1
          fi
          echo "GPU validation server id: $server_id"
          if ! openstack server show "$server_id" >/dev/null 2>&1; then
            echo "GPU validation server was not found after create"
            openstack server list --all-projects --name "$server_name" || true
            exit 1
          fi

          server_status=""
          for index in $(seq 1 90); do
            server_status="$(openstack server show "$server_id" -f value -c status 2>/dev/null || true)"
            echo "server_status=${server_status:-unknown} (${index}/90)"
            if [[ "$server_status" == "ACTIVE" ]]; then
              break
            fi
            if [[ "$server_status" == "ERROR" ]]; then
              echo "GPU validation server entered ERROR state"
              openstack server show "$server_id" -f yaml || true
              exit 1
            fi
            sleep 10
          done

          if [[ "$server_status" != "ACTIVE" ]]; then
            echo "GPU validation server did not become ACTIVE"
            openstack server show "$server_id" -f yaml || true
            exit 1
          fi

          for index in $(seq 1 120); do
            openstack console log show --lines 240 "$server_id" > "$console_log" 2>/dev/null || true
            if grep -q 'GPU_VALIDATION_RESULT=pass' "$console_log"; then
              cat "$console_log"
              echo "GPU validation passed"
              exit 0
            fi
            if grep -q 'GPU_VALIDATION_RESULT=fail' "$console_log"; then
              cat "$console_log"
              echo "GPU validation failed"
              exit 1
            fi
            echo "Waiting for GPU validation console result... (${index}/120)"
            sleep 10
          done

          cat "$console_log" || true
          echo "Timed out waiting for GPU validation console result"
          exit 1
          VALIDATE_GPU_VM
          chmod +x "$helper_script"

          if [[ "${USE_LOCAL_DEVSTACK}" == "true" ]]; then
            openstack_auth_url="http://127.0.0.1/identity/v3"
            password_file="/tmp/${resource_prefix}.password"
            printf '%s' "${OS_PASSWORD}" | lxc exec ha-openstack -- bash -lc "umask 077 && cat > '${password_file}'"
            run_cmd=(lxc exec ha-openstack -- bash -s --)
          else
            openstack_auth_url="${OS_AUTH_URL}"
            password_file="${RUNNER_TEMP}/${resource_prefix}.password"
            umask 077
            printf '%s' "${OS_PASSWORD}" > "$password_file"
            run_cmd=(bash "$helper_script")
          fi

          set +e
          if [[ "${USE_LOCAL_DEVSTACK}" == "true" ]]; then
            "${run_cmd[@]}" \
              "${openstack_auth_url}" \
              "${OS_USERNAME}" \
              "${OS_PROJECT_NAME}" \
              "${OS_USER_DOMAIN_NAME}" \
              "${OS_PROJECT_DOMAIN_NAME}" \
              "${OS_REGION_NAME}" \
              "$password_file" \
              "$image_name" \
              "$source_flavor_name" \
              "$resource_prefix" \
              "${GPU_VALIDATION_RUN_ID}" \
              "${GPU_VALIDATION_RUN_ATTEMPT}" \
              < "$helper_script" | tee "$log_file"
            validation_status="${PIPESTATUS[0]}"
          else
            "${run_cmd[@]}" \
              "${openstack_auth_url}" \
              "${OS_USERNAME}" \
              "${OS_PROJECT_NAME}" \
              "${OS_USER_DOMAIN_NAME}" \
              "${OS_PROJECT_DOMAIN_NAME}" \
              "${OS_REGION_NAME}" \
              "$password_file" \
              "$image_name" \
              "$source_flavor_name" \
              "$resource_prefix" \
              "${GPU_VALIDATION_RUN_ID}" \
              "${GPU_VALIDATION_RUN_ATTEMPT}" | tee "$log_file"
            validation_status="${PIPESTATUS[0]}"
          fi
          set -e

          if [[ "${USE_LOCAL_DEVSTACK}" == "true" ]]; then
            lxc exec ha-openstack -- rm -f "$password_file" 2>/dev/null || true
          else
            rm -f "$password_file"
          fi

          if [[ "$validation_status" -eq 0 ]]; then
            result="passed"
          else
            result="failed"
          fi
          gpu_pci_detected="$(grep -m1 'GPU_PCI_DETECTED=' "$log_file" | cut -d= -f2- || true)"
          nvidia_smi_ok="$(grep -m1 'NVIDIA_SMI_OK=' "$log_file" | cut -d= -f2- || true)"
          pci_devices="$(grep -Ei 'NVIDIA|3D|VGA' "$log_file" | tail -n 20 || true)"
          gpu_query="$(awk '/^index, name, pci.bus_id/{flag=1; print; next} flag && NF {print; count++} count >= 8 {exit}' "$log_file" || true)"
          external_network="$(grep -m1 '^GPU validation external network:' "$log_file" | cut -d: -f2- | xargs || true)"
          temporary_flavor="$(grep -m1 '^GPU validation temporary flavor:' "$log_file" | cut -d: -f2- | xargs || true)"
          validation_cidr="$(grep -m1 '^GPU validation subnet CIDR:' "$log_file" | cut -d: -f2- | xargs || true)"
          network_info="$(grep -m1 '^GPU validation network:' "$log_file" | cut -d: -f2- | xargs || true)"
          security_group_info="$(grep -m1 '^GPU validation security group:' "$log_file" | cut -d: -f2- | xargs || true)"

          {
            echo "## GPU Passthrough Validation"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | \`${result}\` |"
            echo "| Resource prefix | \`${resource_prefix}\` |"
            echo "| Temporary server | \`${resource_prefix}-vm\` |"
            echo "| Temporary network | \`${network_info:-unknown}\` |"
            echo "| Temporary subnet CIDR | \`${validation_cidr:-unknown}\` |"
            echo "| Temporary security group | \`${security_group_info:-unknown}\` |"
            echo "| External network | \`${external_network:-unknown}\` |"
            echo "| Image | \`${image_name}\` |"
            echo "| Source flavor | \`${source_flavor_name}\` |"
            echo "| Temporary flavor | \`${temporary_flavor:-unknown}\` |"
            echo "| GPU PCI detected | \`${gpu_pci_detected:-unknown}\` |"
            echo "| nvidia-smi OK | \`${nvidia_smi_ok:-unknown}\` |"
            echo
            echo "The temporary validation network, subnet, router, security group, and VM are deleted at the end of the job, including failed runs."
            echo
            echo "### Detected PCI Devices"
            echo '```text'
            printf '%s\n' "${pci_devices:-not captured}"
            echo '```'
            echo
            echo "### GPU Query"
            echo '```text'
            printf '%s\n' "${gpu_query:-not captured}"
            echo '```'
            echo
            echo "### Validation Log Tail"
            echo '```text'
            tail -n 160 "$log_file" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$validation_status"
