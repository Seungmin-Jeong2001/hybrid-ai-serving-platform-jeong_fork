name: Private Cloud Remote Executor

on:
  workflow_call:
    inputs:
      command:
        description: ha command to run on the private cloud host
        required: true
        type: string
      run_mode:
        description: apply or reinstall
        required: false
        type: string
        default: apply
      validate_gpu:
        description: Run GPU validation after apply
        required: false
        type: boolean
        default: false
      cleanup_devstack:
        description: Remove the local DevStack container after destroy
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

jobs:
  remote:
    name: Run ha ${{ inputs.command }} over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      REMOTE_HOST: ${{ vars.PRIVATE_CLOUD_TAILSCALE_IP }}
      REMOTE_USER: ${{ vars.PRIVATE_CLOUD_HOST_USER }}
      REMOTE_PORT: ${{ vars.PRIVATE_CLOUD_HOST_PORT || '22' }}
      REMOTE_REPO: ${{ vars.PRIVATE_CLOUD_REMOTE_REPO || '' }}
    steps:
      - name: Validate remote executor inputs
        run: |
          set -euo pipefail
          case "${{ inputs.command }}" in
            ci|apply|destroy) ;;
            *)
              echo "::error::command must be one of: ci, apply, destroy"
              exit 1
              ;;
          esac
          case "${{ inputs.run_mode }}" in
            apply|reinstall) ;;
            *)
              echo "::error::run_mode must be one of: apply, reinstall"
              exit 1
              ;;
          esac
          missing=0
          for name in REMOTE_HOST REMOTE_USER; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository variable: ${name}"
              missing=1
            fi
          done
          for name in TAILSCALE_AUTHKEY PRIVATE_CLOUD_HOST_SSH_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
          PRIVATE_CLOUD_HOST_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_CLOUD_HOST_SSH_PRIVATE_KEY }}

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: ${{ env.REMOTE_HOST }}

      - name: Setup SSH
        run: |
          set -euo pipefail
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$PRIVATE_CLOUD_HOST_SSH_PRIVATE_KEY" > ~/.ssh/private-cloud-host
          chmod 600 ~/.ssh/private-cloud-host
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          PRIVATE_CLOUD_HOST_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_CLOUD_HOST_SSH_PRIVATE_KEY }}

      - name: Write remote environment
        id: envfile
        run: |
          set -euo pipefail
          env_file="${RUNNER_TEMP}/private-cloud-env"
          : > "$env_file"

          write_env() {
            local name="$1"
            local value="${2-}"
            printf '%s=%q\n' "$name" "$value" >> "$env_file"
          }

          write_env GITHUB_RUN_ID "$GITHUB_RUN_ID"
          write_env GITHUB_RUN_ATTEMPT "$GITHUB_RUN_ATTEMPT"
          write_env GITHUB_SHA "$GITHUB_SHA"
          write_env GITHUB_REF "$GITHUB_REF"
          write_env GITHUB_REF_NAME "$GITHUB_REF_NAME"
          write_env HA_CI_COMMAND "${{ inputs.command }}"
          write_env HA_PRIVATE_CLOUD_RUN_MODE "${{ inputs.run_mode }}"
          write_env HA_PRIVATE_CLOUD_VALIDATE_GPU "${{ inputs.validate_gpu && 'true' || 'false' }}"
          write_env HA_PRIVATE_CLOUD_CLEANUP_DEVSTACK "${{ inputs.cleanup_devstack && 'true' || 'false' }}"
          write_env HA_PRIVATE_CLOUD_SYNC_OPENSTACK_USER "true"
          write_env TF_IN_AUTOMATION "true"
          write_env TF_INPUT "false"

          write_env OS_AUTH_URL "$OS_AUTH_URL"
          write_env OS_USERNAME "$OS_USERNAME"
          write_env OS_PASSWORD "$OS_PASSWORD"
          write_env OS_PROJECT_NAME "$OS_PROJECT_NAME"
          write_env OS_USER_DOMAIN_NAME "$OS_USER_DOMAIN_NAME"
          write_env OS_PROJECT_DOMAIN_NAME "$OS_PROJECT_DOMAIN_NAME"
          write_env OS_REGION_NAME "$OS_REGION_NAME"
          write_env OS_IDENTITY_API_VERSION "3"
          write_env HA_DEVSTACK_PASSWORD "$OS_PASSWORD"

          write_env CLOUDFLARE_API_TOKEN "$CLOUDFLARE_API_TOKEN"
          write_env CLOUDFLARE_ZONE_ID "$CLOUDFLARE_ZONE_ID"
          write_env PRIVATE_CLOUD_BASE_DOMAIN "$PRIVATE_CLOUD_BASE_DOMAIN"
          write_env PRIVATE_CLOUD_TAILSCALE_IP "$PRIVATE_CLOUD_TAILSCALE_IP"
          write_env PRIVATE_CLOUD_DNS_TTL "$PRIVATE_CLOUD_DNS_TTL"
          dns_services="$PRIVATE_CLOUD_DNS_SERVICES"
          if [[ ",${dns_services}," != *,harbor,* ]]; then
            dns_services="${dns_services},harbor"
          fi
          write_env PRIVATE_CLOUD_DNS_SERVICES "$dns_services"

          write_env TF_BACKEND_CONFIG "$TF_BACKEND_CONFIG"
          write_env TF_BACKEND_TYPE "$TF_BACKEND_TYPE"
          write_env PRIVATE_CLOUD_TFVARS "$PRIVATE_CLOUD_TFVARS"
          write_env PRIVATE_CLOUD_SSH_PUBLIC_KEY "$PRIVATE_CLOUD_SSH_PUBLIC_KEY"
          write_env PRIVATE_CLOUD_SSH_PRIVATE_KEY "$PRIVATE_CLOUD_SSH_PRIVATE_KEY"
          write_env PRIVATE_CLOUD_SSH_USER "$PRIVATE_CLOUD_SSH_USER"
          write_env PRIVATE_CLOUD_KUBECONFIG_B64 "$PRIVATE_CLOUD_KUBECONFIG_B64"
          write_env GITLAB_ROOT_PASSWORD "$GITLAB_ROOT_PASSWORD"
          write_env HARBOR_ADMIN_PASSWORD "$HARBOR_ADMIN_PASSWORD"
          write_env MINIO_ROOT_PASSWORD "$MINIO_ROOT_PASSWORD"

          write_env TF_VAR_ssh_public_key "$PRIVATE_CLOUD_SSH_PUBLIC_KEY"
          write_env TF_VAR_control_plane_image_name "$CONTROL_PLANE_IMAGE_NAME"
          write_env TF_VAR_control_plane_flavor_name "$CONTROL_PLANE_FLAVOR_NAME"
          write_env TF_VAR_build_worker_count "$BUILD_WORKER_COUNT"
          write_env TF_VAR_build_worker_image_name "$BUILD_WORKER_IMAGE_NAME"
          write_env TF_VAR_build_worker_flavor_name "$BUILD_WORKER_FLAVOR_NAME"
          write_env TF_VAR_gpu_worker_count "$GPU_WORKER_COUNT"
          write_env TF_VAR_gpu_worker_image_name "$GPU_WORKER_IMAGE_NAME"
          write_env TF_VAR_gpu_worker_flavor_name "$GPU_WORKER_FLAVOR_NAME"
          write_env TF_VAR_gpu_driver_package "$GPU_DRIVER_PACKAGE"
          write_env TF_VAR_gpu_cuda_toolkit_package "$GPU_CUDA_TOOLKIT_PACKAGE"
          write_env TF_VAR_gpu_cudnn_package "$GPU_CUDNN_PACKAGE"
          write_env TF_VAR_gpu_training_pytorch_cuda_index_url "$GPU_TRAINING_PYTORCH_CUDA_INDEX_URL"
          write_env TF_VAR_gpu_training_python_packages "$GPU_TRAINING_PYTHON_PACKAGES_JSON"
          write_env TF_VAR_gitlab_count "$GITLAB_COUNT"
          write_env TF_VAR_gitlab_image_name "$GITLAB_IMAGE_NAME"
          write_env TF_VAR_gitlab_flavor_name "$GITLAB_FLAVOR_NAME"
          write_env TF_VAR_gitlab_container_image "$GITLAB_IMAGE"
          write_env TF_VAR_harbor_count "$HARBOR_COUNT"
          write_env TF_VAR_harbor_image_name "$HARBOR_IMAGE_NAME"
          write_env TF_VAR_harbor_flavor_name "$HARBOR_FLAVOR_NAME"

          write_env HA_OPENSTACK_GPU_PCI_ALIAS "$OPENSTACK_GPU_PCI_ALIAS"
          write_env HA_OPENSTACK_GPU_PCI_VENDOR_ID "$OPENSTACK_GPU_PCI_VENDOR_ID"
          write_env HA_OPENSTACK_GPU_PCI_PRODUCT_ID "$OPENSTACK_GPU_PCI_PRODUCT_ID"
          write_env HA_OPENSTACK_GPU_PCI_DEVICE_TYPE "$OPENSTACK_GPU_PCI_DEVICE_TYPE"
          write_env HA_OPENSTACK_GPU_PCI_NUMA_POLICY "$OPENSTACK_GPU_PCI_NUMA_POLICY"
          write_env HA_OPENSTACK_GPU_BIND_IOMMU_GROUP "$OPENSTACK_GPU_BIND_IOMMU_GROUP"
          write_env HA_OPENSTACK_GPU_FLAVOR_NAME "$OPENSTACK_GPU_FLAVOR_NAME"
          write_env HA_OPENSTACK_GPU_FLAVOR_RAM "$OPENSTACK_GPU_FLAVOR_RAM"
          write_env HA_OPENSTACK_GPU_FLAVOR_VCPUS "$OPENSTACK_GPU_FLAVOR_VCPUS"
          write_env HA_OPENSTACK_GPU_FLAVOR_DISK "$OPENSTACK_GPU_FLAVOR_DISK"
          write_env HA_OPENSTACK_IMAGE_CACHE_ENABLED "$OPENSTACK_IMAGE_CACHE_ENABLED"
          write_env HA_OPENSTACK_IMAGE_CACHE_PREFIX "$OPENSTACK_IMAGE_CACHE_PREFIX"
          write_env HA_OPENSTACK_IMAGE_CACHE_DRIVER_PACKAGE "$OPENSTACK_IMAGE_CACHE_DRIVER_PACKAGE"

          chmod 600 "$env_file"
          echo "path=$env_file" >> "$GITHUB_OUTPUT"
        env:
          OS_AUTH_URL: ${{ vars.OPENSTACK_AUTH_URL }}
          OS_USERNAME: ${{ vars.OPENSTACK_USERNAME }}
          OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
          OS_PROJECT_NAME: ${{ vars.OPENSTACK_PROJECT_NAME }}
          OS_USER_DOMAIN_NAME: ${{ vars.OPENSTACK_USER_DOMAIN_NAME }}
          OS_PROJECT_DOMAIN_NAME: ${{ vars.OPENSTACK_PROJECT_DOMAIN_NAME }}
          OS_REGION_NAME: ${{ vars.OPENSTACK_REGION }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          PRIVATE_CLOUD_BASE_DOMAIN: ${{ vars.PRIVATE_CLOUD_BASE_DOMAIN }}
          PRIVATE_CLOUD_TAILSCALE_IP: ${{ vars.PRIVATE_CLOUD_TAILSCALE_IP }}
          PRIVATE_CLOUD_DNS_TTL: ${{ vars.PRIVATE_CLOUD_DNS_TTL || '120' }}
          PRIVATE_CLOUD_DNS_SERVICES: ${{ vars.PRIVATE_CLOUD_DNS_SERVICES || 'openstack,k8s,grafana,argocd,gitlab,harbor' }}
          TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}
          TF_BACKEND_TYPE: ${{ vars.TF_BACKEND_TYPE || 'local' }}
          PRIVATE_CLOUD_TFVARS: ${{ secrets.PRIVATE_CLOUD_TFVARS }}
          PRIVATE_CLOUD_SSH_PUBLIC_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PUBLIC_KEY }}
          PRIVATE_CLOUD_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PRIVATE_KEY }}
          PRIVATE_CLOUD_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
          PRIVATE_CLOUD_KUBECONFIG_B64: ${{ secrets.PRIVATE_CLOUD_KUBECONFIG_B64 }}
          GITLAB_ROOT_PASSWORD: ${{ secrets.GITLAB_ROOT_PASSWORD }}
          HARBOR_ADMIN_PASSWORD: ${{ secrets.HARBOR_ADMIN_PASSWORD }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          CONTROL_PLANE_IMAGE_NAME: ${{ vars.CONTROL_PLANE_IMAGE_NAME || 'ubuntu-22.04' }}
          CONTROL_PLANE_FLAVOR_NAME: ${{ vars.CONTROL_PLANE_FLAVOR_NAME || 'ha.m1.large' }}
          BUILD_WORKER_COUNT: ${{ vars.BUILD_WORKER_COUNT || '1' }}
          BUILD_WORKER_IMAGE_NAME: ${{ vars.BUILD_WORKER_IMAGE_NAME || 'ubuntu-22.04' }}
          BUILD_WORKER_FLAVOR_NAME: ${{ vars.BUILD_WORKER_FLAVOR_NAME || 'ha.m1.large' }}
          GPU_WORKER_COUNT: ${{ vars.GPU_WORKER_COUNT || '1' }}
          GPU_WORKER_IMAGE_NAME: ${{ vars.GPU_WORKER_IMAGE_NAME || 'ubuntu-22.04' }}
          GPU_WORKER_FLAVOR_NAME: ${{ vars.GPU_WORKER_FLAVOR_NAME || 'g1.large' }}
          GPU_DRIVER_PACKAGE: ${{ vars.GPU_DRIVER_PACKAGE || vars.OPENSTACK_IMAGE_CACHE_DRIVER_PACKAGE || 'nvidia-driver-595-open' }}
          GPU_CUDA_TOOLKIT_PACKAGE: ${{ vars.GPU_CUDA_TOOLKIT_PACKAGE || 'cuda-toolkit-12-1' }}
          GPU_CUDNN_PACKAGE: ${{ vars.GPU_CUDNN_PACKAGE || 'cudnn9-cuda-12' }}
          GPU_TRAINING_PYTORCH_CUDA_INDEX_URL: ${{ vars.GPU_TRAINING_PYTORCH_CUDA_INDEX_URL || 'https://download.pytorch.org/whl/cu121' }}
          GPU_TRAINING_PYTHON_PACKAGES_JSON: ${{ vars.GPU_TRAINING_PYTHON_PACKAGES_JSON || '["torch==2.1.0+cu121","torchvision==0.16.0+cu121","torchaudio==2.1.0+cu121","numpy==1.26.4","pandas==2.2.2","scipy==1.11.4","scikit-learn==1.4.2","matplotlib==3.8.4","seaborn==0.13.2","notebook==7.2.2","ipykernel==6.29.5","minio==7.2.8"]' }}
          GITLAB_COUNT: ${{ vars.GITLAB_COUNT || '1' }}
          GITLAB_IMAGE_NAME: ${{ vars.GITLAB_IMAGE_NAME || 'ubuntu-22.04' }}
          GITLAB_FLAVOR_NAME: ${{ vars.GITLAB_FLAVOR_NAME || 'ha.m1.gitlab' }}
          GITLAB_IMAGE: ${{ vars.GITLAB_IMAGE || 'gitlab/gitlab-ce:18.11.4-ce.0' }}
          HARBOR_COUNT: ${{ vars.HARBOR_COUNT || '1' }}
          HARBOR_IMAGE_NAME: ${{ vars.HARBOR_IMAGE_NAME || 'ubuntu-22.04' }}
          HARBOR_FLAVOR_NAME: ${{ vars.HARBOR_FLAVOR_NAME || 'ha.m1.harbor' }}
          OPENSTACK_GPU_PCI_ALIAS: ${{ vars.OPENSTACK_GPU_PCI_ALIAS || 'nvidia-gpu' }}
          OPENSTACK_GPU_PCI_VENDOR_ID: ${{ vars.OPENSTACK_GPU_PCI_VENDOR_ID || '10de' }}
          OPENSTACK_GPU_PCI_PRODUCT_ID: ${{ vars.OPENSTACK_GPU_PCI_PRODUCT_ID || 'auto' }}
          OPENSTACK_GPU_PCI_DEVICE_TYPE: ${{ vars.OPENSTACK_GPU_PCI_DEVICE_TYPE || 'type-PF' }}
          OPENSTACK_GPU_PCI_NUMA_POLICY: ${{ vars.OPENSTACK_GPU_PCI_NUMA_POLICY || 'preferred' }}
          OPENSTACK_GPU_BIND_IOMMU_GROUP: ${{ vars.OPENSTACK_GPU_BIND_IOMMU_GROUP || 'true' }}
          OPENSTACK_GPU_FLAVOR_NAME: ${{ vars.OPENSTACK_GPU_FLAVOR_NAME || 'g1.large' }}
          OPENSTACK_GPU_FLAVOR_RAM: ${{ vars.OPENSTACK_GPU_FLAVOR_RAM || '8192' }}
          OPENSTACK_GPU_FLAVOR_VCPUS: ${{ vars.OPENSTACK_GPU_FLAVOR_VCPUS || '4' }}
          OPENSTACK_GPU_FLAVOR_DISK: ${{ vars.OPENSTACK_GPU_FLAVOR_DISK || '40' }}
          OPENSTACK_IMAGE_CACHE_ENABLED: ${{ vars.OPENSTACK_IMAGE_CACHE_ENABLED || 'true' }}
          OPENSTACK_IMAGE_CACHE_PREFIX: ${{ vars.OPENSTACK_IMAGE_CACHE_PREFIX || 'hybrid-ai-cache' }}
          OPENSTACK_IMAGE_CACHE_DRIVER_PACKAGE: ${{ vars.GPU_DRIVER_PACKAGE || vars.OPENSTACK_IMAGE_CACHE_DRIVER_PACKAGE || 'nvidia-driver-595-open' }}

      - name: Run remote ha command
        run: |
          set -euo pipefail
          remote_repo="$REMOTE_REPO"
          if [[ -z "$remote_repo" ]]; then
            remote_repo="/home/${REMOTE_USER}/project/hybrid-ai-serving-platform"
          fi
          remote_env="${remote_repo}/.ha/ci/github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.env"

          ssh_base=(
            ssh
            -i "$HOME/.ssh/private-cloud-host"
            -p "$REMOTE_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=20
            -o StrictHostKeyChecking=accept-new
            "${REMOTE_USER}@${REMOTE_HOST}"
          )
          scp_base=(
            scp
            -i "$HOME/.ssh/private-cloud-host"
            -P "$REMOTE_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o StrictHostKeyChecking=accept-new
          )

          "${ssh_base[@]}" "mkdir -p '${remote_repo}/.ha/ci'"
          "${scp_base[@]}" "${{ steps.envfile.outputs.path }}" "${REMOTE_USER}@${REMOTE_HOST}:${remote_env}"

          "${ssh_base[@]}" bash -s -- \
            "$remote_repo" \
            "$remote_env" \
            "$GITHUB_SHA" \
            "$GITHUB_REF" \
            "${{ inputs.command }}" \
            "${{ inputs.run_mode }}" \
            "${{ inputs.validate_gpu && 'true' || 'false' }}" \
            "${{ inputs.cleanup_devstack && 'true' || 'false' }}" <<'REMOTE'
          set -euo pipefail

          repo="$1"
          env_file="$2"
          sha="$3"
          ref="$4"
          command="$5"
          run_mode="$6"
          validate_gpu="$7"
          cleanup_devstack="$8"

          cd "$repo"
          original_branch="$(git symbolic-ref --quiet --short HEAD 2>/dev/null || true)"
          original_commit="$(git rev-parse HEAD)"

          cleanup() {
            rm -f "$env_file"
            if [[ -n "$original_branch" ]]; then
              git checkout -q "$original_branch" >/dev/null 2>&1 || true
            else
              git checkout -q "$original_commit" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git status --short
            echo "tracked working tree is dirty on the private cloud host; commit or stash before running Actions" >&2
            exit 1
          fi

          git fetch --prune origin "$ref" || git fetch --prune origin "$sha"
          git checkout -q --detach "$sha"

          set -a
          # shellcheck source=/dev/null
          . "$env_file"
          set +a

          case "$command" in
            ci)
              ./ha ci
              ;;
            apply)
              args=(apply --run-mode "$run_mode" --require-backend-config)
              if [[ "$validate_gpu" == "true" ]]; then
                args+=(--validate-gpu)
              fi
              ./ha "${args[@]}"
              ;;
            destroy)
              args=(destroy --require-backend-config)
              if [[ "$cleanup_devstack" == "true" ]]; then
                args+=(--cleanup-devstack)
              fi
              ./ha "${args[@]}"
              ;;
            *)
              echo "unknown command: $command" >&2
              exit 64
              ;;
          esac
          REMOTE
