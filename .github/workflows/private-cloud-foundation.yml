name: Private Cloud Foundation Core

on:
  workflow_call:
    inputs:
      action:
        description: Action to perform
        required: true
        type: string
      install_openstack:
        description: Install DevStack (OpenStack) on the runner
        required: true
        type: boolean
      bootstrap_kubernetes:
        description: Bootstrap k8s on OpenStack nodes
        required: true
        type: boolean
      apply_kubernetes:
        description: Apply baseline Kubernetes manifests after bootstrap
        required: true
        type: boolean
      setup_storage:
        description: Setup MinIO and NFS storage
        required: true
        type: boolean
      validate_gpu:
        description: Validate GPU passthrough and run tests
        required: true
        type: boolean
      minio_volume_size:
        description: MinIO volume size per disk (Gi)
        required: true
        type: string
      force_cleanup:
        description: Force cleanup all resources including running DevStack
        required: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_ACTION: ${{ inputs.action }}
  INSTALL_OPENSTACK: ${{ inputs.install_openstack && 'true' || 'false' }}
  BOOTSTRAP_KUBERNETES: ${{ inputs.bootstrap_kubernetes && 'true' || 'false' }}
  APPLY_KUBERNETES: ${{ inputs.apply_kubernetes && 'true' || 'false' }}
  # OpenStack settings from GitHub Variables/Secrets
  OS_AUTH_URL: ${{ vars.OPENSTACK_AUTH_URL }}
  OS_USERNAME: ${{ vars.OPENSTACK_USERNAME }}
  OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
  OS_PROJECT_NAME: ${{ vars.OPENSTACK_PROJECT_NAME }}
  OS_USER_DOMAIN_NAME: ${{ vars.OPENSTACK_USER_DOMAIN_NAME }}
  OS_PROJECT_DOMAIN_NAME: ${{ vars.OPENSTACK_PROJECT_DOMAIN_NAME }}
  OS_REGION_NAME: ${{ vars.OPENSTACK_REGION }}
  OS_IDENTITY_API_VERSION: "3"
  # DevStack password (used when installing)
  HA_DEVSTACK_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
  # DNS settings
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
  PRIVATE_CLOUD_BASE_DOMAIN: ${{ vars.PRIVATE_CLOUD_BASE_DOMAIN }}
  PRIVATE_CLOUD_TAILSCALE_IP: ${{ vars.PRIVATE_CLOUD_TAILSCALE_IP }}
  PRIVATE_CLOUD_DNS_TTL: ${{ vars.PRIVATE_CLOUD_DNS_TTL }}
  PRIVATE_CLOUD_DNS_SERVICES: ${{ vars.PRIVATE_CLOUD_DNS_SERVICES && format('{0},gitlab', vars.PRIVATE_CLOUD_DNS_SERVICES) || 'openstack,k8s,grafana,argocd,gitlab' }}
  # Terraform backend
  TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}
  TF_BACKEND_TYPE: ${{ vars.TF_BACKEND_TYPE || 'local' }}
  PRIVATE_CLOUD_TFVARS: ${{ secrets.PRIVATE_CLOUD_TFVARS }}
  # SSH keys
  PRIVATE_CLOUD_SSH_PUBLIC_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PUBLIC_KEY }}
  PRIVATE_CLOUD_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PRIVATE_KEY }}
  PRIVATE_CLOUD_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
  PRIVATE_CLOUD_KUBECONFIG_B64: ${{ secrets.PRIVATE_CLOUD_KUBECONFIG_B64 }}
  # Terraform variables
  TF_VAR_ssh_public_key: ${{ secrets.PRIVATE_CLOUD_SSH_PUBLIC_KEY }}
  TF_VAR_control_plane_image_name: ${{ vars.CONTROL_PLANE_IMAGE_NAME || 'ubuntu-22.04' }}
  TF_VAR_control_plane_flavor_name: ${{ vars.CONTROL_PLANE_FLAVOR_NAME || 'm1.medium' }}
  TF_VAR_build_worker_image_name: ${{ vars.BUILD_WORKER_IMAGE_NAME || 'ubuntu-22.04' }}
  TF_VAR_build_worker_flavor_name: ${{ vars.BUILD_WORKER_FLAVOR_NAME || 'm1.large' }}
  TF_VAR_gpu_worker_image_name: ${{ vars.GPU_WORKER_IMAGE_NAME || 'ubuntu-22.04' }}
  TF_VAR_gpu_worker_flavor_name: ${{ vars.GPU_WORKER_FLAVOR_NAME || 'g1.large' }}
  TF_VAR_gitlab_count: ${{ vars.GITLAB_COUNT || '1' }}
  TF_VAR_gitlab_image_name: ${{ vars.GITLAB_IMAGE_NAME || 'ubuntu-22.04' }}
  TF_VAR_gitlab_flavor_name: ${{ vars.GITLAB_FLAVOR_NAME || 'm1.large' }}
  HA_OPENSTACK_GPU_PCI_ALIAS: ${{ vars.OPENSTACK_GPU_PCI_ALIAS || 'nvidia-gpu' }}
  HA_OPENSTACK_GPU_PCI_VENDOR_ID: ${{ vars.OPENSTACK_GPU_PCI_VENDOR_ID || '10de' }}
  HA_OPENSTACK_GPU_PCI_PRODUCT_ID: ${{ vars.OPENSTACK_GPU_PCI_PRODUCT_ID || 'auto' }}
  HA_OPENSTACK_GPU_PCI_DEVICE_TYPE: ${{ vars.OPENSTACK_GPU_PCI_DEVICE_TYPE || 'type-PF' }}
  HA_OPENSTACK_GPU_PCI_NUMA_POLICY: ${{ vars.OPENSTACK_GPU_PCI_NUMA_POLICY || 'preferred' }}
  HA_OPENSTACK_GPU_BIND_IOMMU_GROUP: ${{ vars.OPENSTACK_GPU_BIND_IOMMU_GROUP || 'true' }}
  HA_OPENSTACK_GPU_FLAVOR_NAME: ${{ vars.OPENSTACK_GPU_FLAVOR_NAME || 'g1.large' }}
  HA_OPENSTACK_GPU_FLAVOR_RAM: ${{ vars.OPENSTACK_GPU_FLAVOR_RAM || '8192' }}
  HA_OPENSTACK_GPU_FLAVOR_VCPUS: ${{ vars.OPENSTACK_GPU_FLAVOR_VCPUS || '4' }}
  HA_OPENSTACK_GPU_FLAVOR_DISK: ${{ vars.OPENSTACK_GPU_FLAVOR_DISK || '30' }}
  HA_DEVSTACK_CONTROL_FLAVOR_NAME: ha.m1.medium
  HA_DEVSTACK_CONTROL_FLAVOR_RAM: "4096"
  HA_DEVSTACK_CONTROL_FLAVOR_VCPUS: "2"
  HA_DEVSTACK_CONTROL_FLAVOR_DISK: "15"
  HA_DEVSTACK_WORKER_FLAVOR_NAME: ha.m1.large
  HA_DEVSTACK_WORKER_FLAVOR_RAM: "8192"
  HA_DEVSTACK_WORKER_FLAVOR_VCPUS: "4"
  HA_DEVSTACK_WORKER_FLAVOR_DISK: "25"

jobs:
  install-openstack:
    name: Install OpenStack (DevStack)
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    if: ${{ inputs.install_openstack }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate DevStack password policy
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          password = os.environ.get("HA_DEVSTACK_PASSWORD", "")
          errors = []
          if not password:
              errors.append("OPENSTACK_PASSWORD is required for local DevStack installs")
          if len(password) < 8:
              errors.append("OPENSTACK_PASSWORD must be at least 8 characters")
          if len(password) > 128:
              errors.append("OPENSTACK_PASSWORD must be 128 characters or fewer")
          if any(ch.isspace() for ch in password):
              errors.append("OPENSTACK_PASSWORD must not contain whitespace")
          if password and not re.fullmatch(r"[A-Za-z0-9._~!-]+", password):
              errors.append(
                  "OPENSTACK_PASSWORD contains characters outside the DevStack-safe set: "
                  "letters, digits, dot, underscore, hyphen, tilde, exclamation"
              )

          if errors:
              for error in errors:
                  print(f"::error::{error}", file=sys.stderr)
              sys.exit(1)

          print("ok: OPENSTACK_PASSWORD satisfies local DevStack policy")
          PY

      - name: Check existing DevStack
        id: check_devstack
        run: |
          if lxc info ha-openstack >/dev/null 2>&1; then
            echo "container_exists=true" >> "$GITHUB_OUTPUT"
            echo "Container ha-openstack exists"
            
            # Check if DevStack is actually running. Apache can return 503 while
            # Keystone's uwsgi socket is missing, so require the version payload.
            if lxc exec ha-openstack -- curl -fsS http://localhost/identity/v3 2>/dev/null | grep -q "v3.14"; then
              echo "devstack_running=true" >> "$GITHUB_OUTPUT"
              echo "DevStack is already running - skipping installation"
            else
              echo "devstack_running=false" >> "$GITHUB_OUTPUT"
              echo "Container exists but Keystone is not ready - will reinstall"
            fi
          else
            echo "container_exists=false" >> "$GITHUB_OUTPUT"
            echo "devstack_running=false" >> "$GITHUB_OUTPUT"
            echo "DevStack container not found - will create and install"
          fi

      - name: Force cleanup DevStack
        id: force_cleanup_devstack
        if: inputs.action != 'destroy' && inputs.force_cleanup && steps.check_devstack.outputs.container_exists == 'true'
        run: |
          echo "FORCE CLEANUP: Stopping and removing DevStack container..."
          lxc stop ha-openstack --force 2>/dev/null || true
          lxc delete ha-openstack --force 2>/dev/null || true
          echo "ran=true" >> "$GITHUB_OUTPUT"
          echo "DevStack container removed"

      - name: Cleanup existing DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' && steps.check_devstack.outputs.container_exists == 'true' && !inputs.force_cleanup
        run: |
          echo "Cleaning up incomplete DevStack installation..."
          lxc stop ha-openstack --force 2>/dev/null || true
          lxc delete ha-openstack --force 2>/dev/null || true
          echo "Cleanup complete"

      - name: Skip DevStack installation
        if: steps.check_devstack.outputs.devstack_running == 'true' && steps.force_cleanup_devstack.outputs.ran != 'true'
        run: |
          echo "DevStack is already running - skipping all installation steps"
          echo "DevStack ready at: http://$(lxc exec ha-openstack -- ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')/identity/v3"

      - name: Create LXC container for DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          desired_lxc_raw_lines() {
            printf '%s\n' \
              'lxc.apparmor.profile=unconfined' \
              'lxc.cap.drop=' \
              'lxc.mount.auto=proc:rw sys:rw cgroup:rw'

            if [[ -d /dev/vfio ]]; then
              printf '%s\n' 'lxc.cgroup2.devices.allow = c 10:196 rwm'
              awk '/vfio/ {print "lxc.cgroup2.devices.allow = c " $1 ":* rwm"}' /proc/devices
            fi
          }

          lxc_container_running() {
            [[ "$(lxc list ha-openstack -c s --format csv | tr -d '"')" == "RUNNING" ]]
          }

          ensure_lxc_raw_config() {
            current="$(lxc config get ha-openstack raw.lxc 2>/dev/null || true)"
            updated="$current"
            while IFS= read -r line; do
              [[ -n "$line" ]] || continue
              if ! printf '%s\n' "$updated" | grep -Fxq "$line"; then
                if [[ -n "$updated" ]]; then
                  updated="${updated}"$'\n'"${line}"
                else
                  updated="$line"
                fi
              fi
            done < <(desired_lxc_raw_lines)

            if [[ "$updated" != "$current" ]]; then
              if lxc_container_running; then
                echo "Stopping ha-openstack to update LXD raw.lxc"
                lxc stop ha-openstack --timeout 60 || lxc stop ha-openstack --force
              fi
              lxc config set ha-openstack raw.lxc "$updated"
              return 0
            fi

            return 1
          }

          ensure_lxc_config_value() {
            key="$1"
            value="$2"
            current="$(lxc config get ha-openstack "$key" 2>/dev/null || true)"
            if [[ "$current" == "$value" ]]; then
              return 1
            fi

            if lxc_container_running; then
              echo "Stopping ha-openstack to update LXD ${key}"
              lxc stop ha-openstack --timeout 60 || lxc stop ha-openstack --force
            fi
            lxc config set ha-openstack "$key" "$value"
            return 0
          }

          configure_lxc_devices() {
            kernel_modules_source="$(readlink -f /lib/modules)"
            ensure_lxc_raw_config || true
            lxc config device add ha-openstack kmsg unix-char source=/dev/kmsg path=/dev/kmsg >/dev/null 2>&1 || true
            lxc config device remove ha-openstack host-kernel-modules >/dev/null 2>&1 || true
            lxc config device add ha-openstack host-kernel-modules disk source="$kernel_modules_source" path=/usr/lib/modules readonly=true >/dev/null 2>&1 || true
            if [[ -e /dev/kvm ]]; then
              lxc config device add ha-openstack kvm unix-char source=/dev/kvm path=/dev/kvm >/dev/null 2>&1 || true
            fi
            if [[ -d /dev/vfio ]]; then
              lxc config device add ha-openstack vfio disk source=/dev/vfio path=/dev/vfio >/dev/null 2>&1 || true
            fi
          }

          if lxc info ha-openstack >/dev/null 2>&1; then
            echo "Container ha-openstack already exists, skipping creation"
            ensure_lxc_config_value security.nesting true || true
            ensure_lxc_config_value security.privileged true || true
            configure_lxc_devices
            lxc start ha-openstack 2>/dev/null || true
          else
            echo "Creating DevStack container..."
            raw_lxc=$(printf 'lxc.apparmor.profile=unconfined\nlxc.cap.drop=\nlxc.mount.auto=proc:rw sys:rw cgroup:rw')
            lxc init ubuntu:24.04 ha-openstack \
              -c security.nesting=true \
              -c security.privileged=true \
              -c raw.lxc="$raw_lxc"
            configure_lxc_devices
            lxc start ha-openstack
            echo "Container created and started"
          fi
          sleep 5
          lxc list | grep ha-openstack

      - name: Ensure DevStack LXC device access
        if: inputs.action != 'destroy'
        run: |
          if ! lxc info ha-openstack >/dev/null 2>&1; then
            echo "DevStack container not found - skipping LXC device access setup"
            exit 0
          fi

          desired_lxc_raw_lines() {
            printf '%s\n' \
              'lxc.apparmor.profile=unconfined' \
              'lxc.cap.drop=' \
              'lxc.mount.auto=proc:rw sys:rw cgroup:rw'

            if [[ -d /dev/vfio ]]; then
              printf '%s\n' 'lxc.cgroup2.devices.allow = c 10:196 rwm'
              awk '/vfio/ {print "lxc.cgroup2.devices.allow = c " $1 ":* rwm"}' /proc/devices
            fi
          }

          lxc_container_running() {
            [[ "$(lxc list ha-openstack -c s --format csv | tr -d '"')" == "RUNNING" ]]
          }

          ensure_lxc_raw_config() {
            current="$(lxc config get ha-openstack raw.lxc 2>/dev/null || true)"
            updated="$current"
            while IFS= read -r line; do
              [[ -n "$line" ]] || continue
              if ! printf '%s\n' "$updated" | grep -Fxq "$line"; then
                if [[ -n "$updated" ]]; then
                  updated="${updated}"$'\n'"${line}"
                else
                  updated="$line"
                fi
              fi
            done < <(desired_lxc_raw_lines)

            if [[ "$updated" != "$current" ]]; then
              if lxc_container_running; then
                echo "Stopping ha-openstack to update LXD raw.lxc"
                lxc stop ha-openstack --timeout 60 || lxc stop ha-openstack --force
              fi
              lxc config set ha-openstack raw.lxc "$updated"
              return 0
            fi

            return 1
          }

          ensure_lxc_config_value() {
            key="$1"
            value="$2"
            current="$(lxc config get ha-openstack "$key" 2>/dev/null || true)"
            if [[ "$current" == "$value" ]]; then
              return 1
            fi

            if lxc_container_running; then
              echo "Stopping ha-openstack to update LXD ${key}"
              lxc stop ha-openstack --timeout 60 || lxc stop ha-openstack --force
            fi
            lxc config set ha-openstack "$key" "$value"
            return 0
          }

          raw_lxc_changed=false
          was_running=false
          if lxc_container_running; then
            was_running=true
          fi
          if ensure_lxc_raw_config; then
            raw_lxc_changed=true
          fi

          kernel_modules_source="$(readlink -f /lib/modules)"
          ensure_lxc_config_value security.nesting true || true
          ensure_lxc_config_value security.privileged true || true
          lxc config device add ha-openstack kmsg unix-char source=/dev/kmsg path=/dev/kmsg >/dev/null 2>&1 || true
          lxc config device remove ha-openstack host-kernel-modules >/dev/null 2>&1 || true
          lxc config device add ha-openstack host-kernel-modules disk source="$kernel_modules_source" path=/usr/lib/modules readonly=true >/dev/null 2>&1 || true
          if [[ -e /dev/kvm ]]; then
            lxc config device add ha-openstack kvm unix-char source=/dev/kvm path=/dev/kvm >/dev/null 2>&1 || true
          fi
          if [[ -d /dev/vfio ]]; then
            lxc config device add ha-openstack vfio disk source=/dev/vfio path=/dev/vfio >/dev/null 2>&1 || true
          fi

          if ! lxc_container_running; then
            lxc start ha-openstack
          fi

          if [[ "$raw_lxc_changed" == "true" && "$was_running" == "true" ]]; then
            echo "::notice::Started ha-openstack after applying LXD VFIO cgroup rules"
            for i in {1..60}; do
              if lxc exec ha-openstack -- curl -fsS http://localhost/identity/v3 2>/dev/null | grep -q "v3.14"; then
                echo "DevStack is ready after LXC device access restart"
                exit 0
              fi
              echo "Waiting for DevStack after LXC restart... ($i/60)"
              sleep 5
            done
            echo "::warning::DevStack did not answer immediately after LXC restart; later verification will check readiness"
          fi

      - name: Install DevStack prerequisites
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          echo "Installing prerequisites..."
          lxc exec ha-openstack -- bash -c '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq git sudo curl ca-certificates iproute2 net-tools kmod openssh-client netcat-openbsd python3-openstackclient
            id stack &>/dev/null || useradd -s /bin/bash -d /opt/stack -m stack
            chmod +x /opt/stack
            echo "stack ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/stack
            chmod 440 /etc/sudoers.d/stack
            chown -R stack:stack /opt/stack
            echo "Prerequisites installed"
          '

      - name: Detect OpenStack GPU passthrough settings
        if: inputs.action != 'destroy'
        run: |
          gpu_vendor_id="$(printf '%s' "${HA_OPENSTACK_GPU_PCI_VENDOR_ID}" | tr '[:upper:]' '[:lower:]' | sed 's/^0x//')"
          gpu_product_id="${HA_OPENSTACK_GPU_PCI_PRODUCT_ID}"
          if [[ "$gpu_product_id" == "auto" ]]; then
            gpu_product_id="$(lxc exec ha-openstack -- bash -s -- "$gpu_vendor_id" <<'DETECT_GPU'
          set -euo pipefail
          vendor_id="$1"
          for device in /sys/bus/pci/devices/*; do
            vendor="$(cat "${device}/vendor" 2>/dev/null || true)"
            product="$(cat "${device}/device" 2>/dev/null || true)"
            class="$(cat "${device}/class" 2>/dev/null || true)"
            vendor="$(printf '%s' "${vendor#0x}" | tr '[:upper:]' '[:lower:]')"
            product="$(printf '%s' "${product#0x}" | tr '[:upper:]' '[:lower:]')"
            class="$(printf '%s' "${class#0x}" | tr '[:upper:]' '[:lower:]')"
            if [[ "$vendor" == "$vendor_id" && "$class" == 03* && -n "$product" ]]; then
              printf '%s\n' "$product"
              exit 0
            fi
          done
          DETECT_GPU
          )"
          else
            gpu_product_id="$(printf '%s' "$gpu_product_id" | tr '[:upper:]' '[:lower:]' | sed 's/^0x//')"
          fi

          gpu_flavor_name="${HA_OPENSTACK_GPU_FLAVOR_NAME}"
          echo "::notice::Using dedicated local DevStack GPU flavor '${gpu_flavor_name}'"

          if [[ -n "$gpu_product_id" ]]; then
            echo "Detected GPU PCI device: ${gpu_vendor_id}:${gpu_product_id}"
          else
            echo "::notice::No NVIDIA display/3D PCI device detected; Nova GPU passthrough config will be skipped"
          fi

          {
            printf 'HA_OPENSTACK_GPU_PCI_VENDOR_ID=%s\n' "$gpu_vendor_id"
            printf 'HA_DETECTED_GPU_PCI_PRODUCT_ID=%s\n' "$gpu_product_id"
            printf 'TF_VAR_gpu_worker_flavor_name=%s\n' "$gpu_flavor_name"
          } >> "$GITHUB_ENV"

      - name: Bind GPU IOMMU group to VFIO
        if: inputs.action != 'destroy'
        run: |
          if [[ "${HA_OPENSTACK_GPU_BIND_IOMMU_GROUP}" != "true" ]]; then
            echo "GPU IOMMU group VFIO bind disabled"
            exit 0
          fi
          if [[ -z "${HA_DETECTED_GPU_PCI_PRODUCT_ID:-}" ]]; then
            echo "No GPU PCI product detected - skipping VFIO bind"
            exit 0
          fi

          lxc exec ha-openstack -- bash -s -- \
            "${HA_OPENSTACK_GPU_PCI_VENDOR_ID}" \
            "${HA_DETECTED_GPU_PCI_PRODUCT_ID}" <<'BIND_GPU_VFIO'
          set -euo pipefail
          vendor_id="$1"
          product_id="$2"
          bdf=""
          for device in /sys/bus/pci/devices/*; do
            vendor="$(cat "${device}/vendor" 2>/dev/null || true)"
            product="$(cat "${device}/device" 2>/dev/null || true)"
            class="$(cat "${device}/class" 2>/dev/null || true)"
            vendor="$(printf '%s' "${vendor#0x}" | tr '[:upper:]' '[:lower:]')"
            product="$(printf '%s' "${product#0x}" | tr '[:upper:]' '[:lower:]')"
            class="$(printf '%s' "${class#0x}" | tr '[:upper:]' '[:lower:]')"
            if [[ "$vendor" == "$vendor_id" && "$product" == "$product_id" && "$class" == 03* ]]; then
              bdf="${device##*/}"
              break
            fi
          done

          if [[ -z "$bdf" ]]; then
            echo "::warning::Could not find GPU PCI device for ${vendor_id}:${product_id}; skipping VFIO bind"
            exit 0
          fi

          group_dir="$(readlink -f "/sys/bus/pci/devices/${bdf}/iommu_group" 2>/dev/null || true)"
          if [[ -z "$group_dir" || ! -d "$group_dir" ]]; then
            echo "::warning::GPU PCI device ${bdf} has no IOMMU group; skipping VFIO bind"
            exit 0
          fi

          echo "Binding GPU IOMMU group $(basename "$group_dir") to vfio-pci"
          modprobe vfio-pci
          for member in "${group_dir}"/devices/*; do
            [[ -e "$member" ]] || continue
            member_bdf="${member##*/}"
            vendor="$(cat "${member}/vendor" 2>/dev/null || true)"
            product="$(cat "${member}/device" 2>/dev/null || true)"
            class="$(cat "${member}/class" 2>/dev/null || true)"
            class="$(printf '%s' "${class#0x}" | tr '[:upper:]' '[:lower:]')"
            if [[ "$class" == 06* ]]; then
              echo "skip: ${member_bdf} (${vendor}:${product}) is a PCI bridge class 0x${class}"
              continue
            fi
            current_driver="$(basename "$(readlink -f "${member}/driver" 2>/dev/null)" 2>/dev/null || true)"
            if [[ "$current_driver" == "vfio-pci" ]]; then
              echo "ok: ${member_bdf} (${vendor}:${product}) is already bound to vfio-pci"
              continue
            fi

            echo "Binding ${member_bdf} (${vendor}:${product}, driver=${current_driver:-none}) to vfio-pci"
            printf vfio-pci >"${member}/driver_override"
            driver_path="$(readlink -f "${member}/driver" 2>/dev/null || true)"
            if [[ -n "$driver_path" ]]; then
              printf '%s' "$member_bdf" >"${driver_path}/unbind"
            fi
            printf '%s' "$member_bdf" >/sys/bus/pci/drivers_probe
            current_driver="$(basename "$(readlink -f "${member}/driver" 2>/dev/null)" 2>/dev/null || true)"
            if [[ "$current_driver" != "vfio-pci" ]]; then
              echo "::error::Failed to bind ${member_bdf} to vfio-pci; current driver=${current_driver:-none}"
              exit 1
            fi
          done
          BIND_GPU_VFIO

      - name: Clone DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -c '
            git clone --depth=1 --branch master https://opendev.org/openstack/devstack /opt/stack/devstack
            echo "DevStack cloned"
          '

      - name: Configure DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          IP=$(lxc exec ha-openstack -- ip -4 addr show eth0 | grep -oP "(?<=inet\s)\d+(\.\d+){3}")
          echo "Configuring DevStack with IP: $IP"
          
          # Create local.conf inside container with all passwords set
          lxc exec ha-openstack -- sudo -u stack -H bash -c "mkdir -p /opt/stack/devstack"
          
          printf '%s' "${HA_DEVSTACK_PASSWORD}" \
            | lxc exec ha-openstack -- sudo -u stack -H bash -c 'umask 077 && cat > /opt/stack/devstack/.devstack-password'

          # Write local.conf without putting the password in the process list.
          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "$IP" \
            "${HA_DETECTED_GPU_PCI_PRODUCT_ID:-}" \
            "${HA_OPENSTACK_GPU_PCI_ALIAS}" \
            "${HA_OPENSTACK_GPU_PCI_VENDOR_ID}" \
            "${HA_OPENSTACK_GPU_PCI_DEVICE_TYPE}" \
            "${HA_OPENSTACK_GPU_PCI_NUMA_POLICY}" <<'WRITE_LOCAL_CONF'
          set -euo pipefail
          IP="$1"
          gpu_product_id="$2"
          gpu_alias="$3"
          gpu_vendor_id="$4"
          gpu_device_type="$5"
          gpu_numa_policy="$6"
          PASSWORD=$(cat /opt/stack/devstack/.devstack-password)
          {
            printf '%s\n' '[[local|localrc]]'
            printf 'ADMIN_PASSWORD=%s\n' "$PASSWORD"
            printf 'DATABASE_PASSWORD=%s\n' "$PASSWORD"
            printf 'RABBIT_PASSWORD=%s\n' "$PASSWORD"
            printf 'SERVICE_PASSWORD=%s\n' "$PASSWORD"
            printf 'SERVICE_TOKEN=%s\n' "$PASSWORD"
            printf 'MYSQL_PASSWORD=%s\n' "$PASSWORD"
            printf 'HOST_IP=%s\n' "$IP"
            printf 'SERVICE_HOST=%s\n' "$IP"
            printf '%s\n' 'LOGFILE=/opt/stack/logs/stack.sh.log'
            printf '%s\n' 'LOG_COLOR=False'
            printf '%s\n' 'VERBOSE=True'
            printf '%s\n' 'LIBVIRT_TYPE=qemu'
            printf '%s\n' 'ENABLE_VOLUME_BACKING_FILE=True'
            printf '%s\n' 'disable_service tempest'
            printf '%s\n' 'disable_service swift'
            printf '%s\n' 'disable_service cinder'
            printf '%s\n' 'ENABLE_KSM=False'
          } > /opt/stack/devstack/local.conf
          if [[ -n "$gpu_product_id" ]]; then
            {
              printf '%s\n' ''
              printf '%s\n' '[[post-config|$NOVA_CONF]]'
              printf '%s\n' '[pci]'
              if [[ -n "$gpu_device_type" ]]; then
                printf 'device_spec = { "vendor_id": "%s", "product_id": "%s", "dev_type": "%s" }\n' "$gpu_vendor_id" "$gpu_product_id" "$gpu_device_type"
              else
                printf 'device_spec = { "vendor_id": "%s", "product_id": "%s" }\n' "$gpu_vendor_id" "$gpu_product_id"
              fi
              if [[ -n "$gpu_device_type" ]]; then
                printf 'alias = { "name": "%s", "vendor_id": "%s", "product_id": "%s", "device_type": "%s", "numa_policy": "%s" }\n' "$gpu_alias" "$gpu_vendor_id" "$gpu_product_id" "$gpu_device_type" "$gpu_numa_policy"
              else
                printf 'alias = { "name": "%s", "vendor_id": "%s", "product_id": "%s", "numa_policy": "%s" }\n' "$gpu_alias" "$gpu_vendor_id" "$gpu_product_id" "$gpu_numa_policy"
              fi
              printf '%s\n' ''
              printf '%s\n' '[filter_scheduler]'
              printf '%s\n' 'available_filters = nova.scheduler.filters.all_filters'
              printf '%s\n' 'enabled_filters = ComputeFilter,ComputeCapabilitiesFilter,ImagePropertiesFilter,ServerGroupAntiAffinityFilter,ServerGroupAffinityFilter,SameHostFilter,DifferentHostFilter,PciPassthroughFilter'
            } >> /opt/stack/devstack/local.conf
          fi
          WRITE_LOCAL_CONF
          
          lxc exec ha-openstack -- chown stack:stack /opt/stack/devstack/local.conf
          lxc exec ha-openstack -- chmod 600 /opt/stack/devstack/local.conf
          echo "local.conf created"

      - name: Patch DevStack for KSM
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          lxc exec ha-openstack -- sed -i 's/^function configure_ksm {/function configure_ksm {\n    return 0/' /opt/stack/devstack/lib/host
          echo "DevStack patched to skip KSM"

      - name: Run DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        timeout-minutes: 90
        run: |
          echo "Starting DevStack installation (this takes 30-60 minutes)..."
          lxc exec ha-openstack -- sudo -u stack -H bash -s <<'RUN_DEVSTACK'
          set -euo pipefail
          cd /opt/stack/devstack
          trap 'rm -f /opt/stack/devstack/.devstack-password' EXIT
          export FORCE=yes
          ./stack.sh < /dev/null
          RUN_DEVSTACK
          echo "DevStack installation complete"

      - name: Ensure DevStack compute flavors
        if: inputs.action != 'destroy'
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${HA_DEVSTACK_CONTROL_FLAVOR_NAME}" \
            "${HA_DEVSTACK_CONTROL_FLAVOR_RAM}" \
            "${HA_DEVSTACK_CONTROL_FLAVOR_VCPUS}" \
            "${HA_DEVSTACK_CONTROL_FLAVOR_DISK}" \
            "${HA_DEVSTACK_WORKER_FLAVOR_NAME}" \
            "${HA_DEVSTACK_WORKER_FLAVOR_RAM}" \
            "${HA_DEVSTACK_WORKER_FLAVOR_VCPUS}" \
            "${HA_DEVSTACK_WORKER_FLAVOR_DISK}" \
            "${HA_OPENSTACK_GPU_FLAVOR_NAME}" \
            "${HA_OPENSTACK_GPU_FLAVOR_RAM}" \
            "${HA_OPENSTACK_GPU_FLAVOR_VCPUS}" \
            "${HA_OPENSTACK_GPU_FLAVOR_DISK}" <<'ENSURE_COMPUTE_FLAVORS'
          set -eo pipefail
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u

          flavor_matches() {
            local flavor_name="$1"
            local expected_ram="$2"
            local expected_vcpus="$3"
            local expected_disk="$4"
            local flavor_json
            flavor_json="$(openstack flavor show "$flavor_name" -f json)"
            python3 - "$expected_ram" "$expected_vcpus" "$expected_disk" "$flavor_json" <<'PY'
          import json
          import sys

          expected_ram, expected_vcpus, expected_disk = map(int, sys.argv[1:4])
          flavor = json.loads(sys.argv[4])
          if (
              int(flavor["ram"]) == expected_ram
              and int(flavor["vcpus"]) == expected_vcpus
              and int(flavor["disk"]) == expected_disk
          ):
              sys.exit(0)
          sys.exit(1)
          PY
          }

          ensure_flavor() {
            local flavor_name="$1"
            local flavor_ram="$2"
            local flavor_vcpus="$3"
            local flavor_disk="$4"

            if openstack flavor show "$flavor_name" >/dev/null 2>&1; then
              if flavor_matches "$flavor_name" "$flavor_ram" "$flavor_vcpus" "$flavor_disk"; then
                echo "Flavor already matches: ${flavor_name}"
              else
                echo "::notice::Recreating local DevStack flavor ${flavor_name} with ${flavor_ram}MB RAM, ${flavor_vcpus} vCPU, ${flavor_disk}GB disk"
                openstack flavor delete "$flavor_name"
                openstack flavor create \
                  --ram "$flavor_ram" \
                  --vcpus "$flavor_vcpus" \
                  --disk "$flavor_disk" \
                  "$flavor_name" >/dev/null
              fi
            else
              openstack flavor create \
                --ram "$flavor_ram" \
                --vcpus "$flavor_vcpus" \
                --disk "$flavor_disk" \
                "$flavor_name" >/dev/null
            fi

            openstack flavor set --property "hw_rng:allowed=True" "$flavor_name"
          }

          ensure_flavor "$1" "$2" "$3" "$4"
          ensure_flavor "$5" "$6" "$7" "$8"
          ensure_flavor "$9" "${10}" "${11}" "${12}"
          ENSURE_COMPUTE_FLAVORS

      - name: Configure Nova GPU passthrough
        if: inputs.action != 'destroy' && env.HA_DETECTED_GPU_PCI_PRODUCT_ID != ''
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${HA_OPENSTACK_GPU_PCI_ALIAS}" \
            "${HA_OPENSTACK_GPU_PCI_VENDOR_ID}" \
            "${HA_DETECTED_GPU_PCI_PRODUCT_ID}" \
            "${HA_OPENSTACK_GPU_PCI_DEVICE_TYPE}" \
            "${HA_OPENSTACK_GPU_PCI_NUMA_POLICY}" \
            "${TF_VAR_gpu_worker_flavor_name}" \
            "${HA_OPENSTACK_GPU_FLAVOR_RAM}" \
            "${HA_OPENSTACK_GPU_FLAVOR_VCPUS}" \
            "${HA_OPENSTACK_GPU_FLAVOR_DISK}" <<'CONFIGURE_GPU_PASSTHROUGH'
          set -euo pipefail
          gpu_alias="$1"
          gpu_vendor_id="$2"
          gpu_product_id="$3"
          gpu_device_type="$4"
          gpu_numa_policy="$5"
          gpu_flavor_name="$6"
          gpu_flavor_ram="$7"
          gpu_flavor_vcpus="$8"
          gpu_flavor_disk="$9"

          cd /opt/stack/devstack
          set +u
          source openrc admin admin >/dev/null
          source functions-common
          set -u

          if [[ -n "$gpu_device_type" ]]; then
            device_spec="{ \"vendor_id\": \"${gpu_vendor_id}\", \"product_id\": \"${gpu_product_id}\", \"dev_type\": \"${gpu_device_type}\" }"
            alias_spec="{ \"name\": \"${gpu_alias}\", \"vendor_id\": \"${gpu_vendor_id}\", \"product_id\": \"${gpu_product_id}\", \"device_type\": \"${gpu_device_type}\", \"numa_policy\": \"${gpu_numa_policy}\" }"
          else
            device_spec="{ \"vendor_id\": \"${gpu_vendor_id}\", \"product_id\": \"${gpu_product_id}\" }"
            alias_spec="{ \"name\": \"${gpu_alias}\", \"vendor_id\": \"${gpu_vendor_id}\", \"product_id\": \"${gpu_product_id}\", \"numa_policy\": \"${gpu_numa_policy}\" }"
          fi
          filters="ComputeFilter,ComputeCapabilitiesFilter,ImagePropertiesFilter,ServerGroupAntiAffinityFilter,ServerGroupAffinityFilter,SameHostFilter,DifferentHostFilter,PciPassthroughFilter"

          for conf in /etc/nova/nova.conf /etc/nova/nova-cpu.conf; do
            [[ -f "$conf" ]] || continue
            iniset -sudo "$conf" pci device_spec "$device_spec"
            iniset -sudo "$conf" pci alias "$alias_spec"
            iniset -sudo "$conf" filter_scheduler available_filters "nova.scheduler.filters.all_filters"
            iniset -sudo "$conf" filter_scheduler enabled_filters "$filters"
          done

          if ! openstack flavor show "$gpu_flavor_name" >/dev/null 2>&1; then
            openstack flavor create \
              --ram "$gpu_flavor_ram" \
              --vcpus "$gpu_flavor_vcpus" \
              --disk "$gpu_flavor_disk" \
              "$gpu_flavor_name" >/dev/null
          fi
          openstack flavor set \
            --property "pci_passthrough:alias=${gpu_alias}:1" \
            --property "hw:pci_numa_affinity_policy=${gpu_numa_policy}" \
            --property "hw_rng:allowed=True" \
            "$gpu_flavor_name"

          sudo systemctl restart devstack@n-api.service devstack@n-sch.service devstack@n-super-cond.service devstack@n-cpu.service
          echo "Configured Nova GPU passthrough alias ${gpu_alias} for ${gpu_vendor_id}:${gpu_product_id} on flavor ${gpu_flavor_name}"
          CONFIGURE_GPU_PASSTHROUGH

      - name: Configure Horizon proxy settings
        run: |
          horizon_domain="openstack.${PRIVATE_CLOUD_BASE_DOMAIN}"
          lxc exec ha-openstack -- bash -s -- "$horizon_domain" <<'CONFIGURE_HORIZON'
          set -euo pipefail
          horizon_domain="$1"
          settings="/opt/stack/horizon/openstack_dashboard/local/local_settings.py"
          python3 - "$settings" "$horizon_domain" <<'PY'
          import sys

          settings, horizon_domain = sys.argv[1], sys.argv[2]
          begin = "# BEGIN hybrid-ai Horizon proxy settings"
          end = "# END hybrid-ai Horizon proxy settings"
          with open(settings, "r", encoding="utf-8") as handle:
              content = handle.read()
          if begin in content and end in content:
              before, rest = content.split(begin, 1)
              _, after = rest.split(end, 1)
              content = before + after.lstrip("\n")
          origins = [
              f"http://{horizon_domain}",
              f"https://{horizon_domain}",
              "http://127.0.0.1:18081",
              "http://localhost:18081",
          ]
          block = f"""
          {begin}
          USE_X_FORWARDED_HOST = True
          SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")
          CSRF_TRUSTED_ORIGINS = {origins!r}
          {end}
          """
          with open(settings, "w", encoding="utf-8") as handle:
              handle.write(content.rstrip() + "\n" + block.lstrip())
          PY
          systemctl reload apache2
          CONFIGURE_HORIZON
          echo "Horizon proxy settings configured for ${horizon_domain}"

      - name: Ensure DevStack Ubuntu image
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${TF_VAR_control_plane_image_name}" \
            "${TF_VAR_build_worker_image_name}" \
            "${TF_VAR_gpu_worker_image_name}" \
            "${TF_VAR_gitlab_image_name}" <<'ENSURE_IMAGE'
          set -eo pipefail
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u

          ensure_image() {
            local image_name="$1"
            local image_url=""
            local image_file=""

            [[ -n "$image_name" ]] || return 0
            if openstack image show "$image_name" >/dev/null 2>&1; then
              echo "Image already exists: $image_name"
              return 0
            fi

            case "$image_name" in
              ubuntu-22.04)
                image_url="https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
                image_file="/opt/stack/images/jammy-server-cloudimg-amd64.img"
                ;;
              ubuntu-24.04)
                image_url="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
                image_file="/opt/stack/images/noble-server-cloudimg-amd64.img"
                ;;
              *)
                echo "::error::Image $image_name does not exist in DevStack and no download URL is configured for it"
                return 1
                ;;
            esac

            mkdir -p /opt/stack/images
            if [[ ! -f "$image_file" ]]; then
              echo "Downloading image $image_name..."
              curl -fL --retry 3 --retry-delay 5 -o "$image_file" "$image_url"
            fi

            echo "Uploading image $image_name to Glance..."
            openstack image create "$image_name" \
              --disk-format qcow2 \
              --container-format bare \
              --public \
              --file "$image_file"
          }

          seen=" "
          for image_name in "$@"; do
            if [[ "$seen" == *" $image_name "* ]]; then
              continue
            fi
            seen="${seen}${image_name} "
            ensure_image "$image_name"
          done
          ENSURE_IMAGE

      - name: Ensure DevStack OpenStack user
        if: inputs.action != 'destroy'
        run: |
          target_username="${OS_USERNAME:-admin}"
          target_project="${OS_PROJECT_NAME:-admin}"
          target_password="${OS_PASSWORD:-}"
          target_user_domain="${OS_USER_DOMAIN_NAME:-Default}"
          target_project_domain="${OS_PROJECT_DOMAIN_NAME:-Default}"

          if [[ -z "$target_password" ]]; then
            echo "::error::OPENSTACK_PASSWORD is required to ensure the local DevStack OpenStack user"
            exit 1
          fi

          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "$target_username" \
            "$target_project" \
            "$target_password" \
            "$target_user_domain" \
            "$target_project_domain" <<'ENSURE_OPENSTACK_USER'
          set -eo pipefail
          target_username="$1"
          target_project="$2"
          target_password="$3"
          target_user_domain="$4"
          target_project_domain="$5"

          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u

          if ! openstack project show --domain "$target_project_domain" "$target_project" >/dev/null 2>&1; then
            openstack project create --domain "$target_project_domain" "$target_project" >/dev/null
          fi

          if openstack user show --domain "$target_user_domain" "$target_username" >/dev/null 2>&1; then
            openstack user set --domain "$target_user_domain" --password "$target_password" "$target_username"
          else
            openstack user create \
              --domain "$target_user_domain" \
              --password "$target_password" \
              "$target_username" >/dev/null
          fi

          if [[ "$target_username" != "admin" ]]; then
            openstack role add \
              --project "$target_project" \
              --project-domain "$target_project_domain" \
              --user "$target_username" \
              --user-domain "$target_user_domain" \
              member
          fi

          echo "Ensured local DevStack user ${target_username} in project ${target_project}"
          ENSURE_OPENSTACK_USER

      - name: Ensure DevStack SSH proxy tools
        run: |
          lxc exec ha-openstack -- bash -s <<'ENSURE_PROXY_TOOLS'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          missing=0
          command -v nc >/dev/null 2>&1 || missing=1
          command -v ssh >/dev/null 2>&1 || missing=1
          if [[ "$missing" -eq 1 ]]; then
            apt-get update -qq
            apt-get install -y -qq netcat-openbsd openssh-client
          fi
          ENSURE_PROXY_TOOLS

      - name: Verify DevStack
        if: always()
        run: |
          echo "Verifying DevStack..."
          if ! lxc info ha-openstack >/dev/null 2>&1; then
            echo "::error::DevStack container not found"
            exit 1
          fi
          IP=$(lxc exec ha-openstack -- ip -4 addr show eth0 2>/dev/null | grep -oP "(?<=inet\s)\d+(\.\d+){3}" || echo "")
          if [[ -z "$IP" ]]; then
            echo "::error::Could not get container IP"
            exit 1
          fi
          if lxc exec ha-openstack -- curl -fsS http://localhost/identity/v3 | grep -q "v3.14"; then
            echo "Keystone is running"
          else
            echo "::error::Keystone not responding"
            exit 1
          fi
          echo "DevStack is ready at http://${IP}/identity/v3"

      - name: Ensure DevStack public egress
        if: inputs.action != 'destroy'
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -s <<'LOOKUP_PUBLIC_EGRESS' > /tmp/ha-devstack-public-egress.env
          set -eo pipefail
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u

          public_subnet_id="$(openstack subnet list --network public --ip-version 4 -f value -c ID | head -n 1)"
          if [[ -z "$public_subnet_id" ]]; then
            echo "missing_public_subnet=true"
            exit 0
          fi

          public_cidr="$(openstack subnet show "$public_subnet_id" -f value -c cidr)"
          public_gateway="$(openstack subnet show "$public_subnet_id" -f value -c gateway_ip)"
          if [[ -z "$public_cidr" || -z "$public_gateway" || "$public_gateway" == "None" ]]; then
            echo "missing_public_subnet=true"
            exit 0
          fi

          prefix="${public_cidr#*/}"
          printf 'public_cidr=%s\n' "$public_cidr"
          printf 'public_gateway=%s\n' "$public_gateway"
          printf 'public_gateway_cidr=%s/%s\n' "$public_gateway" "$prefix"
          LOOKUP_PUBLIC_EGRESS

          # shellcheck disable=SC1091
          source /tmp/ha-devstack-public-egress.env
          if [[ "${missing_public_subnet:-false}" == "true" ]]; then
            echo "::warning::Could not find DevStack public IPv4 subnet; skipping public egress setup"
            exit 0
          fi

          lxc exec ha-openstack -- bash -s -- \
            "$public_cidr" \
            "$public_gateway_cidr" <<'ENSURE_PUBLIC_EGRESS'
          set -euo pipefail
          public_cidr="$1"
          public_gateway_cidr="$2"

          ensure_public_egress() {
            ip link set br-ex up
            if ! ip -4 addr show br-ex | grep -Fqw "$public_gateway_cidr"; then
              ip addr add "$public_gateway_cidr" dev br-ex
            fi
            sysctl -w net.ipv4.ip_forward=1 >/dev/null
            if ! iptables -t nat -C POSTROUTING -s "$public_cidr" ! -d "$public_cidr" -j MASQUERADE >/dev/null 2>&1; then
              iptables -t nat -A POSTROUTING -s "$public_cidr" ! -d "$public_cidr" -j MASQUERADE
            fi
          }

          ensure_public_egress

          install -d -m 0755 /usr/local/sbin
          cat >/usr/local/sbin/ha-devstack-public-egress <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          ip link set br-ex up
          if ! ip -4 addr show br-ex | grep -Fqw "$public_gateway_cidr"; then
            ip addr add "$public_gateway_cidr" dev br-ex
          fi
          sysctl -w net.ipv4.ip_forward=1 >/dev/null
          if ! iptables -t nat -C POSTROUTING -s "$public_cidr" ! -d "$public_cidr" -j MASQUERADE >/dev/null 2>&1; then
            iptables -t nat -A POSTROUTING -s "$public_cidr" ! -d "$public_cidr" -j MASQUERADE
          fi
          EOF
          chmod 0755 /usr/local/sbin/ha-devstack-public-egress

          cat >/etc/systemd/system/ha-devstack-public-egress.service <<'EOF'
          [Unit]
          Description=Hybrid AI DevStack public bridge egress
          After=openvswitch-switch.service network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/ha-devstack-public-egress
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable --now ha-devstack-public-egress.service >/dev/null

          ip -4 addr show br-ex
          iptables -t nat -S POSTROUTING
          ENSURE_PUBLIC_EGRESS

      - name: Ensure proxy device
        if: always()
        run: |
          if ! lxc info ha-openstack >/dev/null 2>&1; then
            echo "DevStack container not found - skipping proxy setup"
            exit 0
          fi
          lxc config device add ha-openstack horizon-proxy proxy listen=tcp:0.0.0.0:18081 connect=tcp:127.0.0.1:80 2>/dev/null || true
          echo "Proxy configured"

  terraform:
    name: Terraform OpenStack
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: install-openstack
    if: always() && (needs.install-openstack.result == 'success' || needs.install-openstack.result == 'skipped')
    env:
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-destroy-ssh
      HA_OPENSTACK_SSH_CONFIG: /tmp/private-cloud-destroy-ssh-config
      HA_KUBECTL_TUNNEL_PORT: "16443"
    defaults:
      run:
        working-directory: private/openstack
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for DevStack
        if: ${{ inputs.install_openstack }}
        run: |
          echo "Waiting for DevStack to be ready..."
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18081/identity/v3 | grep -q "v3.14"; then
              echo "DevStack is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "::error::DevStack did not become ready on http://127.0.0.1:18081/identity/v3"
          exit 1

      - name: Check Terraform job tools
        run: |
          missing=0
          for tool in curl python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${TERRAFORM_ACTION}" == "destroy" && "${INSTALL_OPENSTACK}" == "true" ]]; then
            for tool in ssh lxc; do
              if ! command -v "$tool" >/dev/null 2>&1; then
                echo "::error::Missing required runner tool for local DevStack destroy cleanup: ${tool}"
                missing=1
              fi
            done
          fi
          exit "${missing}"

      - name: Setup Terraform
        env:
          TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.8.5' }}
        run: |
          if command -v terraform >/dev/null 2>&1; then
            terraform version
            exit 0
          fi

          case "$(uname -m)" in
            x86_64|amd64) arch="amd64" ;;
            aarch64|arm64) arch="arm64" ;;
            *) echo "::error::Unsupported runner architecture: $(uname -m)"; exit 1 ;;
          esac

          bin_dir="${RUNNER_TEMP}/terraform-bin"
          zip_file="${RUNNER_TEMP}/terraform.zip"
          mkdir -p "$bin_dir"
          curl -fsSL \
            -o "$zip_file" \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_${arch}.zip"
          python3 - "$zip_file" "$bin_dir" <<'PY'
          import sys
          import zipfile

          zip_file, bin_dir = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(zip_file) as archive:
              archive.extract("terraform", bin_dir)
          PY
          chmod +x "${bin_dir}/terraform"
          echo "$bin_dir" >> "$GITHUB_PATH"
          "${bin_dir}/terraform" version

      - name: Prepare OpenStack environment
        run: |
          write_env() {
            {
              printf '%s<<__EOF__\n' "$1"
              printf '%s\n' "$2"
              printf '__EOF__\n'
            } >> "$GITHUB_ENV"
          }

          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            target_username="${OS_USERNAME:-admin}"
            target_project="${OS_PROJECT_NAME:-admin}"
            target_user_domain="${OS_USER_DOMAIN_NAME:-Default}"
            target_project_domain="${OS_PROJECT_DOMAIN_NAME:-Default}"
            target_region="${OS_REGION_NAME:-RegionOne}"

            write_env OS_AUTH_URL "http://127.0.0.1:18081/identity/v3"
            write_env OS_USERNAME "$target_username"
            write_env OS_PROJECT_NAME "$target_project"
            write_env OS_USER_DOMAIN_NAME "$target_user_domain"
            write_env OS_PROJECT_DOMAIN_NAME "$target_project_domain"
            write_env OS_REGION_NAME "$target_region"
          fi

      - name: Validate required configuration
        run: |
          missing=0
          for name in OS_AUTH_URL OS_USERNAME OS_PASSWORD OS_PROJECT_NAME OS_USER_DOMAIN_NAME OS_PROJECT_DOMAIN_NAME TF_VAR_ssh_public_key; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret or variable: ${name}"
              missing=1
            fi
          done
          if [[ -z "${TF_BACKEND_CONFIG:-}" ]]; then
            if [[ "${TERRAFORM_ACTION}" == "plan" ]]; then
              echo "::warning::TF_BACKEND_CONFIG is empty; plan will not use a remote Terraform state backend"
            else
              echo "::error::TF_BACKEND_CONFIG is required for ${TERRAFORM_ACTION} so state is shared across runs"
              missing=1
            fi
          fi
          exit "${missing}"

      - name: Verify OpenStack login
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          auth_url = os.environ["OS_AUTH_URL"].rstrip("/")
          if not auth_url.endswith("/v3"):
              auth_url = f"{auth_url}/v3"

          payload = {
              "auth": {
                  "identity": {
                      "methods": ["password"],
                      "password": {
                          "user": {
                              "name": os.environ["OS_USERNAME"],
                              "domain": {"name": os.environ["OS_USER_DOMAIN_NAME"]},
                              "password": os.environ["OS_PASSWORD"],
                          }
                      },
                  },
                  "scope": {
                      "project": {
                          "name": os.environ["OS_PROJECT_NAME"],
                          "domain": {"name": os.environ["OS_PROJECT_DOMAIN_NAME"]},
                      }
                  },
              }
          }

          request = urllib.request.Request(
              f"{auth_url}/auth/tokens",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status not in (200, 201):
                      print(f"Unexpected Keystone status: {response.status}", file=sys.stderr)
                      sys.exit(1)
          except urllib.error.HTTPError as exc:
              print(f"OpenStack Keystone login failed: HTTP {exc.code}", file=sys.stderr)
              sys.exit(1)
          except Exception as exc:
              print(f"OpenStack Keystone login failed: {type(exc).__name__}: {exc}", file=sys.stderr)
              sys.exit(1)

          print("ok: OpenStack Keystone login")
          PY

      - name: Write Terraform variable overrides
        run: |
          if [[ -n "${PRIVATE_CLOUD_TFVARS:-}" ]]; then
            printf '%s' "${PRIVATE_CLOUD_TFVARS}" > private-cloud.auto.tfvars
            echo "Wrote Terraform variable overrides from PRIVATE_CLOUD_TFVARS"
          fi

          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            public_network_id=$(lxc exec ha-openstack -- sudo -u stack -H bash -lc \
              'cd /opt/stack/devstack && source openrc admin admin >/dev/null && openstack network show public -f value -c id')
            public_subnet_id=$(lxc exec ha-openstack -- sudo -u stack -H bash -lc \
              'cd /opt/stack/devstack && source openrc admin admin >/dev/null && openstack subnet list --network public --ip-version 4 -f value -c ID | head -n 1')
            if [[ -z "$public_subnet_id" ]]; then
              echo "::error::DevStack public network has no IPv4 subnet"
              exit 1
            fi
            public_subnet_cidr=$(lxc exec ha-openstack -- sudo -u stack -H bash -lc \
              "cd /opt/stack/devstack && source openrc admin admin >/dev/null && openstack subnet show '${public_subnet_id}' -f value -c cidr")
            {
              printf 'external_network_id = "%s"\n' "$public_network_id"
              printf 'floating_ip_pool = "public"\n'
              printf 'assign_floating_ips = true\n'
              printf 'gitlab_http_allowed_cidrs = ["%s"]\n' "$public_subnet_cidr"
              printf 'control_plane_image_name = "%s"\n' "${TF_VAR_control_plane_image_name}"
              printf 'control_plane_flavor_name = "%s"\n' "${HA_DEVSTACK_CONTROL_FLAVOR_NAME}"
              printf 'build_worker_image_name = "%s"\n' "${TF_VAR_build_worker_image_name}"
              printf 'build_worker_flavor_name = "%s"\n' "${HA_DEVSTACK_WORKER_FLAVOR_NAME}"
              printf 'gpu_worker_image_name = "%s"\n' "${TF_VAR_gpu_worker_image_name}"
              printf 'gpu_worker_flavor_name = "%s"\n' "${HA_OPENSTACK_GPU_FLAVOR_NAME}"
              printf 'gitlab_count = %s\n' "${TF_VAR_gitlab_count}"
              printf 'gitlab_image_name = "%s"\n' "${TF_VAR_gitlab_image_name}"
              printf 'gitlab_flavor_name = "%s"\n' "${HA_DEVSTACK_WORKER_FLAVOR_NAME}"
            } > zz-local-devstack.auto.tfvars
            echo "Wrote Terraform DevStack overrides for local OpenStack"
          fi

      - name: Terraform init
        run: |
          if [[ -n "${TF_BACKEND_CONFIG}" ]]; then
            printf "terraform {\n  backend \"%s\" {}\n}\n" "${TF_BACKEND_TYPE}" > backend.generated.tf
            printf "%s" "${TF_BACKEND_CONFIG}" > backend.hcl
            terraform init -backend-config=backend.hcl
          else
            terraform init
          fi

      - name: Import existing OpenStack keypair
        if: ${{ inputs.action == 'apply' || inputs.action == 'destroy' }}
        run: |
          set -euo pipefail

          read_tf_string() {
            local name="$1"
            local default_value="$2"
            python3 - "$name" "$default_value" <<'PY'
          import os
          import pathlib
          import re
          import sys

          name, value = sys.argv[1], sys.argv[2]
          env_value = os.environ.get(f"TF_VAR_{name}")
          if env_value:
              print(env_value)
              raise SystemExit

          pattern = re.compile(rf'^\s*{re.escape(name)}\s*=\s*"([^"]*)"', re.M)
          for filename in ("private-cloud.auto.tfvars", "zz-local-devstack.auto.tfvars"):
              path = pathlib.Path(filename)
              if not path.exists():
                  continue
              match = pattern.search(path.read_text(encoding="utf-8"))
              if match:
                  value = match.group(1)
          print(value)
          PY
          }

          key_pair_name="$(read_tf_string key_pair_name hybrid-ai-private-admin)"
          if terraform state list | grep -qx 'openstack_compute_keypair_v2.admin'; then
            echo "OpenStack keypair is already tracked by Terraform state"
            exit 0
          fi

          if terraform import openstack_compute_keypair_v2.admin "$key_pair_name"; then
            echo "Imported existing OpenStack keypair into Terraform state: ${key_pair_name}"
          else
            echo "::notice::OpenStack keypair ${key_pair_name} does not exist for the current OpenStack user; Terraform will create it"
          fi

      - name: Repair local DevStack Terraform drift
        if: ${{ inputs.action != 'destroy' && env.INSTALL_OPENSTACK == 'true' }}
        run: |
          set -euo pipefail

          read_tf_string() {
            local name="$1"
            local default_value="$2"
            python3 - "$name" "$default_value" <<'PY'
          import os
          import pathlib
          import re
          import sys

          name, value = sys.argv[1], sys.argv[2]
          env_value = os.environ.get(f"TF_VAR_{name}")
          if env_value:
              print(env_value)
              raise SystemExit

          pattern = re.compile(rf'^\s*{re.escape(name)}\s*=\s*"([^"]*)"', re.M)
          for filename in ("private-cloud.auto.tfvars", "zz-local-devstack.auto.tfvars"):
              path = pathlib.Path(filename)
              if not path.exists():
                  continue
              match = pattern.search(path.read_text(encoding="utf-8"))
              if match:
                  value = match.group(1)
          print(value)
          PY
          }

          project_name="$(read_tf_string project_name hybrid-ai-private)"
          private_network_cidr="$(read_tf_string private_network_cidr 10.42.0.0/24)"
          # shellcheck disable=SC2016
          public_subnet_cidr="$(lxc exec ha-openstack -- sudo -u stack -H bash -lc \
            'cd /opt/stack/devstack && source openrc admin admin >/dev/null && public_subnet_id=$(openstack subnet list --network public --ip-version 4 -f value -c ID | head -n 1); [[ -n "$public_subnet_id" ]] && openstack subnet show "$public_subnet_id" -f value -c cidr' \
            2>/dev/null || true)"
          target_project_id="$(lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${OS_PROJECT_NAME}" \
            "${OS_PROJECT_DOMAIN_NAME}" <<'LOOKUP_PROJECT'
          set -eo pipefail
          project_name="$1"
          project_domain="$2"
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          openstack project show --domain "$project_domain" "$project_name" -f value -c id
          LOOKUP_PROJECT
          )"

          echo "Repairing local DevStack drift for ${project_name} in project ${OS_PROJECT_NAME} (${target_project_id})"

          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "$project_name" \
            "$target_project_id" <<'REPAIR_OPENSTACK_DRIFT'
          set -eo pipefail
          project_name="$1"
          target_project_id="$2"

          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u

          python3 - "$project_name" "$target_project_id" <<'PY'
          import json
          import subprocess
          import sys
          import time

          project_name, target_project_id = sys.argv[1:3]

          def openstack_json(*args):
              command = ["openstack", *args, "-f", "json"]
              output = subprocess.check_output(command, text=True)
              return json.loads(output)

          def run(*args):
              subprocess.run(["openstack", *args], check=True)

          def delete_fips_for_port(port_id):
              fips = openstack_json("floating", "ip", "list", "--port", port_id, "-c", "ID")
              for fip in fips:
                  fip_id = fip.get("ID")
                  if fip_id:
                      print(f"Deleting floating IP {fip_id} for stale port {port_id}")
                      run("floating", "ip", "delete", fip_id)

          def wait_for_server_delete(server_id):
              for _ in range(60):
                  try:
                      openstack_json("server", "show", server_id)
                  except subprocess.CalledProcessError:
                      return
                  time.sleep(2)
              print(f"::warning::Timed out waiting for stale server {server_id} to delete")

          ports = openstack_json(
              "port",
              "list",
              "-c",
              "ID",
              "-c",
              "Name",
          )

          stale_devices = set()
          stale_ports = []
          for port in ports:
              name = port.get("Name") or ""
              if not name.startswith(f"{project_name}-"):
                  continue
              if not any(role in name for role in ("control", "build", "gpu", "gitlab")):
                  continue
              port_id = port.get("ID")
              if not port_id:
                  continue
              try:
                  port_details = openstack_json("port", "show", port_id)
              except subprocess.CalledProcessError:
                  continue
              port_project_id = port_details.get("project_id") or port_details.get("Project")
              if port_project_id == target_project_id:
                  continue
              device_id = port_details.get("device_id") or port_details.get("Device") or ""
              if device_id:
                  stale_devices.add(device_id)
              stale_ports.append(port_id)

          for port_id in stale_ports:
              try:
                  delete_fips_for_port(port_id)
              except subprocess.CalledProcessError:
                  pass

          for server_id in sorted(stale_devices):
              try:
                  server = openstack_json("server", "show", server_id)
              except subprocess.CalledProcessError:
                  continue
              print(
                  "Deleting stale server "
                  f"{server.get('name') or server.get('Name') or server_id} ({server_id}) "
                  f"from project {server.get('project_id')}"
              )
              run("server", "delete", server_id)
              wait_for_server_delete(server_id)

          for port_id in stale_ports:
              try:
                  print(f"Deleting stale port {port_id}")
                  run("port", "delete", port_id)
              except subprocess.CalledProcessError:
                  pass

          PY
          REPAIR_OPENSTACK_DRIFT

          state_id() {
            local address="$1"
            terraform state show -no-color "$address" 2>/dev/null \
              | awk -F= '/^[[:space:]]*id[[:space:]]*=/{gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); gsub(/"/, "", $2); print $2; exit}' \
              || true
          }

          port_project_id() {
            local port_id="$1"
            lxc exec ha-openstack -- sudo -u stack -H bash -s -- "$port_id" <<'PORT_PROJECT'
          set -eo pipefail
          port_id="$1"
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          openstack port show "$port_id" -f value -c project_id 2>/dev/null || true
          PORT_PROJECT
          }

          fip_project_id() {
            local fip_id="$1"
            lxc exec ha-openstack -- sudo -u stack -H bash -s -- "$fip_id" <<'FIP_PROJECT'
          set -eo pipefail
          fip_id="$1"
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          openstack floating ip show "$fip_id" -f value -c project_id 2>/dev/null || true
          FIP_PROJECT
          }

          remove_state_if_project_mismatch() {
            local address="$1"
            local kind="$2"
            local resource_id
            local resource_project_id

            resource_id="$(state_id "$address")"
            [[ -n "$resource_id" ]] || return 0

            case "$kind" in
              port) resource_project_id="$(port_project_id "$resource_id")" ;;
              fip) resource_project_id="$(fip_project_id "$resource_id")" ;;
              *) return 0 ;;
            esac

            if [[ -z "$resource_project_id" || "$resource_project_id" != "$target_project_id" ]]; then
              echo "Removing stale state ${address} (${resource_id})"
              terraform state rm "$address" || true
            fi
          }

          remove_state_if_project_mismatch 'openstack_networking_port_v2.gitlab[0]' port
          remove_state_if_project_mismatch 'openstack_networking_floatingip_v2.gitlab[0]' fip
          remove_state_if_project_mismatch 'openstack_networking_port_v2.control_plane[0]' port
          remove_state_if_project_mismatch 'openstack_networking_floatingip_v2.control_plane[0]' fip

          if ! terraform state list | grep -qx 'openstack_networking_secgroup_v2.private'; then
            echo "::notice::Security group is not in Terraform state yet; skipping security group rule import"
            exit 0
          fi

          security_group_id="$(state_id openstack_networking_secgroup_v2.private)"
          if [[ -z "$security_group_id" ]]; then
            echo "::notice::Could not read security group ID from Terraform state; skipping security group rule import"
            exit 0
          fi

          find_rule_id() {
            local protocol="$1"
            local cidr="$2"
            local port_min="${3:-}"
            local port_max="${4:-}"
            lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
              "$security_group_id" \
              "$protocol" \
              "$cidr" \
              "$port_min" \
              "$port_max" <<'FIND_RULE'
          set -eo pipefail
          security_group_id="$1"
          protocol="$2"
          cidr="$3"
          port_min="$4"
          port_max="$5"

          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          rule_json="$(openstack security group rule list "$security_group_id" -f json)"
          python3 - "$protocol" "$cidr" "$port_min" "$port_max" "$rule_json" <<'PY'
          import json
          import sys

          protocol, cidr, port_min, port_max = sys.argv[1:5]
          rules = json.loads(sys.argv[5])

          def port_matches(rule):
              if not port_min:
                  return True
              values = [
                  str(rule.get("Port Range", "")),
                  str(rule.get("port_range", "")),
                  str(rule.get("Port", "")),
              ]
              expected = {port_min, f"{port_min}:{port_max or port_min}"}
              return any(value in expected for value in values if value and value != "None")

          for rule in rules:
              if (
                  rule.get("Direction") == "ingress"
                  and rule.get("Ethertype") == "IPv4"
                  and rule.get("IP Protocol") == protocol
                  and rule.get("IP Range") == cidr
                  and port_matches(rule)
              ):
                  print(rule.get("ID", ""))
                  break
          PY
          FIND_RULE
          }

          import_rule_if_missing() {
            local address="$1"
            local protocol="$2"
            local cidr="${3:-$private_network_cidr}"
            local port_min="${4:-}"
            local port_max="${5:-}"
            local rule_id

            if terraform state list | grep -qx "$address"; then
              return 0
            fi

            rule_id="$(find_rule_id "$protocol" "$cidr" "$port_min" "$port_max")"
            if [[ -z "$rule_id" ]]; then
              echo "No existing ${protocol} rule found for ${cidr}; Terraform will create ${address}"
              return 0
            fi

            echo "Importing existing ${protocol} rule ${rule_id} into ${address}"
            terraform import "$address" "$rule_id"
          }

          import_rule_if_missing openstack_networking_secgroup_rule_v2.allow_internal_tcp tcp
          import_rule_if_missing openstack_networking_secgroup_rule_v2.allow_internal_udp udp
          import_rule_if_missing openstack_networking_secgroup_rule_v2.allow_internal_icmp icmp
          if [[ -n "${public_subnet_cidr:-}" ]]; then
            import_rule_if_missing "openstack_networking_secgroup_rule_v2.allow_gitlab_http[\"${public_subnet_cidr}\"]" tcp "$public_subnet_cidr" 80 80
          fi

      - name: Setup kubectl for destroy cleanup
        if: ${{ inputs.action == 'destroy' }}
        uses: azure/setup-kubectl@v5

      - name: Pre-destroy Kubernetes cleanup
        if: ${{ inputs.action == 'destroy' }}
        env:
          KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          if [[ -n "${PRIVATE_CLOUD_KUBECONFIG_B64:-}" ]]; then
            printf '%s' "${PRIVATE_CLOUD_KUBECONFIG_B64}" | base64 -d > "$KUBECONFIG"
            chmod 600 "$KUBECONFIG"
          elif [[ -f "$KUBECONFIG" ]]; then
            echo "Using existing kubeconfig at $KUBECONFIG"
          else
            echo "::notice::No PRIVATE_CLOUD_KUBECONFIG_B64 or existing kubeconfig found; skipping Kubernetes cleanup before destroy"
            exit 0
          fi

          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
              echo "::notice::PRIVATE_CLOUD_SSH_PRIVATE_KEY is empty; skipping local DevStack kubectl tunnel"
            elif terraform output -json > /tmp/destroy-tf-output.json 2>/dev/null; then
              first_cp_ip=$(python3 - <<'PY'
          import json
          with open('/tmp/destroy-tf-output.json', 'r', encoding='utf-8') as handle:
              data = json.load(handle)
          nodes = data.get('control_plane_nodes', {}).get('value', [])
          if nodes:
              print(nodes[0].get('floating_ip') or nodes[0].get('private_ip') or '')
          PY
              )
              if [[ -n "$first_cp_ip" ]]; then
                mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
                printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
                chmod 600 "$HA_OPENSTACK_SSH_KEY"
                {
                  printf 'Host *\n'
                  printf '  User %s\n' "${PRIVATE_CLOUD_SSH_USER}"
                  printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
                  printf '  BatchMode yes\n'
                  printf '  StrictHostKeyChecking no\n'
                  printf '  CheckHostIP no\n'
                  printf '  UserKnownHostsFile /dev/null\n'
                  printf '  LogLevel ERROR\n'
                  printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
                } > "$HA_OPENSTACK_SSH_CONFIG"
                chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
                pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
                ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
                  -fN \
                  -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
                  "$first_cp_ip"
                sed -i -E "s#server: https://[^[:space:]]+#server: https://127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}#" "$KUBECONFIG"
              else
                echo "::notice::Terraform output did not contain a control-plane IP; skipping local DevStack kubectl tunnel"
              fi
            else
              echo "::notice::Terraform output is not available; skipping local DevStack kubectl tunnel"
            fi
          fi

          if ! kubectl --request-timeout=20s get nodes >/dev/null 2>&1; then
            echo "::notice::Kubernetes API is not reachable; continuing Terraform destroy"
            exit 0
          fi

          echo "Cleaning up Kubernetes resources before Terraform destroy..."
          kubectl delete jobs --all --all-namespaces --ignore-not-found=true --timeout=60s || true
          kubectl delete deployments --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete statefulsets --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete daemonsets --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete pvc --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete pv --all --ignore-not-found=true --timeout=120s || true
          kubectl get namespaces -o name \
            | grep -vE 'kube-system|kube-public|kube-node-lease|default' \
            | xargs -r kubectl delete --timeout=120s || true
          echo "Kubernetes cleanup complete"

      - name: Terraform plan
        run: |
          if [[ "${TERRAFORM_ACTION}" == "destroy" ]]; then
            terraform plan -destroy -out=private-cloud.tfplan
          else
            terraform plan -out=private-cloud.tfplan
          fi

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' || inputs.action == 'destroy' }}
        run: terraform apply -auto-approve private-cloud.tfplan

      - name: Cleanup local DevStack orphans after destroy
        if: ${{ always() && inputs.action == 'destroy' && env.INSTALL_OPENSTACK == 'true' }}
        run: |
          set -euo pipefail

          read_tf_string() {
            local name="$1"
            local default_value="$2"
            python3 - "$name" "$default_value" <<'PY'
          import os
          import pathlib
          import re
          import sys

          name, value = sys.argv[1], sys.argv[2]
          env_value = os.environ.get(f"TF_VAR_{name}")
          if env_value:
              print(env_value)
              raise SystemExit

          pattern = re.compile(rf'^\s*{re.escape(name)}\s*=\s*"([^"]*)"', re.M)
          for filename in ("private-cloud.auto.tfvars", "zz-local-devstack.auto.tfvars"):
              path = pathlib.Path(filename)
              if not path.exists():
                  continue
              match = pattern.search(path.read_text(encoding="utf-8"))
              if match:
                  value = match.group(1)
          print(value)
          PY
          }

          project_name="$(read_tf_string project_name hybrid-ai-private)"
          target_project_id="$(lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${OS_PROJECT_NAME}" \
            "${OS_PROJECT_DOMAIN_NAME}" <<'LOOKUP_PROJECT'
          set -eo pipefail
          project_name="$1"
          project_domain="$2"
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          openstack project show --domain "$project_domain" "$project_name" -f value -c id
          LOOKUP_PROJECT
          )"

          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "$project_name" \
            "$target_project_id" <<'CLEANUP_ORPHANS'
          set -euo pipefail
          project_name="$1"
          target_project_id="$2"

          cd /opt/stack/devstack
          source openrc admin admin >/dev/null

          python3 - "$project_name" "$target_project_id" <<'PY'
          import json
          import subprocess
          import sys
          import time

          project_name, target_project_id = sys.argv[1:3]
          prefix = f"{project_name}-"

          def openstack_json(*args):
              return json.loads(subprocess.check_output(["openstack", *args, "-f", "json"], text=True))

          def run(*args):
              subprocess.run(["openstack", *args], check=False)

          def show(kind, resource_id):
              try:
                  return openstack_json(*kind.split(), "show", resource_id)
              except subprocess.CalledProcessError:
                  return {}

          def name_of(resource):
              return resource.get("Name") or resource.get("name") or ""

          def project_of(resource):
              return resource.get("project_id") or resource.get("Project ID") or resource.get("Project") or ""

          def in_target_project(kind, resource_id):
              resource = show(kind, resource_id)
              project_id = project_of(resource)
              return not project_id or project_id == target_project_id

          def list_named(kind, *extra):
              items = openstack_json(kind, "list", *extra, "-c", "ID", "-c", "Name")
              return [(item.get("ID"), name_of(item)) for item in items if (name_of(item) or "").startswith(prefix)]

          def delete_fips_for_port(port_id):
              try:
                  fips = openstack_json("floating", "ip", "list", "--port", port_id, "-c", "ID")
              except subprocess.CalledProcessError:
                  return
              for fip in fips:
                  fip_id = fip.get("ID")
                  if fip_id:
                      print(f"Deleting floating IP {fip_id} attached to port {port_id}")
                      run("floating", "ip", "delete", fip_id)

          def target_ports():
              ports = []
              for port_id, port_name in list_named("port"):
                  if port_id and in_target_project("port", port_id):
                      ports.append((port_id, port_name))
              return ports

          for port_id, _ in target_ports():
              delete_fips_for_port(port_id)

          server_ids = []
          for server_id, server_name in list_named("server", "--all-projects"):
              details = show("server", server_id)
              if project_of(details) == target_project_id:
                  server_ids.append(server_id)
                  print(f"Deleting orphan server {server_name} ({server_id})")
                  run("server", "delete", server_id)

          for server_id in server_ids:
              for _ in range(90):
                  if not show("server", server_id):
                      break
                  time.sleep(2)

          ports = target_ports()
          for port_id, _ in ports:
              delete_fips_for_port(port_id)

          router_id = ""
          for candidate_id, router_name in list_named("router"):
              if router_name == f"{project_name}-router" and in_target_project("router", candidate_id):
                  router_id = candidate_id
                  break

          subnet_id = ""
          for candidate_id, subnet_name in list_named("subnet"):
              if subnet_name == f"{project_name}-subnet" and in_target_project("subnet", candidate_id):
                  subnet_id = candidate_id
                  break

          if router_id and subnet_id:
              print(f"Removing router interface {router_id} -> {subnet_id}")
              run("router", "remove", "subnet", router_id, subnet_id)

          for port_id, port_name in target_ports():
              print(f"Deleting orphan port {port_name} ({port_id})")
              run("port", "delete", port_id)

          for router_id, router_name in list_named("router"):
              if router_name == f"{project_name}-router" and in_target_project("router", router_id):
                  print(f"Deleting orphan router {router_name} ({router_id})")
                  run("router", "delete", router_id)

          for subnet_id, subnet_name in list_named("subnet"):
              if subnet_name == f"{project_name}-subnet" and in_target_project("subnet", subnet_id):
                  print(f"Deleting orphan subnet {subnet_name} ({subnet_id})")
                  run("subnet", "delete", subnet_id)

          for network_id, network_name in list_named("network"):
              if network_name == f"{project_name}-net" and in_target_project("network", network_id):
                  print(f"Deleting orphan network {network_name} ({network_id})")
                  run("network", "delete", network_id)

          security_groups = openstack_json("security", "group", "list", "-c", "ID", "-c", "Name")
          for security_group in security_groups:
              sg_id = security_group.get("ID")
              sg_name = name_of(security_group)
              if not sg_id or sg_name != f"{project_name}-sg":
                  continue
              details = show("security group", sg_id)
              project_id = project_of(details)
              if not project_id or project_id == target_project_id:
                  print(f"Deleting orphan security group {sg_name} ({sg_id})")
                  run("security", "group", "delete", sg_id)
          PY
          CLEANUP_ORPHANS

      - name: Export Terraform outputs
        if: ${{ inputs.action == 'apply' }}
        run: |
          mkdir -p "${RUNNER_TEMP}/private-cloud"
          terraform output -json > "${RUNNER_TEMP}/private-cloud/terraform-output.json"

      - name: Upload Terraform outputs
        if: ${{ inputs.action == 'apply' }}
        uses: actions/upload-artifact@v5
        with:
          name: terraform-output
          path: ${{ runner.temp }}/private-cloud/terraform-output.json
          retention-days: 1

      - name: Cleanup Terraform sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG"
          rm -f backend.generated.tf backend.hcl private-cloud.auto.tfvars zz-local-devstack.auto.tfvars private-cloud.tfplan

  dns:
    name: Configure DNS
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ always() && needs.terraform.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify DNS prerequisites
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ZONE_ID PRIVATE_CLOUD_BASE_DOMAIN PRIVATE_CLOUD_TAILSCALE_IP; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret or variable: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Preview, apply, or delete DNS records
        run: |
          args=()
          if [[ "${TERRAFORM_ACTION}" == "apply" ]]; then
            args+=(--apply)
          elif [[ "${TERRAFORM_ACTION}" == "destroy" ]]; then
            args+=(--delete --apply)
          fi
          python3 private/reverse-proxy/cloudflare_dns.py "${args[@]}"

  cleanup-devstack:
    name: Cleanup DevStack Container
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: terraform
    if: ${{ always() && inputs.action == 'destroy' && inputs.install_openstack && inputs.force_cleanup && needs.terraform.result == 'success' }}
    steps:
      - name: Remove DevStack container
        run: |
          lxc stop ha-openstack --force 2>/dev/null || true
          lxc delete ha-openstack --force 2>/dev/null || true
          echo "DevStack container removed"

  setup-gitlab:
    name: Setup GitLab
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: terraform
    if: ${{ always() && needs.terraform.result == 'success' && inputs.action == 'apply' }}
    outputs:
      ready: ${{ steps.install.outputs.ready || 'false' }}
    defaults:
      run:
        working-directory: private/openstack
    env:
      GITLAB_INSTALL_ENABLED: ${{ vars.GITLAB_INSTALL_ENABLED || 'true' }}
      GITLAB_DOMAIN: ${{ vars.GITLAB_DOMAIN || 'gitlab.intp.me' }}
      GITLAB_EXTERNAL_URL: ${{ vars.GITLAB_EXTERNAL_URL || 'https://gitlab.intp.me' }}
      GITLAB_IMAGE: ${{ vars.GITLAB_IMAGE || 'gitlab/gitlab-ce:18.11.4-ce.0' }}
      GITLAB_ROOT_PASSWORD: ${{ secrets.GITLAB_ROOT_PASSWORD }}
      GITLAB_SIGNUP_ENABLED: ${{ vars.GITLAB_SIGNUP_ENABLED || 'false' }}
      GITLAB_UPSTREAM_PORT: ${{ vars.GITLAB_UPSTREAM_PORT || '18083' }}
      GITLAB_GPU_RUNNER_NAME_PREFIX: ${{ vars.GITLAB_GPU_RUNNER_NAME_PREFIX || 'hybrid-ai-gpu' }}
      GITLAB_GPU_RUNNER_TAGS: ${{ vars.GITLAB_GPU_RUNNER_TAGS || 'gpu-worker' }}
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-gitlab-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/gitlab_ssh_config
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check GitLab job tools
        run: |
          missing=0
          for tool in curl ssh python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]] && ! command -v lxc >/dev/null 2>&1; then
            echo "::error::Missing required runner tool for local DevStack proxy: lxc"
            missing=1
          fi
          exit "${missing}"

      - name: Download Terraform outputs
        uses: actions/download-artifact@v5
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Setup SSH key
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
              printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
            fi
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          echo "SSH key and config configured"

      - name: Get GitLab inputs
        id: gitlab
        run: |
          if [[ "${GITLAB_INSTALL_ENABLED}" != "true" ]]; then
            echo "::notice::GITLAB_INSTALL_ENABLED is not true; skipping GitLab installation"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [[ "${GITLAB_UPSTREAM_PORT}" =~ ^[0-9]+$ ]] || (( GITLAB_UPSTREAM_PORT < 1 || GITLAB_UPSTREAM_PORT > 65535 )); then
            echo "::error::GITLAB_UPSTREAM_PORT must be a TCP port number between 1 and 65535"
            exit 1
          fi
          if [[ -n "${GITLAB_ROOT_PASSWORD:-}" ]]; then
            echo "::add-mask::$GITLAB_ROOT_PASSWORD"
            python3 - <<'PY'
          import os
          import sys

          password = os.environ.get("GITLAB_ROOT_PASSWORD", "")
          errors = []
          if len(password) < 8:
              errors.append("GITLAB_ROOT_PASSWORD must be at least 8 characters")
          if any(ch.isspace() for ch in password):
              errors.append("GITLAB_ROOT_PASSWORD must not contain whitespace")
          if errors:
              for error in errors:
                  print(f"::error::{error}", file=sys.stderr)
              sys.exit(1)
          PY
          fi

          cp "${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json" /tmp/tf-output.json
          python3 - <<'PY' > /tmp/gitlab-output.env
          import json
          import sys

          with open('/tmp/tf-output.json', 'r', encoding='utf-8') as handle:
              data = json.load(handle)

          nodes = data.get('gitlab_nodes', {}).get('value', []) or []
          if not nodes:
              print("NO_GITLAB_NODES=true")
              sys.exit(0)

          node = nodes[0]
          target = node.get('floating_ip') or node.get('private_ip') or ''
          if not target:
              print("NO_GITLAB_TARGET=true")
              sys.exit(0)

          print(f"GITLAB_NODE_NAME={node.get('name', '')}")
          print(f"GITLAB_TARGET_IP={target}")
          print(f"GITLAB_PRIVATE_IP={node.get('private_ip', '') or ''}")
          print(f"GITLAB_FLOATING_IP={node.get('floating_ip', '') or ''}")
          PY
          cat /tmp/gitlab-output.env >> "$GITHUB_OUTPUT"
          cat /tmp/gitlab-output.env

          if grep -q '^NO_GITLAB_NODES=true$' /tmp/gitlab-output.env; then
            echo "::notice::Terraform output does not contain GitLab nodes; skipping GitLab installation"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if grep -q '^NO_GITLAB_TARGET=true$' /tmp/gitlab-output.env; then
            echo "::notice::GitLab node has no reachable IP; skipping GitLab installation"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Wait for GitLab VM SSH and egress
        if: ${{ steps.gitlab.outputs.enabled == 'true' }}
        run: |
          repair_local_devstack_egress() {
            [[ "${INSTALL_OPENSTACK}" == "true" ]] || return 0
            lxc info ha-openstack >/dev/null 2>&1 || return 0

            lxc exec ha-openstack -- sudo -u stack -H bash -s <<'LOOKUP_PUBLIC_EGRESS' > /tmp/ha-devstack-public-egress.env
          set -eo pipefail
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u
          public_subnet_id="$(openstack subnet list --network public --ip-version 4 -f value -c ID | head -n 1)"
          [[ -n "$public_subnet_id" ]] || exit 0
          public_cidr="$(openstack subnet show "$public_subnet_id" -f value -c cidr)"
          public_gateway="$(openstack subnet show "$public_subnet_id" -f value -c gateway_ip)"
          [[ -n "$public_cidr" && -n "$public_gateway" && "$public_gateway" != "None" ]] || exit 0
          prefix="${public_cidr#*/}"
          printf 'public_cidr=%s\n' "$public_cidr"
          printf 'public_gateway_cidr=%s/%s\n' "$public_gateway" "$prefix"
          LOOKUP_PUBLIC_EGRESS

            # shellcheck disable=SC1091
            source /tmp/ha-devstack-public-egress.env || return 0
            [[ -n "${public_cidr:-}" && -n "${public_gateway_cidr:-}" ]] || return 0
            lxc exec ha-openstack -- bash -s -- "$public_cidr" "$public_gateway_cidr" <<'ENSURE_PUBLIC_EGRESS'
          set -euo pipefail
          public_cidr="$1"
          public_gateway_cidr="$2"
          ip link set br-ex up
          if ! ip -4 addr show br-ex | grep -Fqw "$public_gateway_cidr"; then
            ip addr add "$public_gateway_cidr" dev br-ex
          fi
          sysctl -w net.ipv4.ip_forward=1 >/dev/null
          if ! iptables -t nat -C POSTROUTING -s "$public_cidr" ! -d "$public_cidr" -j MASQUERADE >/dev/null 2>&1; then
            iptables -t nat -A POSTROUTING -s "$public_cidr" ! -d "$public_cidr" -j MASQUERADE
          fi
          ENSURE_PUBLIC_EGRESS
          }

          target="${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}"
          registry_host="registry-1.docker.io"
          if [[ "${GITLAB_IMAGE}" == */*/* ]]; then
            registry_host="${GITLAB_IMAGE%%/*}"
          fi
          repair_local_devstack_egress

          for i in {1..90}; do
            if ssh -o ConnectTimeout=10 -F "$HA_OPENSTACK_SSH_CONFIG" "$target" \
              "getent ahostsv4 archive.ubuntu.com >/dev/null \
                && curl -4 -fsSI --max-time 15 http://archive.ubuntu.com/ubuntu/ >/dev/null \
                && curl -4 -sSI --max-time 15 https://${registry_host}/v2/ >/dev/null"; then
              echo "GitLab VM SSH, apt egress, and container registry egress are ready"
              exit 0
            fi

            if (( i % 6 == 0 )); then
              repair_local_devstack_egress
            fi
            echo "Waiting for GitLab VM SSH, apt egress, and container registry egress... ($i/90)"
            sleep 10
          done

          echo "::error::GitLab VM did not become reachable with working apt/container registry egress"
          exit 1

      - name: Install GitLab bootstrap service
        id: install
        if: ${{ steps.gitlab.outputs.enabled == 'true' }}
        timeout-minutes: 25
        run: |
          root_password_file=""
          if [[ -n "${GITLAB_ROOT_PASSWORD:-}" ]]; then
            root_password_file="/tmp/gitlab-root-password-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            printf '%s' "$GITLAB_ROOT_PASSWORD" \
              | ssh -F "$HA_OPENSTACK_SSH_CONFIG" "${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}" \
                  "umask 077 && cat > ${root_password_file}"
          fi

          ssh -F "$HA_OPENSTACK_SSH_CONFIG" "${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}" bash -s -- \
            "$GITLAB_EXTERNAL_URL" \
            "$GITLAB_DOMAIN" \
            "$GITLAB_IMAGE" \
            "$GITLAB_SIGNUP_ENABLED" \
            "$GITLAB_GPU_RUNNER_NAME_PREFIX" \
            "$GITLAB_GPU_RUNNER_TAGS" \
            "$root_password_file" <<'REMOTE'
          set -euo pipefail

          external_url="$1"
          gitlab_domain="$2"
          gitlab_image="$3"
          gitlab_signup_enabled="$4"
          runner_name_prefix="$5"
          runner_tags="$6"
          root_password_file="${7:-}"

          cleanup() {
            if [[ -n "$root_password_file" ]]; then
              sudo rm -f "$root_password_file" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          sudo install -d -m 0700 /etc/hybrid-ai
          sudo install -d -m 0755 /usr/local/sbin /var/lib/hybrid-ai/gitlab-bootstrap
          if [[ -n "$root_password_file" && -s "$root_password_file" ]]; then
            sudo install -m 0600 -o root -g root "$root_password_file" /etc/hybrid-ai/gitlab-root-password
          fi

          env_file_tmp="$(mktemp)"
          write_env_line() {
            local name="$1"
            local value="$2"
            value="${value//\\/\\\\}"
            value="${value//\"/\\\"}"
            printf '%s="%s"\n' "$name" "$value" >> "$env_file_tmp"
          }
          write_env_line GITLAB_EXTERNAL_URL "$external_url"
          write_env_line GITLAB_DOMAIN "$gitlab_domain"
          write_env_line GITLAB_IMAGE "$gitlab_image"
          write_env_line GITLAB_SIGNUP_ENABLED "$gitlab_signup_enabled"
          write_env_line GITLAB_ROOT_PASSWORD_FILE /etc/hybrid-ai/gitlab-root-password
          write_env_line GITLAB_GPU_RUNNER_NAME_PREFIX "$runner_name_prefix"
          write_env_line GITLAB_GPU_RUNNER_TAGS "$runner_tags"
          sudo install -m 0644 -o root -g root "$env_file_tmp" /etc/hybrid-ai/gitlab-bootstrap.env
          rm -f "$env_file_tmp"

          sudo tee /usr/local/sbin/hybrid-ai-gitlab-bootstrap >/dev/null <<'BOOTSTRAP'
          #!/usr/bin/env bash
          set -euo pipefail

          state_dir=/var/lib/hybrid-ai/gitlab-bootstrap
          status_file="${state_dir}/status.env"
          runner_token_file="${state_dir}/runner-token"
          web_ready=false
          rails_cli_ready=false
          runner_token_ready=false
          image_change_blocked=false

          save_status() {
            local phase="$1"
            local message="$2"
            local container_image=""
            local container_status=""

            mkdir -p "$state_dir"
            if command -v docker >/dev/null 2>&1; then
              container_image="$(docker inspect -f '{{.Config.Image}}' gitlab 2>/dev/null || true)"
              container_status="$(docker inspect -f '{{.State.Status}}' gitlab 2>/dev/null || true)"
            fi
            if [[ -s "$runner_token_file" ]]; then
              runner_token_ready=true
            fi

            {
              printf 'updated_at=%q\n' "$(date -Iseconds)"
              printf 'phase=%q\n' "$phase"
              printf 'message=%q\n' "$message"
              printf 'gitlab_image=%q\n' "${GITLAB_IMAGE:-}"
              printf 'container_image=%q\n' "$container_image"
              printf 'container_status=%q\n' "$container_status"
              printf 'web_ready=%q\n' "$web_ready"
              printf 'rails_cli_ready=%q\n' "$rails_cli_ready"
              printf 'runner_token_ready=%q\n' "$runner_token_ready"
              printf 'image_change_blocked=%q\n' "$image_change_blocked"
            } > "${status_file}.tmp"
            chmod 0644 "${status_file}.tmp"
            mv "${status_file}.tmp" "$status_file"
          }

          fail_status() {
            local status=$?
            if [[ "$status" -ne 0 ]]; then
              save_status failed "exit_${status}"
            fi
            exit "$status"
          }
          trap fail_status EXIT

          wait_for_apt_locks() {
            local deadline=$((SECONDS + 900))
            local locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )
            while true; do
              local busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              fi
              [[ "$busy" -eq 0 ]] && return 0
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks" >&2
                return 1
              fi
              sleep 5
            done
          }

          wait_for_install_egress() {
            local deadline=$((SECONDS + 900))
            local registry_host="registry-1.docker.io"
            if [[ "${GITLAB_IMAGE}" == */*/* ]]; then
              registry_host="${GITLAB_IMAGE%%/*}"
            fi

            while true; do
              if getent ahostsv4 archive.ubuntu.com >/dev/null 2>&1 \
                && curl -4 -fsSI --max-time 15 http://archive.ubuntu.com/ubuntu/ >/dev/null 2>&1 \
                && curl -4 -sSI --max-time 15 "https://${registry_host}/v2/" >/dev/null 2>&1; then
                return 0
              fi
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/container registry egress" >&2
                return 1
              fi
              sleep 10
            done
          }

          data_dir_has_gitlab_data() {
            [[ -d /srv/gitlab/data ]] || return 1
            find /srv/gitlab/data -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null | grep -q .
          }

          ensure_apt_config() {
            cat >/etc/apt/apt.conf.d/99hybrid-ai-force-ipv4 <<'EOF'
          Acquire::ForceIPv4 "true";
          Acquire::Retries "5";
          Dpkg::Lock::Timeout "900";
          EOF
          }

          ensure_packages() {
            export DEBIAN_FRONTEND=noninteractive
            export NEEDRESTART_MODE=a
            local apt_get_common=(
              -o Acquire::ForceIPv4=true
              -o Acquire::Retries=5
              -o Dpkg::Lock::Timeout=900
            )
            wait_for_install_egress
            wait_for_apt_locks
            apt-get "${apt_get_common[@]}" update -qq
            apt-get "${apt_get_common[@]}" install -y -qq ca-certificates curl docker.io openssh-server python3 tzdata
            systemctl enable --now docker
          }

          write_omnibus_config() {
            install -d -m 0755 /srv/gitlab/config /srv/gitlab/logs /srv/gitlab/data
            if [[ -s "${GITLAB_ROOT_PASSWORD_FILE:-}" && ! -s /srv/gitlab/config/root_password ]]; then
              install -m 0600 -o root -g root "$GITLAB_ROOT_PASSWORD_FILE" /srv/gitlab/config/root_password
            fi

            cat >/srv/gitlab/config/omnibus_config.rb <<EOF
          external_url '${GITLAB_EXTERNAL_URL}'
          if File.exist?('/etc/gitlab/root_password')
            gitlab_rails['initial_root_password'] = File.read('/etc/gitlab/root_password').strip
          end
          letsencrypt['enable'] = false
          nginx['listen_port'] = 80
          nginx['listen_https'] = false
          gitlab_rails['gitlab_shell_ssh_port'] = 2222
          gitlab_rails['usage_ping_enabled'] = false
          gitlab_rails['time_zone'] = 'UTC'
          puma['worker_processes'] = 0
          sidekiq['max_concurrency'] = 5
          prometheus_monitoring['enable'] = false
          prometheus['enable'] = false
          alertmanager['enable'] = false
          node_exporter['enable'] = false
          redis_exporter['enable'] = false
          postgres_exporter['enable'] = false
          gitlab_exporter['enable'] = false
          gitlab_kas['enable'] = false
          registry['enable'] = false
          gitlab_pages['enable'] = false
          nginx['proxy_set_headers'] = {
            "Host" => "\$http_host",
            "X-Real-IP" => "\$remote_addr",
            "X-Forwarded-For" => "\$proxy_add_x_forwarded_for",
            "X-Forwarded-Proto" => "https",
            "X-Forwarded-Ssl" => "on",
            "X-Forwarded-Port" => "443"
          }
          EOF
          }

          ensure_container() {
            local current_image=""
            local current_status=""

            current_image="$(docker inspect -f '{{.Config.Image}}' gitlab 2>/dev/null || true)"
            current_status="$(docker inspect -f '{{.State.Status}}' gitlab 2>/dev/null || true)"
            if [[ -n "$current_image" && "$current_image" != "$GITLAB_IMAGE" && "$(data_dir_has_gitlab_data && echo true || echo false)" == "true" ]]; then
              image_change_blocked=true
              echo "Existing GitLab data is present with image ${current_image}; keeping it instead of switching to ${GITLAB_IMAGE}"
              if [[ "$current_status" != "running" ]]; then
                docker start gitlab
              fi
              return 0
            fi

            if [[ -z "$current_image" || "$current_image" != "$GITLAB_IMAGE" ]]; then
              docker rm -f gitlab >/dev/null 2>&1 || true
              docker pull "$GITLAB_IMAGE"
              docker run --detach \
                --hostname "$GITLAB_DOMAIN" \
                --env GITLAB_OMNIBUS_CONFIG="from_file('/etc/gitlab/omnibus_config.rb')" \
                --publish 80:80 \
                --publish 2222:22 \
                --name gitlab \
                --restart unless-stopped \
                --volume /srv/gitlab/config:/etc/gitlab \
                --volume /srv/gitlab/logs:/var/log/gitlab \
                --volume /srv/gitlab/data:/var/opt/gitlab \
                --shm-size 256m \
                "$GITLAB_IMAGE"
              return 0
            fi

            if [[ "$current_status" != "running" ]]; then
              docker start gitlab
            fi
          }

          wait_for_web() {
            local i
            web_ready=false
            for i in {1..36}; do
              if ! docker ps --format '{{.Names}}' | grep -qx gitlab; then
                docker logs --tail 120 gitlab >&2 || true
                save_status container_stopped "gitlab_container_not_running"
                return 1
              fi
              if curl -fsS http://127.0.0.1/users/sign_in >/dev/null 2>&1 \
                || curl -fsS http://127.0.0.1/-/readiness >/dev/null 2>&1; then
                web_ready=true
                rm -f /srv/gitlab/config/root_password >/dev/null 2>&1 || true
                save_status web_ready "gitlab_web_ready"
                return 0
              fi
              if (( i % 6 == 0 )); then
                docker logs --tail 80 gitlab || true
              fi
              save_status booting "waiting_for_gitlab_web"
              sleep 10
            done
            save_status booting "gitlab_web_still_booting"
            return 0
          }

          run_rails() {
            docker exec gitlab timeout 180 gitlab-rails runner "$1"
          }

          apply_rails_settings() {
            local signup_value=false
            local container_root_password_file=""

            [[ "$web_ready" == "true" ]] || return 0
            if run_rails "puts 'rails_ready'" >/dev/null 2>&1; then
              rails_cli_ready=true
            else
              rails_cli_ready=false
              save_status web_ready "rails_cli_not_ready"
              return 0
            fi

            if [[ "${GITLAB_SIGNUP_ENABLED:-false}" == "true" ]]; then
              signup_value=true
            fi
            run_rails "::Gitlab::CurrentSettings.update!(signup_enabled: ${signup_value})"

            if [[ -s "${GITLAB_ROOT_PASSWORD_FILE:-}" ]]; then
              container_root_password_file="/tmp/hybrid-ai-root-password"
              docker cp "$GITLAB_ROOT_PASSWORD_FILE" "gitlab:${container_root_password_file}" >/dev/null
              docker exec gitlab chmod 600 "$container_root_password_file"
              run_rails "password = File.read('${container_root_password_file}').strip; user = User.find_by_username('root'); raise 'missing root user' unless user; user.password = password; user.password_confirmation = password; user.password_automatically_set = false if user.respond_to?(:password_automatically_set=); user.password_expires_at = nil if user.respond_to?(:password_expires_at=); user.unlock_access! if user.respond_to?(:unlock_access!) && user.access_locked?; user.save!"
              run_rails "password = File.read('${container_root_password_file}').strip; user = User.find_by_username('root'); raise 'root password verification failed' unless user&.valid_password?(password)"
              docker exec gitlab rm -f "$container_root_password_file" >/dev/null 2>&1 || true
            fi

            save_status rails_ready "gitlab_account_settings_applied"
          }

          ensure_runner_token() {
            local bootstrap_pat=""
            local response_file=""
            local status=""

            [[ "$rails_cli_ready" == "true" ]] || return 0
            if [[ -s "$runner_token_file" ]]; then
              chmod 0600 "$runner_token_file"
              runner_token_ready=true
              save_status runner_token_ready "existing_runner_token"
              return 0
            fi

            bootstrap_pat="$(python3 - <<'PY'
          import secrets
          import string

          alphabet = string.ascii_letters + string.digits
          print(''.join(secrets.choice(alphabet) for _ in range(24)))
          PY
          )"
            response_file="$(mktemp)"
            revoke_bootstrap_pat() {
              docker exec -e HYBRID_AI_RUNNER_BOOTSTRAP_PAT="$bootstrap_pat" gitlab timeout 180 gitlab-rails runner "token = PersonalAccessToken.find_by_token(ENV.fetch('HYBRID_AI_RUNNER_BOOTSTRAP_PAT')); token.revoke! if token && !token.revoked?" >/dev/null 2>&1 || true
              rm -f "$response_file"
            }

            if ! docker exec -e HYBRID_AI_RUNNER_BOOTSTRAP_PAT="$bootstrap_pat" gitlab timeout 180 gitlab-rails runner "user = User.find_by_username('root') || abort('root user not found'); token = user.personal_access_tokens.create(scopes: ['create_runner'], name: \"hybrid-ai-runner-bootstrap-#{Time.now.to_i}\", expires_at: 1.day.from_now); token.set_token(ENV.fetch('HYBRID_AI_RUNNER_BOOTSTRAP_PAT')); token.save!"; then
              revoke_bootstrap_pat
              save_status rails_ready "runner_token_pat_create_failed"
              return 0
            fi

            if ! status="$(curl -sS -o "$response_file" -w "%{http_code}" \
              --request POST \
              --url "http://127.0.0.1/api/v4/user/runners" \
              --header "PRIVATE-TOKEN: ${bootstrap_pat}" \
              --data-urlencode "runner_type=instance_type" \
              --data-urlencode "description=${GITLAB_GPU_RUNNER_NAME_PREFIX:-hybrid-ai-gpu}" \
              --data-urlencode "tag_list=${GITLAB_GPU_RUNNER_TAGS:-gpu-worker}" \
              --data-urlencode "run_untagged=false" \
              --data-urlencode "locked=false")"; then
              revoke_bootstrap_pat
              save_status rails_ready "runner_token_api_unreachable"
              return 0
            fi

            if [[ "$status" != "201" ]]; then
              echo "GitLab runner token creation failed with HTTP ${status}" >&2
              cat "$response_file" >&2
              revoke_bootstrap_pat
              save_status rails_ready "runner_token_api_not_ready"
              return 0
            fi

            if ! python3 - "$response_file" "$runner_token_file" <<'PY'
          import json
          import os
          import sys

          response_file, token_file = sys.argv[1:3]
          with open(response_file, 'r', encoding='utf-8') as handle:
              payload = json.load(handle)
          token = payload.get('token', '')
          if not token:
              raise SystemExit('runner token missing from GitLab API response')
          with open(token_file, 'w', encoding='utf-8') as handle:
              handle.write(token)
          os.chmod(token_file, 0o600)
          PY
            then
              revoke_bootstrap_pat
              save_status rails_ready "runner_token_parse_failed"
              return 0
            fi
            revoke_bootstrap_pat
            runner_token_ready=true
            save_status runner_token_ready "runner_token_created"
          }

          main() {
            save_status starting "bootstrap_started"
            cloud-init status --wait >/dev/null 2>&1 || true
            hostnamectl set-hostname "$GITLAB_DOMAIN" || true
            ensure_apt_config
            ensure_packages
            for package in gitlab-ce gitlab-ee; do
              local package_status=""
              package_status="$(dpkg-query -W -f='${db:Status-Abbrev}' "$package" 2>/dev/null || true)"
              if [[ -n "$package_status" && "$package_status" != "ii " ]]; then
                dpkg --remove --force-remove-reinstreq "$package" >/dev/null 2>&1 || true
              fi
            done
            rm -rf /opt/gitlab /etc/gitlab /var/opt/gitlab /var/log/gitlab
            write_omnibus_config
            ensure_container
            wait_for_web
            apply_rails_settings
            ensure_runner_token
            if [[ "$web_ready" == "true" ]]; then
              save_status complete "bootstrap_complete"
            else
              save_status booting "gitlab_web_still_booting"
            fi
          }

          main "$@"
          BOOTSTRAP
          sudo chmod 0755 /usr/local/sbin/hybrid-ai-gitlab-bootstrap

          sudo tee /etc/systemd/system/hybrid-ai-gitlab-bootstrap.service >/dev/null <<'EOF'
          [Unit]
          Description=Hybrid AI GitLab bootstrap
          After=network-online.target docker.service
          Wants=network-online.target docker.service

          [Service]
          Type=oneshot
          TimeoutStartSec=45min
          EnvironmentFile=/etc/hybrid-ai/gitlab-bootstrap.env
          ExecStart=/usr/local/sbin/hybrid-ai-gitlab-bootstrap
          EOF

          sudo tee /etc/systemd/system/hybrid-ai-gitlab-bootstrap.timer >/dev/null <<'EOF'
          [Unit]
          Description=Retry Hybrid AI GitLab bootstrap

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=5min
          Persistent=true

          [Install]
          WantedBy=timers.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable --now hybrid-ai-gitlab-bootstrap.timer
          sudo systemctl reset-failed hybrid-ai-gitlab-bootstrap.service >/dev/null 2>&1 || true
          sudo systemctl start --no-block hybrid-ai-gitlab-bootstrap.service

          for i in {1..36}; do
            if curl -fsS http://127.0.0.1/users/sign_in >/dev/null 2>&1 || curl -fsS http://127.0.0.1/-/readiness >/dev/null 2>&1; then
              echo "GitLab web is responding locally"
              sudo cat /var/lib/hybrid-ai/gitlab-bootstrap/status.env 2>/dev/null || true
              exit 0
            fi
            if sudo systemctl is-failed --quiet hybrid-ai-gitlab-bootstrap.service; then
              echo "::error::GitLab bootstrap service failed"
              sudo systemctl status hybrid-ai-gitlab-bootstrap.service --no-pager || true
              sudo journalctl -u hybrid-ai-gitlab-bootstrap.service -n 200 --no-pager || true
              sudo cat /var/lib/hybrid-ai/gitlab-bootstrap/status.env 2>/dev/null || true
              exit 1
            fi
            sudo cat /var/lib/hybrid-ai/gitlab-bootstrap/status.env 2>/dev/null || true
            echo "Waiting for GitLab bootstrap service to expose web... ($i/36)"
            sleep 10
          done

          if sudo systemctl is-failed --quiet hybrid-ai-gitlab-bootstrap.service; then
            echo "::error::GitLab bootstrap service failed"
            sudo systemctl status hybrid-ai-gitlab-bootstrap.service --no-pager || true
            sudo journalctl -u hybrid-ai-gitlab-bootstrap.service -n 200 --no-pager || true
            sudo cat /var/lib/hybrid-ai/gitlab-bootstrap/status.env 2>/dev/null || true
            exit 1
          fi
          echo "GitLab bootstrap is running in the background"
          sudo systemctl status hybrid-ai-gitlab-bootstrap.service --no-pager || true
          sudo cat /var/lib/hybrid-ai/gitlab-bootstrap/status.env 2>/dev/null || true
          REMOTE

          if ssh -F "$HA_OPENSTACK_SSH_CONFIG" "${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}" \
            "curl -fsS http://127.0.0.1/-/readiness >/dev/null 2>&1 || curl -fsS http://127.0.0.1/users/sign_in >/dev/null 2>&1"; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitLab bootstrap service is installed and retrying on the VM; re-run apply after web is ready to register GPU runners."
          fi

      - name: Configure GitLab reverse proxy upstream
        if: ${{ steps.gitlab.outputs.enabled == 'true' }}
        run: |
          pgrep -f "ssh .*127.0.0.1:${GITLAB_UPSTREAM_PORT}:127.0.0.1:80" | xargs -r kill || true

          if [[ "${INSTALL_OPENSTACK}" == "true" && -n "${{ steps.gitlab.outputs.GITLAB_PRIVATE_IP }}" ]] && lxc info ha-openstack >/dev/null 2>&1; then
            lxc config device remove ha-openstack gitlab-proxy >/dev/null 2>&1 || true
            lxc config device add ha-openstack gitlab-proxy proxy \
              "listen=tcp:127.0.0.1:${GITLAB_UPSTREAM_PORT}" \
              "connect=tcp:${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}:80"
            echo "Configured LXD proxy 127.0.0.1:${GITLAB_UPSTREAM_PORT} -> ${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}:80"
          else
            ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
              -fN \
              -L "127.0.0.1:${GITLAB_UPSTREAM_PORT}:127.0.0.1:80" \
              "${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}"
            echo "Started SSH proxy 127.0.0.1:${GITLAB_UPSTREAM_PORT} -> ${{ steps.gitlab.outputs.GITLAB_TARGET_IP }}:80"
          fi

          upstream_status="booting"
          if curl -fsS "http://127.0.0.1:${GITLAB_UPSTREAM_PORT}/users/sign_in" >/dev/null 2>&1 || curl -fsS "http://127.0.0.1:${GITLAB_UPSTREAM_PORT}/-/readiness" >/dev/null 2>&1; then
            upstream_status="ready"
            echo "GitLab upstream proxy is ready on 127.0.0.1:${GITLAB_UPSTREAM_PORT}"
          else
            echo "::notice::GitLab upstream proxy is configured, but GitLab is still booting"
          fi

          {
            echo "## GitLab"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| URL | \`${GITLAB_EXTERNAL_URL}\` |"
            echo "| Domain | \`${GITLAB_DOMAIN}\` |"
            echo "| Node | \`${{ steps.gitlab.outputs.GITLAB_NODE_NAME }}\` |"
            echo "| Upstream | \`127.0.0.1:${GITLAB_UPSTREAM_PORT}\` |"
            echo "| Status | \`${upstream_status}\` |"
            echo "| Sign-up enabled | \`${GITLAB_SIGNUP_ENABLED}\` |"
            if [[ -n "${GITLAB_ROOT_PASSWORD:-}" ]]; then
              echo "| Root password | configured from \`GITLAB_ROOT_PASSWORD\` secret when GitLab is ready |"
            else
              echo "| Root password | generated on VM at \`/srv/gitlab/config/initial_root_password\` after first boot |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reload Caddy for GitLab
        if: ${{ steps.gitlab.outputs.enabled == 'true' }}
        env:
          HA_GIT_DOMAIN: ${{ env.GITLAB_DOMAIN }}
          HA_GITLAB_UPSTREAM: ${{ format('127.0.0.1:{0}', env.GITLAB_UPSTREAM_PORT) }}
        run: |
          if ! command -v caddy >/dev/null 2>&1; then
            echo "::notice::caddy binary not found on runner; reload manually after applying private/reverse-proxy/Caddyfile.cloudflare"
            exit 0
          fi

          config="../reverse-proxy/Caddyfile.cloudflare"
          if caddy validate --config "$config"; then
            if caddy reload --config "$config"; then
              echo "Reloaded Caddy with GitLab route for ${HA_GIT_DOMAIN}"
            elif command -v sudo >/dev/null 2>&1 && sudo --preserve-env=HA_CADDY_ACME_EMAIL,HA_OPENSTACK_DOMAIN,HA_K8S_DOMAIN,HA_GRAFANA_DOMAIN,HA_ARGOCD_DOMAIN,HA_GIT_DOMAIN,HA_OPENSTACK_HORIZON_UPSTREAM,HA_K8S_DASHBOARD_UPSTREAM,HA_GRAFANA_UPSTREAM,HA_ARGOCD_UPSTREAM,HA_GITLAB_UPSTREAM,CLOUDFLARE_API_TOKEN caddy reload --config "$config"; then
              echo "Reloaded Caddy with GitLab route for ${HA_GIT_DOMAIN}"
            else
              echo "::notice::Caddy reload failed or Caddy is not running; run caddy reload manually with ${config}"
            fi
          else
            echo "::notice::Caddy config validation failed on this runner; check that the Cloudflare DNS module is installed"
          fi

      - name: Cleanup GitLab sensitive files
        if: always()
        run: |
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG"

  bootstrap-k8s:
    name: Bootstrap Kubernetes
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: terraform
    if: ${{ always() && needs.terraform.result == 'success' && inputs.bootstrap_kubernetes && inputs.action == 'apply' }}
    defaults:
      run:
        working-directory: private/openstack
    env:
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/ssh_config
      HA_OPENSTACK_KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
      HA_KUBECTL_TUNNEL_PORT: "16443"
      HA_K8S_VERSION_MINOR: ${{ vars.PRIVATE_CLOUD_K8S_VERSION_MINOR || 'v1.36' }}
      HA_K8S_POD_CIDR: ${{ vars.PRIVATE_CLOUD_K8S_POD_CIDR || '192.168.0.0/16' }}
      HA_K8S_CNI_MANIFEST: ${{ vars.PRIVATE_CLOUD_K8S_CNI_MANIFEST || 'https://raw.githubusercontent.com/projectcalico/calico/v3.32.0/manifests/calico.yaml' }}
      HA_K8S_API_ENDPOINT: ${{ vars.PRIVATE_CLOUD_K8S_API_ENDPOINT || vars.PRIVATE_CLOUD_TAILSCALE_IP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check bootstrap job tools
        run: |
          missing=0
          for tool in ssh python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]] && ! command -v lxc >/dev/null 2>&1; then
            echo "::error::Missing required runner tool for local DevStack SSH proxy: lxc"
            missing=1
          fi
          exit "${missing}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Download Terraform outputs
        uses: actions/download-artifact@v5
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Setup SSH key
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
              printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
            fi
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          echo "SSH key and config configured"

      - name: Wait for nodes SSH
        timeout-minutes: 15
        run: |
          echo "Waiting for nodes to be SSH-ready..."
          cp "${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json" /tmp/tf-output.json

          python3 - <<'PY' > /tmp/node-inventory.txt
          import json
          with open('/tmp/tf-output.json', 'r') as f:
              data = json.load(f)

          def get_ip(node):
              return node.get('floating_ip') or node.get('private_ip')

          for key in ('control_plane_nodes', 'build_worker_nodes', 'gpu_worker_nodes'):
              for node in data.get(key, {}).get('value', []):
                  ip = get_ip(node)
                  if ip:
                      print(f"{ip} {node.get('name', '')}")
          PY

          if [[ ! -s /tmp/node-inventory.txt ]]; then
            echo "::error::Terraform output did not contain any node IPs"
            exit 1
          fi

          while read -r ip name; do
            echo "Checking $name ($ip)..."
            ready=false
            deadline=$((SECONDS + 600))
            while (( SECONDS < deadline )); do
              if ssh -F "$HA_OPENSTACK_SSH_CONFIG" -n -o ConnectTimeout=10 "$ip" 'true' 2>/dev/null; then
                echo "  $name is ready"
                ready=true
                break
              fi
              sleep 10
            done
            if [[ "$ready" != "true" ]]; then
              echo "::error::$name ($ip) did not become SSH-ready"
              exit 1
            fi
          done < /tmp/node-inventory.txt
          echo "All nodes are SSH-ready"

      - name: Bootstrap Kubernetes nodes
        timeout-minutes: 60
        run: |
          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            export HA_OPENSTACK_SSH_PROXY_CONTAINER="ha-openstack"
            export HA_K8S_API_ENDPOINT="127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"
          fi
          export HA_OPENSTACK_TF_OUTPUT_JSON="${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json"
          export HA_OPENSTACK_SSH_TARGET="auto"
          ../kubernetes-bootstrap/bootstrap-k8s.sh
          echo "Kubernetes bootstrap complete"

      - name: Start kubectl SSH tunnel
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        run: |
          FIRST_CP_IP=$(python3 - <<'PY'
          import json
          with open('/tmp/tf-output.json', 'r') as f:
              data = json.load(f)
          nodes = data.get('control_plane_nodes', {}).get('value', [])
          if nodes:
              print(nodes[0].get('floating_ip') or nodes[0].get('private_ip'))
          PY
          )
          if [[ -z "$FIRST_CP_IP" ]]; then
            echo "::error::Terraform output did not contain a control-plane IP"
            exit 1
          fi
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            -fN \
            -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
            "$FIRST_CP_IP"
          echo "kubectl tunnel started on 127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"

      - name: Verify cluster
        run: |
          export KUBECONFIG="$HA_OPENSTACK_KUBECONFIG"
          kubectl get nodes -o wide
          kubectl get pods -A
          echo "k8s cluster is ready!"

      - name: Apply Kubernetes baseline
        if: ${{ inputs.apply_kubernetes }}
        run: |
          export KUBECONFIG="$HA_OPENSTACK_KUBECONFIG"
          kubectl apply -k ../kubernetes
          echo "Kubernetes baseline applied"

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v5
        with:
          name: kubeconfig
          path: .ha/openstack/kubeconfig
          retention-days: 1

      - name: Cleanup bootstrap sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG" "$HA_OPENSTACK_KUBECONFIG"

  setup-storage:
    name: Setup Storage (MinIO + NFS)
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: [bootstrap-k8s, terraform]
    if: ${{ always() && needs.bootstrap-k8s.result == 'success' && needs.terraform.result == 'success' && inputs.action == 'apply' && inputs.bootstrap_kubernetes && inputs.setup_storage }}
    defaults:
      run:
        working-directory: private/openstack
    env:
      KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
      MINIO_VOLUME_SIZE: ${{ inputs.minio_volume_size || '50' }}
      MINIO_ROOT_USER: ${{ vars.MINIO_ROOT_USER || 'minioadmin' }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-storage-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/storage_ssh_config
      HA_KUBECTL_TUNNEL_PORT: "16443"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check storage job tools
        run: |
          missing=0
          for tool in ssh python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]] && ! command -v lxc >/dev/null 2>&1; then
            echo "::error::Missing required runner tool for local DevStack SSH proxy: lxc"
            missing=1
          fi
          exit "${missing}"

      - name: Validate storage inputs
        run: |
          if ! [[ "${MINIO_VOLUME_SIZE}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::minio_volume_size must be a positive integer Gi value, for example 50"
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Download kubeconfig
        uses: actions/download-artifact@v5
        with:
          name: kubeconfig
          path: .ha/openstack

      - name: Download Terraform outputs
        uses: actions/download-artifact@v5
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Setup SSH key
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
              printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
            fi
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          echo "SSH key and config configured"

      - name: Get storage inputs
        id: storage
        run: |
          cp "${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json" /tmp/tf-output.json
          python3 - <<'PY' > /tmp/storage-output.env
          import json
          import sys

          with open('/tmp/tf-output.json', 'r') as f:
              data = json.load(f)

          control_nodes = data.get('control_plane_nodes', {}).get('value', [])
          if not control_nodes:
              print('missing control_plane_nodes output', file=sys.stderr)
              sys.exit(1)

          nfs_server_ip = data.get('nfs_server_ip', {}).get('value')
          private_network_cidr = data.get('private_network_cidr', {}).get('value')
          nfs_ssh_ip = control_nodes[0].get('floating_ip') or control_nodes[0].get('private_ip')
          missing = [name for name, value in {
              'nfs_server_ip': nfs_server_ip,
              'private_network_cidr': private_network_cidr,
              'nfs_ssh_ip': nfs_ssh_ip,
          }.items() if not value]
          if missing:
              print(f"missing Terraform output(s): {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          print(f"NFS_SERVER_IP={nfs_server_ip}")
          print(f"PRIVATE_NETWORK_CIDR={private_network_cidr}")
          print(f"NFS_SSH_IP={nfs_ssh_ip}")
          PY
          cat /tmp/storage-output.env >> "$GITHUB_OUTPUT"
          cat /tmp/storage-output.env

      - name: Start kubectl SSH tunnel
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            -fN \
            -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
            "${{ steps.storage.outputs.NFS_SSH_IP }}"
          echo "kubectl tunnel started on 127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"

      - name: Prepare NFS server
        run: |
          echo "Preparing NFS export on ${{ steps.storage.outputs.NFS_SSH_IP }}..."
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            "${{ steps.storage.outputs.NFS_SSH_IP }}" \
            bash -s -- "${{ steps.storage.outputs.PRIVATE_NETWORK_CIDR }}" <<'REMOTE'
          set -euo pipefail
          cidr="$1"
          export DEBIAN_FRONTEND=noninteractive
          export NEEDRESTART_MODE=a
          wait_for_cloud_init() {
            command -v cloud-init >/dev/null 2>&1 || return 0
            local deadline=$((SECONDS + 1800))
            local status
            while true; do
              status="$(cloud-init status 2>/dev/null || true)"
              if ! grep -q '^status: running$' <<<"$status"; then
                cloud-init status --long || true
                return 0
              fi
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for cloud-init to finish; continuing with apt lock wait" >&2
                cloud-init status --long || true
                return 0
              fi
              sleep 10
            done
          }
          wait_for_apt_locks() {
            local deadline=$((SECONDS + 900))
            local locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )
            while true; do
              local busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if sudo fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              elif pgrep -x apt >/dev/null 2>&1 || pgrep -x apt-get >/dev/null 2>&1 || pgrep -x dpkg >/dev/null 2>&1 || pgrep -x unattended-upgrade >/dev/null 2>&1; then
                busy=1
              fi
              [[ "$busy" -eq 0 ]] && return 0
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks" >&2
                return 1
              fi
              sleep 5
            done
          }
          apt_get() {
            local attempt
            for attempt in {1..12}; do
              wait_for_apt_locks
              if sudo apt-get "$@"; then
                return 0
              fi
              if (( attempt == 12 )); then
                return 1
              fi
              echo "apt-get $* failed; retrying after apt/dpkg lock check (${attempt}/12)" >&2
              sleep 10
            done
          }
          wait_for_cloud_init
          if ! sudo test -x /usr/sbin/exportfs; then
            apt_get update -qq
            apt_get install -y -qq nfs-common nfs-kernel-server
          fi
          sudo mkdir -p /mnt/nfs/hybrid-ai
          sudo chown nobody:nogroup /mnt/nfs/hybrid-ai
          sudo chmod 0777 /mnt/nfs/hybrid-ai
          sudo mkdir -p /etc/exports.d
          printf '/mnt/nfs/hybrid-ai %s(rw,sync,no_subtree_check,no_root_squash)\n' "$cidr" \
            | sudo tee /etc/exports.d/hybrid-ai.exports >/dev/null
          sudo /usr/sbin/exportfs -ra
          sudo systemctl enable --now nfs-server 2>/dev/null || sudo systemctl enable --now nfs-kernel-server
          sudo /usr/sbin/exportfs -v
          REMOTE
          echo "NFS server prepared"

      - name: Install local-path provisioner
        run: |
          echo "Installing local-path provisioner..."
          kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.31/deploy/local-path-storage.yaml
          kubectl -n local-path-storage rollout status deployment/local-path-provisioner --timeout=600s
          for i in {1..30}; do
            if kubectl get storageclass local-path >/dev/null 2>&1; then
              echo "local-path storage class is ready"
              break
            fi
            echo "Waiting for local-path storage class... ($i/30)"
            sleep 10
          done
          kubectl get storageclass local-path

      - name: Install MinIO Operator
        run: |
          echo "Installing MinIO Operator..."
          values_file="${RUNNER_TEMP}/minio-operator-values.yaml"
          cat > "$values_file" <<'VALUES'
          operator:
            replicaCount: 1
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 512Mi
                cpu: 500m
          VALUES
          helm repo add minio-operator https://operator.min.io/
          helm repo update
          helm upgrade --install minio-operator minio-operator/operator \
            --namespace minio-operator \
            --create-namespace \
            --version 7.1.1 \
            --values "$values_file" \
            --wait \
            --timeout 10m
          for i in {1..60}; do
            if kubectl get crd tenants.minio.min.io >/dev/null 2>&1; then
              echo "MinIO Tenant CRD is ready"
              break
            fi
            echo "Waiting for MinIO Tenant CRD... ($i/60)"
            sleep 10
          done
          kubectl get crd tenants.minio.min.io
          kubectl wait --for=condition=Established crd/tenants.minio.min.io --timeout=300s
          for i in {1..30}; do
            if kubectl api-resources --api-group=minio.min.io | grep -q '^tenants[[:space:]]'; then
              echo "MinIO Tenant API resource is discoverable"
              break
            fi
            echo "Waiting for MinIO Tenant API discovery... ($i/30)"
            sleep 10
          done
          kubectl api-resources --api-group=minio.min.io | grep '^tenants[[:space:]]'
          for i in {1..30}; do
            if kubectl -n minio-operator get deployment/minio-operator >/dev/null 2>&1; then
              echo "MinIO Operator deployment exists"
              break
            fi
            echo "Waiting for MinIO Operator deployment... ($i/30)"
            sleep 10
          done
          kubectl -n minio-operator rollout status deployment/minio-operator --timeout=600s

          kubectl create namespace minio-tenant --dry-run=client -o yaml | kubectl apply -f -
          existing_minio_root_user="$(kubectl -n minio-tenant get secret minio-creds-secret -o jsonpath='{.data.accessKey}' 2>/dev/null | base64 -d 2>/dev/null || true)"
          existing_minio_root_password="$(kubectl -n minio-tenant get secret minio-creds-secret -o jsonpath='{.data.secretKey}' 2>/dev/null | base64 -d 2>/dev/null || true)"

          minio_root_user="${MINIO_ROOT_USER:-${existing_minio_root_user:-minioadmin}}"
          minio_root_password="${MINIO_ROOT_PASSWORD:-${existing_minio_root_password:-}}"
          if [[ -z "$minio_root_password" ]]; then
            minio_root_password=$(python3 - <<'PY'
          import secrets

          print(secrets.token_urlsafe(36))
          PY
            )
          fi
          echo "::add-mask::$minio_root_user"
          echo "::add-mask::$minio_root_password"
          printf -v minio_config_env '%s\n%s\n%s' \
            "export MINIO_ROOT_USER=\"${minio_root_user}\"" \
            "export MINIO_ROOT_PASSWORD=\"${minio_root_password}\"" \
            'export MINIO_BROWSER="on"'
          kubectl -n minio-tenant create secret generic minio-creds-secret \
            --from-literal=accessKey="$minio_root_user" \
            --from-literal=secretKey="$minio_root_password" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n minio-tenant create secret generic model-admin \
            --from-literal=CONSOLE_ACCESS_KEY="$minio_root_user" \
            --from-literal=CONSOLE_SECRET_KEY="$minio_root_password" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n minio-tenant create secret generic minio-configuration \
            --from-literal=config.env="$minio_config_env" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Installing MinIO tenant with volume size ${MINIO_VOLUME_SIZE}Gi..."
          sed -e "s/storage: 100Gi/storage: ${MINIO_VOLUME_SIZE}Gi/g" ../storage/minio-tenant.yaml | kubectl apply -f -
          kubectl -n minio-tenant get tenant hybrid-ai
          echo "MinIO tenant applied"

      - name: Wait for MinIO Tenant
        timeout-minutes: 20
        run: |
          echo "Waiting for MinIO tenant to be ready..."
          for i in {1..60}; do
            pod_count=$(kubectl get pods -n minio-tenant -l v1.min.io/tenant=hybrid-ai --no-headers 2>/dev/null | wc -l | tr -d '[:space:]')
            if [[ "${pod_count:-0}" -gt 0 ]]; then
              echo "MinIO tenant pods created: ${pod_count}"
              break
            fi
            echo "Waiting for MinIO tenant pods... ($i/60)"
            kubectl -n minio-tenant describe tenant hybrid-ai || true
            sleep 10
          done
          kubectl get pods -n minio-tenant -l v1.min.io/tenant=hybrid-ai
          kubectl wait --for=condition=Ready pod -l v1.min.io/tenant=hybrid-ai -n minio-tenant --timeout=600s
          kubectl get pods -n minio-tenant -o wide
          echo "MinIO tenant is ready"

      - name: Install NFS Provisioner
        run: |
          echo "Installing NFS provisioner with server ${{ steps.storage.outputs.NFS_SERVER_IP }}..."
          values_file="${RUNNER_TEMP}/nfs-subdir-external-provisioner-values.yaml"
          nfs_server="${{ steps.storage.outputs.NFS_SERVER_IP }}"
          cat > "$values_file" <<VALUES
          replicaCount: 1
          storageClass:
            create: true
            name: private-nfs-rwx
            defaultClass: false
            reclaimPolicy: Retain
            allowVolumeExpansion: true
            archiveOnDelete: false
            pathPattern: "\${.PVC.namespace}/\${.PVC.name}"
          nfs:
            server: ${nfs_server}
            path: /mnt/nfs/hybrid-ai
            mountOptions:
              - hard
              - intr
              - rsize=1048576
              - wsize=1048576
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          VALUES
          helm repo add nfs-subdir-external-provisioner https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
          helm repo update
          helm upgrade --install nfs-subdir-external-provisioner \
            nfs-subdir-external-provisioner/nfs-subdir-external-provisioner \
            --namespace nfs-provisioner \
            --create-namespace \
            --version 4.0.18 \
            --values "$values_file" \
            --wait \
            --timeout 10m
          for i in {1..60}; do
            if kubectl get storageclass private-nfs-rwx >/dev/null 2>&1; then
              echo "NFS storage class is ready"
              break
            fi
            echo "Waiting for NFS storage class... ($i/60)"
            sleep 10
          done
          kubectl get storageclass private-nfs-rwx
          for i in {1..30}; do
            if kubectl -n nfs-provisioner get deployment/nfs-subdir-external-provisioner >/dev/null 2>&1; then
              echo "NFS provisioner deployment exists"
              break
            fi
            echo "Waiting for NFS provisioner deployment... ($i/30)"
            sleep 10
          done
          kubectl -n nfs-provisioner rollout status deployment/nfs-subdir-external-provisioner --timeout=600s
          echo "NFS provisioner installed"

      - name: Apply shared storage claims
        run: |
          kubectl apply -f ../kubernetes/namespaces.yaml
          kubectl apply -k ../storage
          for pvc in model-build-cache model-artifacts; do
            kubectl -n model-build wait --for=jsonpath='{.status.phase}'=Bound "pvc/${pvc}" --timeout=600s
          done
          minio_access_key=$(kubectl -n minio-tenant get secret minio-creds-secret -o jsonpath='{.data.accessKey}' | base64 -d)
          minio_secret_key=$(kubectl -n minio-tenant get secret minio-creds-secret -o jsonpath='{.data.secretKey}' | base64 -d)
          echo "::add-mask::$minio_access_key"
          echo "::add-mask::$minio_secret_key"
          for namespace in default model-build; do
            kubectl create namespace "$namespace" --dry-run=client -o yaml | kubectl apply -f -
            kubectl -n "$namespace" create secret generic minio-client-credentials \
              --from-literal=accessKey="$minio_access_key" \
              --from-literal=secretKey="$minio_secret_key" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "Shared storage claims are bound"

      - name: Verify Storage
        run: |
          echo "Available storage classes:"
          kubectl get storageclass
          echo "Persistent volume claims:"
          kubectl get pvc -A
          echo "Storage setup complete!"

      - name: Cleanup storage sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG" "$KUBECONFIG"

  setup-gitlab-gpu-runner:
    name: Setup GitLab GPU Runner
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: [terraform, bootstrap-k8s, setup-storage, setup-gitlab]
    if: ${{ always() && needs.terraform.result == 'success' && needs.bootstrap-k8s.result == 'success' && needs.setup-gitlab.result == 'success' && needs.setup-gitlab.outputs.ready == 'true' && (!inputs.setup_storage || needs.setup-storage.result == 'success') && inputs.action == 'apply' && inputs.bootstrap_kubernetes }}
    defaults:
      run:
        working-directory: private/openstack
    env:
      GITLAB_URL: ${{ vars.GITLAB_URL || vars.GITLAB_EXTERNAL_URL || 'https://gitlab.intp.me' }}
      GITLAB_RUNNER_TOKEN: ${{ secrets.GITLAB_RUNNER_TOKEN }}
      GITLAB_GPU_RUNNER_NAME_PREFIX: ${{ vars.GITLAB_GPU_RUNNER_NAME_PREFIX || 'hybrid-ai-gpu' }}
      GITLAB_GPU_RUNNER_TAGS: ${{ vars.GITLAB_GPU_RUNNER_TAGS || 'gpu-worker' }}
      SETUP_STORAGE: ${{ inputs.setup_storage && 'true' || 'false' }}
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-gitlab-gpu-runner-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/gitlab_gpu_runner_ssh_config
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check GitLab runner job tools
        run: |
          missing=0
          for tool in ssh python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]] && ! command -v lxc >/dev/null 2>&1; then
            echo "::error::Missing required runner tool for local DevStack SSH proxy: lxc"
            missing=1
          fi
          exit "${missing}"

      - name: Download Terraform outputs
        uses: actions/download-artifact@v5
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Setup SSH key
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
              printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
            fi
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          echo "SSH key and config configured"

      - name: Get GitLab GPU runner inputs
        id: gitlab_gpu_runner
        run: |
          if [[ -z "${GITLAB_URL:-}" ]]; then
            echo "::notice::GITLAB_URL variable is empty; skipping GitLab GPU runner registration"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "${GITLAB_RUNNER_TOKEN:-}" ]]; then
            echo "::add-mask::$GITLAB_RUNNER_TOKEN"
          fi

          cp "${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json" /tmp/tf-output.json
          python3 - <<'PY' > /tmp/gitlab-gpu-runner-output.env
          import json
          import os
          import sys

          with open('/tmp/tf-output.json', 'r', encoding='utf-8') as handle:
              data = json.load(handle)

          gpu_nodes = data.get('gpu_worker_nodes', {}).get('value', []) or []
          gitlab_nodes = data.get('gitlab_nodes', {}).get('value', []) or []
          nfs_server_ip = data.get('nfs_server_ip', {}).get('value') if os.environ.get('SETUP_STORAGE') == 'true' else ''
          print(f"NFS_SERVER_IP={nfs_server_ip or ''}")

          if gitlab_nodes:
              gitlab_node = gitlab_nodes[0]
              gitlab_target = gitlab_node.get('floating_ip') or gitlab_node.get('private_ip') or ''
              print(f"GITLAB_TARGET_IP={gitlab_target}")
          else:
              print("NO_GITLAB_NODES=true")

          with open('/tmp/gitlab-gpu-runner-inventory.tsv', 'w', encoding='utf-8') as inventory:
              for node in gpu_nodes:
                  target = node.get('floating_ip') or node.get('private_ip') or ''
                  if target:
                      inventory.write(f"{node.get('name', '')}\t{target}\n")

          if not gpu_nodes:
              print("NO_GPU_NODES=true")
          PY
          cat /tmp/gitlab-gpu-runner-output.env >> "$GITHUB_OUTPUT"
          cat /tmp/gitlab-gpu-runner-output.env
          gitlab_target_ip="$(awk -F= '$1 == "GITLAB_TARGET_IP" { print substr($0, index($0, "=") + 1) }' /tmp/gitlab-gpu-runner-output.env | tail -n 1)"

          if grep -q '^NO_GPU_NODES=true$' /tmp/gitlab-gpu-runner-output.env; then
            echo "::notice::Terraform output does not contain GPU worker nodes; skipping GitLab GPU runner registration"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! -s /tmp/gitlab-gpu-runner-inventory.tsv ]]; then
            echo "::notice::GPU worker nodes exist but have no reachable IP; skipping GitLab GPU runner registration"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -q '^NO_GITLAB_NODES=true$' /tmp/gitlab-gpu-runner-output.env && [[ -z "${GITLAB_RUNNER_TOKEN:-}" ]]; then
            echo "::notice::Terraform output does not contain GitLab nodes and GITLAB_RUNNER_TOKEN is empty; skipping GitLab GPU runner registration"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${GITLAB_RUNNER_TOKEN:-}" && -z "$gitlab_target_ip" ]]; then
            echo "::notice::GitLab runner token retrieval needs a reachable GitLab VM; skipping GitLab GPU runner registration"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check existing GitLab GPU runner registrations
        id: gitlab_gpu_runner_plan
        if: ${{ steps.gitlab_gpu_runner.outputs.enabled == 'true' }}
        run: |
          needs_registration=false
          while IFS=$'\t' read -r node_name target_ip; do
            [[ -n "$node_name" && -n "$target_ip" ]] || continue
            safe_node="$(printf '%s' "$node_name" | tr -c 'A-Za-z0-9_.-' '-')"
            runner_name="${GITLAB_GPU_RUNNER_NAME_PREFIX}-${safe_node}"

            if ssh -F "$HA_OPENSTACK_SSH_CONFIG" "$target_ip" bash -s -- "$runner_name" <<'REMOTE'
          set -euo pipefail
          runner_name="$1"
          if command -v gitlab-runner >/dev/null 2>&1 && sudo gitlab-runner list 2>&1 | grep -Fq "$runner_name"; then
            exit 0
          fi
          exit 1
          REMOTE
            then
              echo "GitLab runner already registered on ${node_name}: ${runner_name}"
            else
              echo "GitLab runner needs registration on ${node_name}: ${runner_name}"
              needs_registration=true
            fi
          done < /tmp/gitlab-gpu-runner-inventory.tsv

          echo "needs_registration=${needs_registration}" >> "$GITHUB_OUTPUT"

      - name: Prepare GitLab GPU runner token
        id: runner_token
        if: ${{ steps.gitlab_gpu_runner.outputs.enabled == 'true' && steps.gitlab_gpu_runner_plan.outputs.needs_registration == 'true' }}
        run: |
          runner_token_file="${RUNNER_TEMP}/gitlab-gpu-runner-token"
          rm -f "$runner_token_file"

          if [[ -n "${GITLAB_RUNNER_TOKEN:-}" ]]; then
            echo "::add-mask::$GITLAB_RUNNER_TOKEN"
            printf '%s' "$GITLAB_RUNNER_TOKEN" > "$runner_token_file"
            chmod 600 "$runner_token_file"
            echo "Using GITLAB_RUNNER_TOKEN secret override for GPU runner registration"
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${{ steps.gitlab_gpu_runner.outputs.GITLAB_TARGET_IP }}" ]]; then
            echo "::notice::GitLab runner token is not available because GitLab target IP is empty"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          runner_token="$(
            ssh -F "$HA_OPENSTACK_SSH_CONFIG" "${{ steps.gitlab_gpu_runner.outputs.GITLAB_TARGET_IP }}" bash -s <<'REMOTE'
          set -euo pipefail
          token_file="/var/lib/hybrid-ai/gitlab-bootstrap/runner-token"
          if [[ -s "$token_file" ]]; then
            sudo cat "$token_file"
            exit 0
          fi
          status_file="/var/lib/hybrid-ai/gitlab-bootstrap/status.env"
          if [[ -f "$status_file" ]]; then
            sudo cat "$status_file" >&2 || true
          fi
          exit 2
          REMOTE
          )" || token_status=$?

          if [[ "${token_status:-0}" -ne 0 || -z "$runner_token" ]]; then
            echo "::notice::GitLab runner token is not ready yet; bootstrap service on the GitLab VM will retry."
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## GitLab GPU Runner"
              echo
              echo "Runner registration skipped because the GitLab VM has not produced a runner token yet."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::add-mask::$runner_token"
          printf '%s' "$runner_token" > "$runner_token_file"
          chmod 600 "$runner_token_file"
          echo "Fetched GitLab runner authentication token from GitLab VM bootstrap state"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install and register GitLab GPU runners
        if: ${{ steps.gitlab_gpu_runner.outputs.enabled == 'true' && (steps.gitlab_gpu_runner_plan.outputs.needs_registration != 'true' || steps.runner_token.outputs.available == 'true') }}
        timeout-minutes: 40
        run: |
          echo "Registering GitLab shell runners on GPU workers..."
          runner_token_file="${RUNNER_TEMP}/gitlab-gpu-runner-token"
          {
            echo "## GitLab GPU Runner"
            echo
            echo "| GPU node | Runner name | Result |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS=$'\t' read -r node_name target_ip; do
            [[ -n "$node_name" && -n "$target_ip" ]] || continue
            safe_node="$(printf '%s' "$node_name" | tr -c 'A-Za-z0-9_.-' '-')"
            runner_name="${GITLAB_GPU_RUNNER_NAME_PREFIX}-${safe_node}"
            token_file="/tmp/gitlab-runner-token-${safe_node}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            echo "Installing GitLab Runner on ${node_name} (${target_ip})..."

            if ssh -F "$HA_OPENSTACK_SSH_CONFIG" "$target_ip" bash -s -- "$runner_name" <<'REMOTE'
          set -euo pipefail
          runner_name="$1"
          if command -v gitlab-runner >/dev/null 2>&1 && sudo gitlab-runner list 2>&1 | grep -Fq "$runner_name"; then
            exit 0
          fi
          exit 1
          REMOTE
            then
              echo "GitLab runner already registered: ${runner_name}"
              printf "| \`%s\` | \`%s\` | \`%s\` |\n" "$node_name" "$runner_name" "already registered" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            if [[ ! -s "$runner_token_file" ]]; then
              echo "::error::Missing prepared GitLab runner token file: ${runner_token_file}"
              exit 1
            fi

            ssh -F "$HA_OPENSTACK_SSH_CONFIG" "$target_ip" \
              "umask 077 && cat > ${token_file}" < "$runner_token_file"

            ssh -F "$HA_OPENSTACK_SSH_CONFIG" "$target_ip" bash -s -- \
              "$GITLAB_URL" \
              "$runner_name" \
              "$token_file" \
              "${{ steps.gitlab_gpu_runner.outputs.NFS_SERVER_IP }}" <<'REMOTE'
          set -euo pipefail

          gitlab_url="$1"
          runner_name="$2"
          token_file="$3"
          nfs_server_ip="$4"

          cleanup() {
            sudo rm -f "$token_file" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          wait_for_apt_locks() {
            local deadline=$((SECONDS + 600))
            local locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )
            while true; do
              local busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if sudo fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              fi
              [[ "$busy" -eq 0 ]] && return 0
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks" >&2
                return 1
              fi
              sleep 5
            done
          }

          sudo cloud-init status --wait >/dev/null 2>&1 || true

          if ! command -v gitlab-runner >/dev/null 2>&1; then
            wait_for_apt_locks
            sudo apt-get update -qq
            sudo apt-get install -y -qq ca-certificates curl
            curl -fsSL \
              https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh \
              -o /tmp/gitlab-runner-script.deb.sh
            sudo bash /tmp/gitlab-runner-script.deb.sh
            wait_for_apt_locks
            sudo apt-get install -y -qq gitlab-runner
          fi

          for group in video render; do
            if getent group "$group" >/dev/null 2>&1; then
              sudo usermod -aG "$group" gitlab-runner || true
            fi
          done

          if [[ -n "$nfs_server_ip" ]]; then
            sudo mkdir -p /mnt/nfs/hybrid-ai
            if ! findmnt -rno TARGET /mnt/nfs/hybrid-ai >/dev/null 2>&1; then
              sudo mount -t nfs -o nfsvers=4.1,hard,intr "${nfs_server_ip}:/mnt/nfs/hybrid-ai" /mnt/nfs/hybrid-ai \
                || sudo mount -t nfs "${nfs_server_ip}:/mnt/nfs/hybrid-ai" /mnt/nfs/hybrid-ai
            fi
            if ! grep -Fq "${nfs_server_ip}:/mnt/nfs/hybrid-ai /mnt/nfs/hybrid-ai" /etc/fstab; then
              printf '%s /mnt/nfs/hybrid-ai nfs nfsvers=4.1,hard,intr,_netdev,nofail 0 0\n' "${nfs_server_ip}:/mnt/nfs/hybrid-ai" \
                | sudo tee -a /etc/fstab >/dev/null
            fi
            sudo mkdir -p \
              /mnt/nfs/hybrid-ai/pip-cache \
              /mnt/nfs/hybrid-ai/checkpoints \
              /mnt/nfs/hybrid-ai/artifacts \
              /mnt/nfs/hybrid-ai/gitlab-runner-cache
            sudo chmod 0777 \
              /mnt/nfs/hybrid-ai/pip-cache \
              /mnt/nfs/hybrid-ai/checkpoints \
              /mnt/nfs/hybrid-ai/artifacts \
              /mnt/nfs/hybrid-ai/gitlab-runner-cache
          fi

          runner_token="$(sudo cat "$token_file")"
          if sudo gitlab-runner list 2>&1 | grep -Fq "$runner_name"; then
            echo "GitLab runner already registered: $runner_name"
          else
            sudo gitlab-runner register \
              --non-interactive \
              --url "$gitlab_url" \
              --token "$runner_token" \
              --executor shell \
              --name "$runner_name"
          fi

          sudo systemctl enable --now gitlab-runner
          sudo gitlab-runner verify || true
          if command -v nvidia-smi >/dev/null 2>&1; then
            nvidia-smi
          fi
          REMOTE

            printf "| \`%s\` | \`%s\` | \`%s\` |\n" "$node_name" "$runner_name" "registered" >> "$GITHUB_STEP_SUMMARY"
          done < /tmp/gitlab-gpu-runner-inventory.tsv

          echo "GitLab GPU runner setup complete"

      - name: Cleanup GitLab runner sensitive files
        if: always()
        run: |
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG" "${RUNNER_TEMP}/gitlab-gpu-runner-token"

  validate-gpu:
    name: Validate GPU Passthrough
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'private-cloud' }}
    needs: [bootstrap-k8s, setup-storage]
    if: ${{ always() && needs.bootstrap-k8s.result == 'success' && (!inputs.setup_storage || needs.setup-storage.result == 'success') && inputs.action == 'apply' && inputs.bootstrap_kubernetes && inputs.validate_gpu }}
    defaults:
      run:
        working-directory: .
    env:
      KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-gpu-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/gpu_ssh_config
      HA_KUBECTL_TUNNEL_PORT: "16443"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check GPU validation tools
        run: |
          missing=0
          for tool in python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            for tool in ssh lxc; do
              if ! command -v "$tool" >/dev/null 2>&1; then
                echo "::error::Missing required runner tool for local DevStack kubectl tunnel: ${tool}"
                missing=1
              fi
            done
          fi
          exit "${missing}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Download kubeconfig
        uses: actions/download-artifact@v5
        with:
          name: kubeconfig
          path: .ha/openstack

      - name: Download Terraform outputs
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        uses: actions/download-artifact@v5
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Start kubectl SSH tunnel
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          FIRST_CP_IP=$(python3 - <<'PY'
          import json
          with open('.ha/openstack/terraform-output.json', 'r') as f:
              data = json.load(f)
          nodes = data.get('control_plane_nodes', {}).get('value', [])
          if nodes:
              print(nodes[0].get('floating_ip') or nodes[0].get('private_ip'))
          PY
          )
          if [[ -z "$FIRST_CP_IP" ]]; then
            echo "::error::Terraform output did not contain a control-plane IP"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            -fN \
            -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
            "$FIRST_CP_IP"
          echo "kubectl tunnel started on 127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"

      - name: Install NVIDIA runtime resources
        run: |
          echo "Installing NVIDIA RuntimeClass and device plugin..."
          kubectl apply -f private/gpu-worker/runtimeclass.yaml
          kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.14.5/nvidia-device-plugin.yml
          echo "NVIDIA runtime resources installed"

      - name: Wait for GPU nodes
        timeout-minutes: 5
        run: |
          echo "Waiting for GPU nodes to be ready..."
          kubectl wait --for=condition=Ready node -l hybrid-ai.io/accelerator=nvidia --timeout=300s
          echo "GPU nodes:"
          kubectl get nodes -l hybrid-ai.io/accelerator=nvidia -o wide

      - name: Run GPU validation tests
        run: |
          echo "Running GPU validation jobs..."
          kubectl delete job/gpu-validation -n kube-system --ignore-not-found=true
          kubectl delete job/gpu-tensorflow-test -n default --ignore-not-found=true
          kubectl apply -f private/gpu-worker/gpu-validation-job.yaml

          echo "Waiting for nvidia-smi job..."
          kubectl wait --for=condition=Complete job/gpu-validation -n kube-system --timeout=300s
          kubectl logs job/gpu-validation -n kube-system

          echo "Waiting for TensorFlow GPU test..."
          kubectl wait --for=condition=Complete job/gpu-tensorflow-test --timeout=600s
          kubectl logs job/gpu-tensorflow-test

          echo "GPU validation complete!"

      - name: Run MinIO connectivity test
        if: ${{ inputs.setup_storage }}
        run: |
          echo "Testing MinIO connectivity..."
          kubectl delete job/dataset-minio-test --ignore-not-found=true
          kubectl apply -f private/gpu-worker/minio-validation-job.yaml
          kubectl wait --for=condition=Complete job/dataset-minio-test --timeout=120s
          kubectl logs job/dataset-minio-test
          echo "MinIO validation complete!"

      - name: Cleanup GPU validation sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG"
