name: Edge Image Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DEFAULT_IMAGE_NAME: edge-simulator

concurrency:
  group: edge-image-dispatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          GHCR_OWNER_LOWER=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="ghcr.io/${GHCR_OWNER_LOWER}/${{ env.DEFAULT_IMAGE_NAME }}"
          docker build \
            -t "${IMAGE_REPO}:${IMAGE_TAG}" \
            edge
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
