name: Public Terraform Deploy

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ap-northeast-2

concurrency:
  group: public-terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write terraform.tfvars from secret
        if: ${{ secrets.PUBLIC_TERRAFORM_TFVARS != '' }}
        env:
          TFVARS_CONTENT: ${{ secrets.PUBLIC_TERRAFORM_TFVARS }}
        working-directory: public/terraform
        run: printf '%s\n' "$TFVARS_CONTENT" > terraform.tfvars

      - name: Terraform fmt check
        working-directory: public/terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: public/terraform
        run: terraform init

      - name: Terraform validate
        working-directory: public/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: public/terraform
        run: terraform plan -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-terraform-tfplan
          path: public/terraform/tfplan

      - name: Terraform apply
        working-directory: public/terraform
        run: terraform apply -auto-approve tfplan

      - name: Sync Argo CD values from Terraform outputs
        run: |
          VPC_ID=$(terraform -chdir=public/terraform output -raw vpc_id)
          LB_ROLE_ARN=$(terraform -chdir=public/terraform output -raw aws_load_balancer_controller_role_arn)
          MSK_BOOTSTRAP_SERVERS=$(terraform -chdir=public/terraform output -raw msk_bootstrap_brokers)
          export VPC_ID LB_ROLE_ARN MSK_BOOTSTRAP_SERVERS
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          alb_path = Path("public/k8s/argocd/apps/aws-load-balancer-controller-app.yaml")
          alb_text = alb_path.read_text(encoding="utf-8")
          alb_text = re.sub(r"(?m)^(\s*vpcId:\s*).*$", rf"\1{os.environ['VPC_ID']}", alb_text)
          alb_text = re.sub(
              r"(?m)^(\s*eks\.amazonaws\.com/role-arn:\s*).*$",
              rf"\1{os.environ['LB_ROLE_ARN']}",
              alb_text,
          )
          alb_path.write_text(alb_text, encoding="utf-8")

          cm_path = Path("public/k8s/apps/inference-api/configmap.yaml")
          cm_text = cm_path.read_text(encoding="utf-8")
          cm_text = re.sub(
              r"(?m)^(\s*BOOTSTRAP_SERVERS:\s*).*$",
              rf"\1{os.environ['MSK_BOOTSTRAP_SERVERS']}",
              cm_text,
          )
          cm_path.write_text(cm_text, encoding="utf-8")
          PY

      - name: Commit generated Argo CD values
        run: |
          if git diff --quiet -- public/k8s/argocd/apps/aws-load-balancer-controller-app.yaml public/k8s/apps/inference-api/configmap.yaml; then
            echo "No generated Argo CD manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/k8s/argocd/apps/aws-load-balancer-controller-app.yaml public/k8s/apps/inference-api/configmap.yaml
          git commit -m "chore: sync generated platform values"
          git push
