name: Public Terraform Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write

env:
  AWS_REGION: ap-northeast-2

concurrency:
  group: public-terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write terraform.tfvars from secret
        if: ${{ secrets.PUBLIC_TERRAFORM_TFVARS != '' }}
        env:
          TFVARS_CONTENT: ${{ secrets.PUBLIC_TERRAFORM_TFVARS }}
        working-directory: public/terraform
        run: printf '%s\n' "$TFVARS_CONTENT" > terraform.tfvars

      - name: Terraform fmt check
        working-directory: public/terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: public/terraform
        run: terraform init

      - name: Terraform validate
        working-directory: public/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: public/terraform
        run: terraform plan -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-terraform-tfplan
          path: public/terraform/tfplan

      - name: Terraform apply
        working-directory: public/terraform
        run: terraform apply -auto-approve tfplan
