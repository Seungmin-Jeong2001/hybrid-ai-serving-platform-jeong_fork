name: Public Terraform Deploy

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ap-northeast-2

concurrency:
  group: public-terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write terraform.tfvars from secret
        if: ${{ secrets.PUBLIC_TERRAFORM_TFVARS != '' }}
        env:
          TFVARS_CONTENT: ${{ secrets.PUBLIC_TERRAFORM_TFVARS }}
        working-directory: public/terraform
        run: printf '%s\n' "$TFVARS_CONTENT" > terraform.tfvars

      - name: Terraform fmt check
        working-directory: public/terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: public/terraform
        run: terraform init

      - name: Terraform validate
        working-directory: public/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: public/terraform
        run: terraform plan -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-terraform-tfplan
          path: public/terraform/tfplan

      - name: Terraform apply
        working-directory: public/terraform
        run: terraform apply -auto-approve tfplan

      - name: Read target group ARN from Terraform output
        id: tg_arn
        run: |
          TARGET_GROUP_ARN=$(terraform output -raw internal_alb_target_group_arn)
          echo "value=${TARGET_GROUP_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update TargetGroupBinding manifest
        working-directory: ${{ github.workspace }}
        env:
          TARGET_GROUP_ARN: ${{ steps.tg_arn.outputs.value }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          manifest = Path("public/k8s/apps/inference-api/targetgroupbinding.yaml")
          target_group_arn = os.environ["TARGET_GROUP_ARN"]
          content = manifest.read_text(encoding="utf-8")

          marker = "targetGroupARN:"
          lines = content.splitlines()
          updated = []
          for line in lines:
              if line.strip().startswith(marker):
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f"{indent}{marker} {target_group_arn}")
              else:
                  updated.append(line)

          manifest.write_text("\n".join(updated) + "\n", encoding="utf-8")
          PY

      - name: Commit updated TargetGroupBinding
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --quiet -- public/k8s/apps/inference-api/targetgroupbinding.yaml; then
            echo "No TargetGroupBinding change detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/k8s/apps/inference-api/targetgroupbinding.yaml
          git commit -m "chore: sync internal ALB target group ARN"
          git push
