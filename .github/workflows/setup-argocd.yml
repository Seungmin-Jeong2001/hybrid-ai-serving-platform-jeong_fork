name: Setup Argo CD

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: sgs-hasp-eks
  ARGOCD_NAMESPACE: argocd
  ARGOCD_CHART_VERSION: 7.8.23
  ARGOCD_REPO_URL: https://github.com/${{ github.repository }}.git
  ARGOCD_TARGET_REVISION: ${{ github.ref_name }}
  SSM_BOOTSTRAP_TAG_KEY: Name
  SSM_BOOTSTRAP_TAG_VALUE: sgs-hasp-system

concurrency:
  group: argocd-bootstrap-ssm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required variables
        run: |
          if [[ -z "${SSM_BOOTSTRAP_TAG_KEY}" || -z "${SSM_BOOTSTRAP_TAG_VALUE}" ]]; then
            echo "Bootstrap instance tag configuration is required."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Resolve bootstrap admin role ARN
        id: bootstrap_role
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "value=arn:aws:iam::${ACCOUNT_ID}:role/sgs-hasp-eks-bootstrap-admin" >> "$GITHUB_OUTPUT"

      - name: Build root application manifest
        env:
          REPO_URL: ${{ env.ARGOCD_REPO_URL }}
          TARGET_REVISION: ${{ env.ARGOCD_TARGET_REVISION }}
        run: |
          cat > argocd-root-app.yaml <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: platform-addons
            namespace: ${ARGOCD_NAMESPACE}
          spec:
            project: default
            source:
              repoURL: ${REPO_URL}
              targetRevision: ${TARGET_REVISION}
              path: public/k8s/argocd/apps
            destination:
              server: https://kubernetes.default.svc
              namespace: ${ARGOCD_NAMESPACE}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF

      - name: Resolve SSM bootstrap instance
        id: resolve_instance
        run: |
          RUNNING_INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:${SSM_BOOTSTRAP_TAG_KEY},Values=${SSM_BOOTSTRAP_TAG_VALUE}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          if [[ -z "${RUNNING_INSTANCE_IDS}" || "${RUNNING_INSTANCE_IDS}" == "None" ]]; then
            echo "No running EC2 instances found for tag ${SSM_BOOTSTRAP_TAG_KEY}=${SSM_BOOTSTRAP_TAG_VALUE}."
            exit 1
          fi

          MANAGED_INSTANCE_IDS=$(aws ssm describe-instance-information \
            --region "${AWS_REGION}" \
            --query 'InstanceInformationList[].InstanceId' \
            --output text)

          TARGET_INSTANCE_ID=""
          for instance_id in ${RUNNING_INSTANCE_IDS}; do
            for managed_id in ${MANAGED_INSTANCE_IDS}; do
              if [[ "${instance_id}" == "${managed_id}" ]]; then
                TARGET_INSTANCE_ID="${instance_id}"
                break 2
              fi
            done
          done

          if [[ -z "${TARGET_INSTANCE_ID}" ]]; then
            echo "No SSM-managed running instance found for tag ${SSM_BOOTSTRAP_TAG_KEY}=${SSM_BOOTSTRAP_TAG_VALUE}."
            exit 1
          fi

          echo "value=${TARGET_INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Resolved bootstrap instance: ${TARGET_INSTANCE_ID}"

      - name: Send bootstrap command through SSM
        id: send_bootstrap
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN_FOR_ARGOCD: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
          TARGET_INSTANCE_ID: ${{ steps.resolve_instance.outputs.value }}
          BOOTSTRAP_ROLE_ARN: ${{ steps.bootstrap_role.outputs.value }}
        run: |
          ROOT_APP_YAML_B64=$(base64 -w 0 argocd-root-app.yaml)
          export ROOT_APP_YAML_B64
          python - <<'PY'
          import json
          import os

          repo_secret_name = f"repo-{os.environ['GITHUB_REPOSITORY'].replace('/', '-')}"
          commands = [
              "set -euo pipefail",
              "if ! command -v kubectl >/dev/null 2>&1; then curl -fsSLo /tmp/kubectl https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl && chmod +x /tmp/kubectl && sudo mv /tmp/kubectl /usr/local/bin/kubectl; fi",
              "if ! command -v helm >/dev/null 2>&1; then curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash; fi",
              "mkdir -p ~/.kube",
              "export KUBECONFIG=/tmp/eks-kubeconfig",
              f"read AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< \\\"$(aws sts assume-role --role-arn {os.environ['BOOTSTRAP_ROLE_ARN']} --role-session-name argocd-bootstrap --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)\\\"",
              "export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN",
              "aws sts get-caller-identity",
              f"aws eks describe-cluster --region {os.environ['AWS_REGION']} --name {os.environ['EKS_CLUSTER_NAME']} >/dev/null",
              f"aws eks update-kubeconfig --region {os.environ['AWS_REGION']} --name {os.environ['EKS_CLUSTER_NAME']} --kubeconfig /tmp/eks-kubeconfig",
              "kubectl config current-context",
              "kubectl cluster-info",
              f"kubectl create namespace {os.environ['ARGOCD_NAMESPACE']} --dry-run=client -o yaml | kubectl apply -f -",
              "helm repo add argo https://argoproj.github.io/argo-helm",
              "helm repo update",
              f"helm upgrade --install argocd argo/argo-cd --namespace {os.environ['ARGOCD_NAMESPACE']} --version {os.environ['ARGOCD_CHART_VERSION']}",
              f"kubectl rollout status deployment/argocd-server -n {os.environ['ARGOCD_NAMESPACE']} --timeout=300s",
              f"kubectl rollout status deployment/argocd-repo-server -n {os.environ['ARGOCD_NAMESPACE']} --timeout=300s",
              f"kubectl rollout status statefulset/argocd-application-controller -n {os.environ['ARGOCD_NAMESPACE']} --timeout=300s",
              (
                  f"if [ -n \"{os.environ.get('GITHUB_TOKEN_FOR_ARGOCD', '')}\" ]; then "
                  f"kubectl -n {os.environ['ARGOCD_NAMESPACE']} create secret generic {repo_secret_name} "
                  f"--from-literal=url={os.environ['ARGOCD_REPO_URL']} "
                  f"--from-literal=username={os.environ['GITHUB_ACTOR']} "
                  f"--from-literal=password={os.environ.get('GITHUB_TOKEN_FOR_ARGOCD', '')} "
                  f"--type=Opaque --dry-run=client -o yaml | kubectl apply -f - && "
                  f"kubectl -n {os.environ['ARGOCD_NAMESPACE']} label secret {repo_secret_name} "
                  f"argocd.argoproj.io/secret-type=repository --overwrite; fi"
              ),
              f"echo {os.environ['ROOT_APP_YAML_B64']} | base64 -d | kubectl apply -f -",
              "kubectl wait --for=condition=available deployment/aws-load-balancer-controller -n kube-system --timeout=600s",
              "kubectl wait --for=condition=available deployment/inference-api -n inference --timeout=600s",
              "for i in $(seq 1 60); do kubectl get ingress inference-api -n inference >/dev/null 2>&1 && break; sleep 10; done",
              "kubectl get ingress inference-api -n inference",
          ]

          with open("commands.json", "w", encoding="utf-8") as fp:
              json.dump({"commands": commands}, fp)
          PY

          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${TARGET_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Bootstrap Argo CD on ${EKS_CLUSTER_NAME}" \
            --parameters file://commands.json \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: ${COMMAND_ID}"

      - name: Wait for bootstrap result
        env:
          COMMAND_ID: ${{ steps.send_bootstrap.outputs.command_id }}
          TARGET_INSTANCE_ID: ${{ steps.resolve_instance.outputs.value }}
        run: |
          if [[ -z "${COMMAND_ID}" ]]; then
            echo "Missing command id."
            exit 1
          fi

          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${TARGET_INSTANCE_ID}" \
              --query 'Status' \
              --output text)

            if [[ "${STATUS}" == "Success" ]]; then
              echo "Argo CD bootstrap completed successfully."
              break
            fi

            if [[ "${STATUS}" == "Failed" || "${STATUS}" == "Cancelled" || "${STATUS}" == "TimedOut" || "${STATUS}" == "Undeliverable" || "${STATUS}" == "Terminated" ]]; then
              echo "SSM bootstrap failed with status: ${STATUS}"
              aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${COMMAND_ID}" \
                --instance-id "${TARGET_INSTANCE_ID}" \
                --query 'StandardErrorContent' \
                --output text || true
              exit 1
            fi

            sleep 10
          done

          FINAL_STATUS=$(aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${TARGET_INSTANCE_ID}" \
            --query 'Status' \
            --output text)

          if [[ "${FINAL_STATUS}" != "Success" ]]; then
            echo "SSM bootstrap did not finish successfully. Final status: ${FINAL_STATUS}"
            exit 1
          fi

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${TARGET_INSTANCE_ID}" \
            --query 'StandardOutputContent' \
            --output text || true
