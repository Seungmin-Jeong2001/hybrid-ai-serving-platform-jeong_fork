name: Inference Image Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com
  EKS_CLUSTER_NAME: sgs-hasp-eks
  MSK_CLUSTER_NAME: sgs-hasp-msk
  K8S_NAMESPACE: inference
  IMAGE_TAG: latest

concurrency:
  group: inference-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Apply namespace
        run: kubectl apply -f public/k8s/base/namespace.yaml

      - name: Sync MSK bootstrap to ConfigMap
        run: |
          # MSK 부트스트랩 주소는 클러스터 재생성 시 바뀌므로 배포 시점에 동적으로 주입.
          # deployment의 BOOTSTRAP_SERVERS가 이 ConfigMap을 참조하므로 파드 생성 전에 존재해야 함.
          CLUSTER_ARN=$(aws kafka list-clusters \
            --cluster-name-filter "${MSK_CLUSTER_NAME}" \
            --query 'ClusterInfoList[0].ClusterArn' --output text)
          BROKERS=$(aws kafka get-bootstrap-brokers \
            --cluster-arn "$CLUSTER_ARN" \
            --query 'BootstrapBrokerString' --output text)
          if [[ -z "$BROKERS" || "$BROKERS" == "None" ]]; then
            echo "failed to resolve MSK plaintext bootstrap brokers"; exit 1
          fi
          echo "resolved MSK bootstrap brokers"
          kubectl create configmap inference-config \
            -n "${K8S_NAMESPACE}" \
            --from-literal=BOOTSTRAP_SERVERS="$BROKERS" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f public/k8s/apps/inference-api
          kubectl apply -f public/k8s/apps/inference-worker
          kubectl apply -f public/k8s/serving/predictive-model

      - name: Update deployment images
        run: |
          kubectl set image deployment/inference-api \
            inference-api="${ECR_REGISTRY}/inference-api:${IMAGE_TAG}" \
            -n "${K8S_NAMESPACE}"
          kubectl set image deployment/inference-worker \
            inference-worker="${ECR_REGISTRY}/inference-worker:${IMAGE_TAG}" \
            -n "${K8S_NAMESPACE}"

      - name: Restart deployments to pick up ConfigMap
        run: |
          # 이미지 태그가 그대로(latest)면 set image가 롤아웃을 안 일으킬 수 있어,
          # ConfigMap 변경분을 파드에 반영하기 위해 명시적으로 재시작.
          kubectl rollout restart deployment/inference-api -n "${K8S_NAMESPACE}"
          kubectl rollout restart deployment/inference-worker -n "${K8S_NAMESPACE}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/inference-api -n "${K8S_NAMESPACE}" --timeout=300s
          kubectl rollout status deployment/inference-worker -n "${K8S_NAMESPACE}" --timeout=300s
