# inference-api와 inference-worker 이미지를 빌드하고 Amazon ECR에 푸시하는 워크플로우

name: Inference Image Build

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com

concurrency:
  group: inference-image-dispatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - inference-api
          - inference-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${IMAGE_TAG}" \
            "services/${{ matrix.service }}"
          docker push "${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${IMAGE_TAG}"
          docker tag \
            "${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${IMAGE_TAG}" \
            "${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest"
          docker push "${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest"
